<script>
const DAYS_DA = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];
const MON_DA  = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
const esc = s => String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const iso = d => d.toISOString().slice(0,10);
const addDays = (d,n)=>{ const x=new Date(d); x.setDate(x.getDate()+n); return x; };

function weekNo(dateIso, startIso){
  return Math.floor((new Date(dateIso+"T12:00:00") - new Date(startIso+"T12:00:00"))/864e5/7)+1;
}

function dayCard(day, todayIso){
  const d = new Date(day.date+"T12:00:00");
  const isToday = day.date===todayIso;
  const entries = day.entries||[];
  if (!entries.length || entries.every(e=>!e.workout)){
    // Hviledag
    const note = entries.map(e=>e.note).filter(Boolean).join(" · ") || "Hviledag";
    return `<div class="day ${isToday?"today":""}">
      <div class="d">${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}. ${MON_DA[d.getMonth()]}${isToday?` <span class="today-tag">· i dag</span>`:""}</div>
      <div class="n" style="color:var(--muted);font-weight:400;font-size:15px"><i class="ti ti-moon" style="font-size:14px;vertical-align:-2px"></i> ${esc(note)}</div>
      ${entries[0]?.id?`<div class="day-actions"><button onclick="openSheet('swap','${entries[0].id}','${day.date}')"><i class="ti ti-plus"></i> Tilføj pas</button></div>`:""}</div>`;
  }
  return entries.filter(e=>e.workout).map(e=>{
    const w = e.workout;
    return `<div class="day ${isToday?"today":""}">
      <div class="d">${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}. ${MON_DA[d.getMonth()]}${isToday?` <span class="today-tag">· i dag</span>`:""}</div>
      <div class="n">${esc(w.name||"Træning")}</div>
      ${e.note?`<div class="note">${esc(e.note)}</div>`:""}
      <div class="day-actions">
        <button onclick="openSheet('adjust','${e.id}','${day.date}')"><i class="ti ti-adjustments"></i> Justér</button>
        <button onclick="openSheet('move','${e.id}','${day.date}')"><i class="ti ti-arrows-move"></i> Flyt</button>
        <button onclick="openSheet('swap','${e.id}','${day.date}')"><i class="ti ti-refresh"></i> Skift</button>
        <button class="danger" onclick="openSheet('cancel','${e.id}','${day.date}')"><i class="ti ti-x"></i> Aflys</button>
      </div>
    </div>`;
  }).join("");
}

function weekDays(eva, w){
  const start = new Date(eva.program.start+"T12:00:00");
  const ws = addDays(start,(w-1)*7), we = addDays(ws,6);
  return eva.days.filter(d=>{ const t=new Date(d.date+"T12:00:00"); return t>=ws && t<=we; });
}

async function main(){
  const content = document.getElementById("content");
  let plan;
  try {
    const r = await fetch(`data/plan.json?t=${Date.now()}`, {cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    plan = await r.json();
  } catch(e){ content.innerHTML = `<div class="err">Kunne ikke hente planen — prøv igen om lidt.</div>`; return; }

  const eva = plan.athletes.eva;
  const todayIso = iso(new Date());
  const total = eva.program.totalWeeks;
  const cur = Math.min(Math.max(weekNo(todayIso, eva.program.start),1), total);
  const daysToRace = Math.max(0, Math.round((new Date(eva.program.raceDay+"T12:00:00")-new Date(todayIso+"T12:00:00"))/864e5));
  document.getElementById("head-sub").textContent =
    `Uge ${cur} af ${total} · ${daysToRace} dage til Marathon du Médoc`;

  const weekMeta = w => eva.weeks.find(x=>x.week===w) || {};
  let html = "";
  const curNote = weekMeta(cur).note;
  if(curNote) html += `<div class="focus"><div class="l">Ugens fokus</div><div class="t">${esc(curNote)}</div></div>`;

  for(let w=cur; w<=Math.min(cur+2,total); w++){
    const days = weekDays(eva,w);
    html += `<div class="wk-title">Uge ${w}${w===cur?" · denne uge":""}</div>`;
    if(w!==cur && weekMeta(w).note) html += `<div class="wk-note">${esc(weekMeta(w).note)}</div>`;
    html += days.length ? days.map(d=>dayCard(d,todayIso)).join("")
                        : `<div class="done-banner">Ingen pas planlagt endnu</div>`;
  }

  html += `<div class="section-title">Fuld plan · uge 1–${total}</div>`;
  for(let w=1; w<=total; w++){
    const days = weekDays(eva,w);
    html += `<div class="acc"><div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
      <span><b>Uge ${w}</b> &nbsp;<span>${esc(weekMeta(w).note||"")}</span></span>
      <i class="ti ti-chevron-down chev" style="font-size:16px"></i></div>
      <div class="acc-body">${days.map(d=>dayCard(d,todayIso)).join("")||""}</div></div>`;
  }
  content.innerHTML = html;
}
main();

// ═══ EDITING ENGINE — EVA (samme mønster som plan.html, athlete: 'eva') ═══
const GH_REPO = "hammerbamsen/fast-as-50";
const TOKEN_KEY = "af_gh_token";
const getToken = () => localStorage.getItem(TOKEN_KEY);
const setToken = t => localStorage.setItem(TOKEN_KEY, t);

let PLAN_CACHE=null, LIB_CACHE=null, SHEET_STATE=null;

async function loadPlan(){
  if (!PLAN_CACHE) {
    const r = await fetch(`data/plan.json?t=${Date.now()}`, {cache:"no-store"});
    PLAN_CACHE = await r.json();
  }
  return PLAN_CACHE;
}
async function loadLib(){
  if (!LIB_CACHE) {
    const r = await fetch(`data/workout_library.json?t=${Date.now()}`, {cache:"no-store"});
    LIB_CACHE = await r.json();
  }
  return LIB_CACHE;
}

function setupToken(){
  const sheet = document.getElementById("sheet");
  const bg = document.getElementById("sheet-bg");
  sheet.innerHTML = `<h3>GitHub-token</h3>
    <div class="sub">Safari tilbyder at gemme tokenet i iCloud Keychain — så mister du det aldrig igen.</div>
    <form id="token-form" action="javascript:void(0)" autocomplete="on" onsubmit="saveTokenFromForm(event)">
      <input type="text" name="username" value="eva-medoc" autocomplete="username" style="display:none" readonly>
      <label>Token</label>
      <input type="password" name="password" id="token-input"
             autocomplete="current-password"
             value="${(getToken()||'').replace(/"/g,'&quot;')}"
             placeholder="github_pat_..." style="font-family:monospace;font-size:11px" required>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4">
        Første gang: tap Gem, sig "Yes" til Safaris tilbud om at gemme adgangskode i iCloud Keychain.
      </div>
      <div class="btn-row">
        <button type="button" class="secondary" onclick="closeSheet()">Fortryd</button>
        <button type="submit" class="primary">Gem</button>
      </div>
    </form>`;
  bg.classList.add("open"); sheet.classList.add("open");
  setTimeout(()=>document.getElementById("token-input")?.focus(), 120);
}

function saveTokenFromForm(e){
  e.preventDefault();
  const val = document.getElementById("token-input").value.trim();
  if (!val) return;
  setToken(val);
  document.getElementById("sheet").innerHTML = `<h3>Token gemt</h3>
    <div class="ok-box"><i class="ti ti-check"></i> Token er gemt lokalt.</div>
    <p style="font-size:13px;color:var(--muted);margin-top:12px;line-height:1.5">
      Hvis Safari lige har spurgt om at gemme adgangskoden — sig <b>Yes</b>. Så synkroniseres til iCloud Keychain.
    </p>
    <div class="btn-row"><button class="primary" onclick="closeSheet()">Færdig</button></div>`;
}

function openSheet(action, entryId, dateIso){
  SHEET_STATE = { action, entryId, dateIso, confirmedWarn:false };
  renderSheet();
  document.getElementById("sheet-bg").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}
function closeSheet(){
  document.getElementById("sheet-bg").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
  SHEET_STATE = null;
}

async function renderSheet(){
  const s = SHEET_STATE; if (!s) return;
  const plan = await loadPlan();
  const day = plan.athletes.eva.days.find(d => d.date === s.dateIso);
  const entry = day && day.entries.find(e => e.id === s.entryId);
  const wo = entry ? entry.workout : null;
  const sheet = document.getElementById("sheet");
  const dateStr = (() => { const d = new Date(s.dateIso+"T12:00:00");
    return `${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}. ${MON_DA[d.getMonth()]}`; })();

  if (s.action === "adjust"){
    sheet.innerHTML = `<h3>Justér pas</h3><div class="sub">${dateStr} · ${esc(wo?.name||"")}</div>
      <label>Navn</label><input id="f-name" value="${esc(wo?.name||"")}">
      <label>Varighed (minutter)</label><input id="f-mins" type="number" value="${wo?.moving_time?Math.round(wo.moving_time/60):40}" min="10" max="240">
      <label>Beskrivelse</label><textarea id="f-desc">${esc(wo?.description||"")}</textarea>
      <label>Note</label><input id="f-note" value="${esc(entry?.note||"")}">
      <div id="sheet-msg"></div>
      <div class="btn-row"><button class="secondary" onclick="closeSheet()">Fortryd</button>
      <button class="primary" onclick="submitEdit()">Gem</button></div>`;
  }
  else if (s.action === "move"){
    const start = new Date(s.dateIso+"T12:00:00");
    const opts = [];
    for (let i=-3;i<=14;i++){
      if (i===0) continue;
      const d = addDays(start,i);
      const iso_ = iso(d);
      const targetDay = plan.athletes.eva.days.find(x=>x.date===iso_);
      const wos = targetDay ? targetDay.entries.filter(e=>e.workout).map(e=>e.workout.name).join(", ") : "";
      opts.push(`<button onclick="pickMoveTarget('${iso_}')"><b>${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}.${MON_DA[d.getMonth()]}</b><span>${esc(wos)||"hvile"}</span></button>`);
    }
    sheet.innerHTML = `<h3>Flyt pas</h3><div class="sub">${dateStr} · ${esc(wo?.name||"")}</div>
      <label>Vælg måldag (byt automatisk)</label>
      <div class="day-picker">${opts.join("")}</div>
      <div id="sheet-msg"></div>
      <div class="btn-row"><button class="secondary" onclick="closeSheet()">Fortryd</button></div>`;
  }
  else if (s.action === "swap"){
    const lib = await loadLib();
    // Vis kun eva-relevante templates + hvile
    const relevant = lib.templates.filter(t => (t.tags||[]).includes("eva") || t.id === "hvile");
    sheet.innerHTML = `<h3>${wo?"Skift pas":"Tilføj pas"}</h3><div class="sub">${dateStr}${wo?` · ${esc(wo.name)}`:""}</div>
      <div class="tpl-list">${relevant.map(t=>`
        <div class="tpl-item" onclick="pickTemplate('${t.id}')"><b>${esc(t.name)}</b>
        <span>${t.moving_time?`${Math.round(t.moving_time/60)} min`:"hvile"}</span></div>`).join("")}</div>
      <div id="sheet-msg"></div>
      <div class="btn-row"><button class="secondary" onclick="closeSheet()">Fortryd</button></div>`;
  }
  else if (s.action === "cancel"){
    sheet.innerHTML = `<h3>Aflys pas</h3><div class="sub">${dateStr} · ${esc(wo?.name||"")}</div>
      <p style="font-size:14px;margin:12px 0">Dagen bliver til hviledag. Kan altid ændres tilbage.</p>
      <label>Note (valgfri)</label><input id="f-note" value="Aflyst — hviledag">
      <div id="sheet-msg"></div>
      <div class="btn-row"><button class="secondary" onclick="closeSheet()">Fortryd</button>
      <button class="primary" onclick="submitEdit()">Aflys</button></div>`;
  }
}

function pickMoveTarget(targetIso){ SHEET_STATE.moveTarget = targetIso; submitEdit(); }
function pickTemplate(tplId){ SHEET_STATE.templateId = tplId; submitEdit(); }

async function submitEdit(){
  const s = SHEET_STATE; if (!s) return;

  let params = {};
  if (s.action === "adjust") {
    params = { name: v("f-name"),
               moving_time: parseInt(v("f-mins"))*60,
               description: v("f-desc"), note: v("f-note") };
  } else if (s.action === "move") {
    params = { target_date: s.moveTarget, mode: "swap" };
  } else if (s.action === "swap") {
    params = { template_id: s.templateId };
  } else if (s.action === "cancel") {
    params = { note: v("f-note") };
  }

  const requestId = "eva-" + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  const msg = document.getElementById("sheet-msg");
  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)"><i class="ti ti-loader"></i> Sender ændring…</div>`;

  const token = getToken();
  if (!token) { msg.innerHTML = `<div class="err-box">Ingen GitHub-token gemt. Tap Token øverst.</div>`; return; }

  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/dispatches`, {
    method:"POST", headers:{ "Authorization":`token ${token}`,
      "Accept":"application/vnd.github+json", "Content-Type":"application/json" },
    body: JSON.stringify({ event_type: "plan-edit", client_payload: {
      requestId, action: s.action, entryId: s.entryId, params,
      confirmedWarn: s.confirmedWarn, athlete: "eva" }})
  });
  if (r.status !== 204) {
    msg.innerHTML = `<div class="err-box">Dispatch fejlede: HTTP ${r.status}. Tjek token.</div>`;
    return;
  }

  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)">Behandler… (kan tage 20-40 sek)</div>`;
  for (let i=0; i<25; i++){
    await new Promise(r=>setTimeout(r, 3000));
    try {
      const res = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/data/edit_result.json?t=${Date.now()}`);
      if (!res.ok) continue;
      const results = await res.json();
      const r = results[requestId];
      if (!r) continue;
      if (r.status === "reject") {
        msg.innerHTML = `<div class="err-box"><b>Afvist:</b> ${esc(r.gate.msg)}</div>
          <button class="secondary" style="margin-top:10px;padding:8px 14px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);color:var(--teal);cursor:pointer" onclick="closeSheet()">OK</button>`;
        return;
      }
      if (r.status === "warn") {
        msg.innerHTML = `<div class="warn-box"><b>Advarsel:</b> ${esc(r.gate.msg)}</div>
          <div style="display:flex;gap:8px;margin-top:10px">
          <button class="secondary" onclick="closeSheet()" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);cursor:pointer">Fortryd</button>
          <button class="primary" onclick="confirmWarnAndRetry()" style="flex:1;padding:8px;border-radius:8px;border:none;background:var(--teal);color:var(--white);cursor:pointer">Fortsæt alligevel</button></div>`;
        return;
      }
      msg.innerHTML = `<div class="ok-box"><i class="ti ti-check"></i> Planen er opdateret. Word-master synkroniseret til OneDrive.</div>`;
      PLAN_CACHE = null;
      setTimeout(()=>{ closeSheet(); main(); }, 2000);
      return;
    } catch(e) { /* keep polling */ }
  }
  msg.innerHTML = `<div class="err-box">Timeout — tjek Actions-fanen på GitHub.</div>`;
}

async function confirmWarnAndRetry(){ SHEET_STATE.confirmedWarn = true; await submitEdit(); }

const v = id => document.getElementById(id).value;
function showIcsModal(){
  document.getElementById('ics-bg').classList.add('open');
  document.getElementById('ics-modal').style.display='block';
}
function closeIcs(){
  document.getElementById('ics-bg').classList.remove('open');
  document.getElementById('ics-modal').style.display='none';
}

async function downloadIcs(){
  // Genbrug allerede-loaded plan (main() henter den)
  const r = await fetch(`data/plan.json?t=${Date.now()}`, {cache:"no-store"});
  const plan = await r.json();
  const eva = plan.athletes.eva;

  const pad = n => String(n).padStart(2,'0');
  const fmtDate = (d, hour=8, min=0) => {
    const dt = new Date(d+"T00:00:00");
    dt.setHours(hour, min, 0);
    return `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
  };
  const escapeIcs = s => String(s||"").replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');

  const lines = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Fast as Fifty//Eva Medoc//EN",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "X-WR-CALNAME:Eva · Médoc",
    "X-WR-TIMEZONE:Europe/Copenhagen",
  ];

  const now = new Date();
  const dtstamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;

  for (const d of eva.days){
    for (const e of (d.entries||[])){
      const wo = e.workout;
      if (!wo) continue;
      const durMin = wo.moving_time ? Math.round(wo.moving_time/60) : 40;
      // Start kl 8:00 lokal tid — Eva løber typisk om morgenen
      const startStr = fmtDate(d.date, 8, 0);
      const endDt = new Date(d.date+"T08:00:00");
      endDt.setMinutes(endDt.getMinutes()+durMin);
      const endStr = fmtDate(d.date, endDt.getHours(), endDt.getMinutes());
      // Stabilt UID pr. entry (bruger entry-id fra plan.json)
      const uid = `${e.id||d.date}-eva@fast-as-50`;

      lines.push(
        "BEGIN:VEVENT",
        `UID:${uid}`,
        `DTSTAMP:${dtstamp}`,
        `DTSTART;TZID=Europe/Copenhagen:${startStr}`,
        `DTEND;TZID=Europe/Copenhagen:${endStr}`,
        `SUMMARY:${escapeIcs(wo.name)}`,
        `DESCRIPTION:${escapeIcs((wo.description||'') + (e.note?`\n\n${e.note}`:''))}`,
        "CATEGORIES:Træning",
        "END:VEVENT"
      );
    }
  }
  lines.push("END:VCALENDAR");

  const blob = new Blob([lines.join("\r\n")], {type:"text/calendar;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "eva-medoc.ics";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);

  closeIcs();
}
</script>
