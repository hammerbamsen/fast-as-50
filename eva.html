<!DOCTYPE html><!-- eva.html v20260707 — Evas Médoc-plan, selvstændig app. Sandhed: data/plan.json (athletes.eva). -->
<html lang="da">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eva · Médoc">
<link rel="manifest" href="manifest-eva.json">
<link rel="apple-touch-icon" href="icon-eva.svg">
<meta name="theme-color" content="#1A7A5E">
<title>Eva · Médoc</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/tabler-icons.min.css">
<style>
:root { --teal:#1A7A5E; --teal-d:#0F5741; --teal-l:#2E9B7A;
  --cream:#ECF4EF; --cream-d:#D8E6DE; --ink:#122019; --muted:#5E7A6D; --white:#FDFFFE; --gold:#BE863A; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { min-height:100%; background:var(--cream); font-family:'Hanken Grotesk',sans-serif; color:var(--ink); }
.top { background:var(--teal); color:#fff; padding:26px 18px 20px; }
.top h1 { font-size:21px; font-weight:700; }
.top .sub { font-size:13px; color:#CFE8DE; margin-top:4px; }
.main { padding:16px 14px 60px; max-width:560px; margin:0 auto; }
.focus { background:var(--white); border-left:4px solid var(--teal); border-radius:10px; padding:12px 14px; margin-top:4px; box-shadow:0 1px 2px rgba(18,32,25,.06); }
.focus .l { font-size:11px; font-weight:700; letter-spacing:.6px; color:var(--teal); text-transform:uppercase; }
.focus .t { font-size:15px; margin-top:3px; line-height:1.45; }
.wk-title { font-size:15px; font-weight:700; margin:22px 2px 2px; }
.wk-note { font-size:12.5px; color:var(--muted); margin:0 2px 6px; }
.day { background:var(--white); border-radius:12px; padding:14px; margin-top:10px; box-shadow:0 1px 2px rgba(18,32,25,.06); }
.day.today { outline:2px solid var(--gold); }
.day .d { font-size:12px; font-weight:600; color:var(--teal); letter-spacing:.3px; }
.day .d .today-tag { color:var(--gold); }
.day .n { font-size:17px; font-weight:600; margin-top:3px; }
.day .note { font-size:13.5px; color:var(--muted); margin-top:4px; line-height:1.5; }
.acc-head { display:flex; align-items:center; justify-content:space-between; background:var(--white); border-radius:10px; padding:12px 14px; margin-top:8px; cursor:pointer; box-shadow:0 1px 2px rgba(18,32,25,.06); }
.acc-head b { font-size:14px; }
.acc-head span { font-size:12px; color:var(--muted); }
.acc-body { display:none; }
.acc.open .acc-body { display:block; }
.acc .chev { color:var(--cream-d); transition:transform .15s; }
.acc.open .chev { transform:rotate(180deg); }
.section-title { font-size:15px; font-weight:700; margin:26px 2px 0; }
.done-banner { background:var(--white); border-radius:12px; padding:16px; margin-top:14px; text-align:center; color:var(--teal); font-weight:600; }
.err { background:#B03A2E14; border:1px solid #B03A2E40; color:#B03A2E; border-radius:10px; padding:12px; font-size:13px; margin-top:14px; }
.ics-btn { position:fixed; top:14px; right:14px; z-index:60; background:var(--white); border:1px solid var(--cream-d); border-radius:20px; padding:8px 14px; font-size:12px; color:var(--teal); cursor:pointer; font-family:'Hanken Grotesk',sans-serif; text-decoration:none; display:inline-flex; align-items:center; gap:6px; box-shadow:0 1px 2px rgba(18,32,25,.08); }
.ics-btn:hover { background:var(--cream); }
.ics-modal-bg { position:fixed; inset:0; background:rgba(18,32,25,.4); z-index:200; display:none; }
.ics-modal-bg.open { display:block; }
.ics-modal { position:fixed; left:14px; right:14px; top:60px; background:var(--white); border-radius:14px; padding:20px; z-index:201; max-width:520px; margin:0 auto; box-shadow:0 8px 24px rgba(18,32,25,.2); }
.ics-modal h3 { font-size:16px; font-weight:700; margin-bottom:6px; color:var(--teal); }
.ics-modal p { font-size:13px; color:var(--muted); line-height:1.5; margin:8px 0; }
.ics-modal button { width:100%; padding:12px; border-radius:10px; border:none; font-family:'Hanken Grotesk',sans-serif; font-size:14px; font-weight:600; cursor:pointer; background:var(--teal); color:#fff; margin-top:10px; }
.ics-modal .secondary { background:var(--cream); color:var(--teal); }
</style>
</head>
<body>
<button class="ics-btn" onclick="showIcsModal()"><i class="ti ti-calendar-plus" style="font-size:14px"></i> Kalender</button>
<div class="ics-modal-bg" id="ics-bg" onclick="closeIcs()"></div>
<div class="ics-modal" id="ics-modal" style="display:none">
  <h3><i class="ti ti-calendar-plus" style="font-size:16px;vertical-align:-2px"></i> Hent kalender</h3>
  <p>Tap knappen — hele planen downloades som en <b>.ics</b>-fil. Åbn filen når den er hentet: iPhone spørger om du vil tilføje alle løbe-pas til din kalender. Vælg din Outlook-kalender.</p>
  <p style="color:var(--teal);font-weight:600">39 træningspas · alle 13 uger frem til Marathon du Médoc</p>
  <button onclick="downloadIcs()"><i class="ti ti-download" style="font-size:14px;vertical-align:-2px"></i> Hent eva-medoc.ics</button>
  <button class="secondary" onclick="closeIcs()">Luk</button>
</div>
<div class="top">
  <h1><i class="ti ti-run" style="font-size:20px;vertical-align:-2px"></i> Eva · Médoc</h1>
  <div class="sub" id="head-sub">Henter plan …</div>
</div>
<main class="main" id="content"></main>

<script>
const DAYS_DA = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];
const MON_DA  = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
const esc = s => String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const iso = d => d.toISOString().slice(0,10);
const addDays = (d,n)=>{ const x=new Date(d); x.setDate(x.getDate()+n); return x; };

function weekNo(dateIso, startIso){
  return Math.floor((new Date(dateIso+"T12:00:00") - new Date(startIso+"T12:00:00"))/864e5/7)+1;
}

function dayCard(day, todayIso){
  const d = new Date(day.date+"T12:00:00");
  const isToday = day.date===todayIso;
  return (day.entries||[]).map(e=>{
    const w = e.workout||{};
    return `<div class="day ${isToday?"today":""}">
      <div class="d">${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}. ${MON_DA[d.getMonth()]}${isToday?` <span class="today-tag">· i dag</span>`:""}</div>
      <div class="n">${esc(w.name||"Træning")}</div>
      ${e.note?`<div class="note">${esc(e.note)}</div>`:""}</div>`;
  }).join("");
}

function weekDays(eva, w){
  const start = new Date(eva.program.start+"T12:00:00");
  const ws = addDays(start,(w-1)*7), we = addDays(ws,6);
  return eva.days.filter(d=>{ const t=new Date(d.date+"T12:00:00"); return t>=ws && t<=we; });
}

async function main(){
  const content = document.getElementById("content");
  let plan;
  try {
    const r = await fetch(`data/plan.json?t=${Date.now()}`, {cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    plan = await r.json();
  } catch(e){ content.innerHTML = `<div class="err">Kunne ikke hente planen — prøv igen om lidt.</div>`; return; }

  const eva = plan.athletes.eva;
  const todayIso = iso(new Date());
  const total = eva.program.totalWeeks;
  const cur = Math.min(Math.max(weekNo(todayIso, eva.program.start),1), total);
  const daysToRace = Math.max(0, Math.round((new Date(eva.program.raceDay+"T12:00:00")-new Date(todayIso+"T12:00:00"))/864e5));
  document.getElementById("head-sub").textContent =
    `Uge ${cur} af ${total} · ${daysToRace} dage til Marathon du Médoc`;

  const weekMeta = w => eva.weeks.find(x=>x.week===w) || {};
  let html = "";
  const curNote = weekMeta(cur).note;
  if(curNote) html += `<div class="focus"><div class="l">Ugens fokus</div><div class="t">${esc(curNote)}</div></div>`;

  for(let w=cur; w<=Math.min(cur+2,total); w++){
    const days = weekDays(eva,w);
    html += `<div class="wk-title">Uge ${w}${w===cur?" · denne uge":""}</div>`;
    if(w!==cur && weekMeta(w).note) html += `<div class="wk-note">${esc(weekMeta(w).note)}</div>`;
    html += days.length ? days.map(d=>dayCard(d,todayIso)).join("")
                        : `<div class="done-banner">Ingen pas planlagt endnu</div>`;
  }

  html += `<div class="section-title">Fuld plan · uge 1–${total}</div>`;
  for(let w=1; w<=total; w++){
    const days = weekDays(eva,w);
    html += `<div class="acc"><div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
      <span><b>Uge ${w}</b> &nbsp;<span>${esc(weekMeta(w).note||"")}</span></span>
      <i class="ti ti-chevron-down chev" style="font-size:16px"></i></div>
      <div class="acc-body">${days.map(d=>dayCard(d,todayIso)).join("")||""}</div></div>`;
  }
  content.innerHTML = html;
}
main();

// ═══ ICS CALENDAR EXPORT ═══
function showIcsModal(){
  document.getElementById('ics-bg').classList.add('open');
  document.getElementById('ics-modal').style.display='block';
}
function closeIcs(){
  document.getElementById('ics-bg').classList.remove('open');
  document.getElementById('ics-modal').style.display='none';
}

async function downloadIcs(){
  // Genbrug allerede-loaded plan (main() henter den)
  const r = await fetch(`data/plan.json?t=${Date.now()}`, {cache:"no-store"});
  const plan = await r.json();
  const eva = plan.athletes.eva;

  const pad = n => String(n).padStart(2,'0');
  const fmtDate = (d, hour=8, min=0) => {
    const dt = new Date(d+"T00:00:00");
    dt.setHours(hour, min, 0);
    return `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
  };
  const escapeIcs = s => String(s||"").replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');

  const lines = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Fast as Fifty//Eva Medoc//EN",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "X-WR-CALNAME:Eva · Médoc",
    "X-WR-TIMEZONE:Europe/Copenhagen",
  ];

  const now = new Date();
  const dtstamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;

  for (const d of eva.days){
    for (const e of (d.entries||[])){
      const wo = e.workout;
      if (!wo) continue;
      const durMin = wo.moving_time ? Math.round(wo.moving_time/60) : 40;
      // Start kl 8:00 lokal tid — Eva løber typisk om morgenen
      const startStr = fmtDate(d.date, 8, 0);
      const endDt = new Date(d.date+"T08:00:00");
      endDt.setMinutes(endDt.getMinutes()+durMin);
      const endStr = fmtDate(d.date, endDt.getHours(), endDt.getMinutes());
      // Stabilt UID pr. entry (bruger entry-id fra plan.json)
      const uid = `${e.id||d.date}-eva@fast-as-50`;

      lines.push(
        "BEGIN:VEVENT",
        `UID:${uid}`,
        `DTSTAMP:${dtstamp}`,
        `DTSTART;TZID=Europe/Copenhagen:${startStr}`,
        `DTEND;TZID=Europe/Copenhagen:${endStr}`,
        `SUMMARY:${escapeIcs(wo.name)}`,
        `DESCRIPTION:${escapeIcs((wo.description||'') + (e.note?`\n\n${e.note}`:''))}`,
        "CATEGORIES:Træning",
        "END:VEVENT"
      );
    }
  }
  lines.push("END:VCALENDAR");

  const blob = new Blob([lines.join("\r\n")], {type:"text/calendar;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "eva-medoc.ics";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);

  closeIcs();
}
</script>
</body>
</html>
