<style>

  --cream:#ECF4EF; --cream-d:#D8E6DE; --ink:#122019; --muted:#5E7A6D; --white:#FDFFFE; --gold:#BE863A; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { min-height:100%; background:var(--cream); font-family:'Hanken Grotesk',sans-serif; color:var(--ink); }

.acc-head { display:flex; align-items:center; justify-content:space-between; background:var(--white); border-radius:10px; padding:12px 14px; margin-top:8px; cursor:pointer; box-shadow:0 1px 2px rgba(18,32,25,.06); }

.token-btn { position:fixed; top:14px; right:110px; z-index:60; background:var(--white); border:1px solid var(--cream-d); border-radius:20px; padding:8px 14px; font-size:12px; color:var(--teal); cursor:pointer; font-family:'Hanken Grotesk',sans-serif; display:inline-flex; align-items:center; gap:6px; box-shadow:0 1px 2px rgba(18,32,25,.08); }

.ics-modal-bg.open { display:block; }

.ics-modal h3 { font-size:16px; font-weight:700; margin-bottom:6px; color:var(--teal); }
.ics-modal p { font-size:13px; color:var(--muted); line-height:1.5; margin:8px 0; }
.ics-modal button { width:100%; padding:12px; border-radius:10px; border:none; font-family:'Hanken Grotesk',sans-serif; font-size:14px; font-weight:600; cursor:pointer; background:var(--teal); color:#fff; margin-top:10px; }

.ics-week-btn:hover, .ics-week-btn.selected { background:var(--cream); border-color:var(--teal); }

</style>

  <h3><i class="ti ti-calendar-plus" style="font-size:16px;vertical-align:-2px"></i> Hent kalender</h3>
  <p>Vælg hvilke uger du vil have i din Outlook-kalender. Filen downloades — når du åbner den, spørger iPhone hvilken kalender pas skal tilføjes til.</p>
  <label style="display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:14px 0 8px">Vælg periode</label>

  <div id="push-toggle" style="margin-bottom:14px"></div>
  <button id="tour-restart" onclick="startTour()" style="background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit">Vis rundtur igen</button>

<script>
const DAYS_DA = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];
const MON_DA  = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
const esc = s => String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const iso = d => d.toISOString().slice(0,10);
const addDays = (d,n)=>{ const x=new Date(d); x.setDate(x.getDate()+n); return x; };

// ═══ PAT EXPIRY BANNER ═══
async function checkPatExpiry(){
  try {
    const r = await fetch(`data/config.json?t=${Date.now()}`, {cache:"no-store"});
    if (!r.ok) return;
    const cfg = await r.json();
    const daysLeft = Math.floor((new Date(cfg.patExpiry) - new Date())/86400000);
    if (daysLeft > cfg.warningDays) return;
    const existing = document.getElementById('pat-banner');
    if (existing) existing.remove();
    const isUrgent = daysLeft <= cfg.urgentDays;
    const banner = document.createElement('div');
    banner.id = 'pat-banner';
    banner.style.cssText = `background:${isUrgent?"#B03A2E":"#B7791F"};color:#fff;padding:10px 16px;font-size:13px;text-align:center;position:sticky;top:0;z-index:100;font-family:'Hanken Grotesk',sans-serif`;
    banner.innerHTML = `<b>${isUrgent?"⚠ PAT udløber om " + daysLeft + " dage":"PAT-udløb om " + daysLeft + " dage"}</b> · <a href="${cfg.renewalUrl}" style="color:#fff;text-decoration:underline">Fornyelse</a>`;
    document.body.insertBefore(banner, document.body.firstChild);
  } catch(e) { /* stille fejl */ }
}

function weekNo(dateIso, startIso){
  return Math.floor((new Date(dateIso+"T12:00:00") - new Date(startIso+"T12:00:00"))/864e5/7)+1;
}

function dayCard(day, todayIso){
  const d = new Date(day.date+"T12:00:00");
  const isToday = day.date===todayIso;
  const entries = day.entries||[];
  if (!entries.length || entries.every(e=>!e.workout)){
    // Hviledag
    const note = entries.map(e=>e.note).filter(Boolean).join(" · ") || "Hviledag";
    return `<div class="day ${isToday?"today":""}">
      <div class="d">${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}. ${MON_DA[d.getMonth()]}${isToday?` <span class="today-tag">· i dag</span>`:""}</div>
      <div class="n" style="color:var(--muted);font-weight:400;font-size:15px"><i class="ti ti-moon" style="font-size:14px;vertical-align:-2px"></i> ${esc(note)}</div>
      ${entries[0]?.id?`<div class="day-actions"><button onclick="openSheet('swap_template','${entries[0].id}','${day.date}')"><i class="ti ti-plus"></i> Tilføj pas</button></div>`:""}</div>`;
  }
  return entries.filter(e=>e.workout).map(e=>{
    const w = e.workout;
    const isDone = !!e.done;
    return `<div class="day ${isToday?"today":""} ${isDone?"done":""}">
      <button class="done-check ${isDone?"done":""}" onclick="toggleDone('${e.id}','${day.date}')" title="${isDone?"Fortryd — markér som ikke gennemført":"Markér som gennemført"}"><i class="ti ti-check" style="font-size:16px"></i></button>
      <div class="d">${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}. ${MON_DA[d.getMonth()]}${isToday?` <span class="today-tag">· i dag</span>`:""}${isDone && e.done_at ? ` <span style="color:var(--teal);font-size:11px">· gennemført ${e.done_at.slice(5).replace("-",".")}</span>`:""}</div>
      <div class="n" style="padding-right:44px">${esc(w.name||"Træning")}</div>
      ${e.note?`<div class="note" style="padding-right:44px">${esc(e.note)}</div>`:""}
      <div class="day-actions">
        <button onclick="openSheet('adjust','${e.id}','${day.date}')"><i class="ti ti-adjustments"></i> Justér</button>
        <button onclick="openSheet('move','${e.id}','${day.date}')"><i class="ti ti-arrows-move"></i> Flyt</button>
        <button onclick="openSheet('swap_template','${e.id}','${day.date}')"><i class="ti ti-refresh"></i> Skift</button>
        <button class="danger" onclick="openSheet('cancel','${e.id}','${day.date}')"><i class="ti ti-x"></i> Aflys</button>
      </div>
    </div>`;
  }).join("");
}

function weekDays(eva, w){
  const start = new Date(eva.program.start+"T12:00:00");
  const ws = addDays(start,(w-1)*7), we = addDays(ws,6);
  return eva.days.filter(d=>{ const t=new Date(d.date+"T12:00:00"); return t>=ws && t<=we; });
}

async function main(){
  await checkPatExpiry();
  const content = document.getElementById("content");
  let plan;
  try {
    const r = await fetch(`data/plan.json?t=${Date.now()}`, {cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    plan = await r.json();
  } catch(e){ content.innerHTML = u4Err("Kunne ikke hente planen: " + esc(e.message||e), {retry:"main()"}); return; }

  const eva = plan.athletes.eva;
  const todayIso = iso(new Date());
  const total = eva.program.totalWeeks;
  const cur = Math.min(Math.max(weekNo(todayIso, eva.program.start),1), total);
  const daysToRace = Math.max(0, Math.round((new Date(eva.program.raceDay+"T12:00:00")-new Date(todayIso+"T12:00:00"))/864e5));
  document.getElementById("head-sub").textContent =
    `Uge ${cur} af ${total} · ${daysToRace} dage til Marathon du Médoc`;

  const weekMeta = w => eva.weeks.find(x=>x.week===w) || {};
  let html = "";

  // ─── Fremgang-kort ───
  const allEntries = eva.days.flatMap(d => d.entries.filter(e=>e.workout).map(e=>({date:d.date, entry:e})));
  const done = allEntries.filter(x => x.entry.done);
  const total_workouts = allEntries.length;
  const doneCount = done.length;
  const completionPct = total_workouts > 0 ? Math.round(doneCount/total_workouts*100) : 0;

  // Ugentlig completion — hvor mange fuldførte pas i hver uge frem til nu
  const weeklyCompletion = [];
  for (let w=1; w<=cur; w++){
    const wDays = weekDays(eva, w);
    const wEntries = wDays.flatMap(d => d.entries.filter(e=>e.workout));
    if (!wEntries.length) continue;
    const wDone = wEntries.filter(e => e.done).length;
    weeklyCompletion.push({week:w, done:wDone, total:wEntries.length, pct: Math.round(wDone/wEntries.length*100)});
  }
  // Streak: fortløbende hele-uger fra denne uge tilbage
  let streak = 0;
  for (let i=weeklyCompletion.length-1; i>=0; i--){
    if (weeklyCompletion[i].pct === 100) streak++;
    else break;
  }
  // Denne uges pas
  const thisWeek = weeklyCompletion[weeklyCompletion.length-1] || {done:0, total:0};

  html += `<div class="focus" style="background:linear-gradient(135deg,#1A7A5E,#0F5C46);color:#fff">
    <div class="l" style="color:rgba(255,255,255,.7)">Fremgang</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px">
      <div>
        <div style="font-size:22px;font-weight:700">${doneCount}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.4px">Pas gjort</div>
      </div>
      <div>
        <div style="font-size:22px;font-weight:700">${thisWeek.done}/${thisWeek.total||0}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.4px">Denne uge</div>
      </div>
      <div>
        <div style="font-size:22px;font-weight:700">${streak}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.4px">Uge-streak</div>
      </div>
      <div>
        <div style="font-size:22px;font-weight:700">${daysToRace}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.4px">Dage → Médoc</div>
      </div>
    </div>
    ${weeklyCompletion.length >= 2 ? `<div style="display:flex;gap:3px;margin-top:12px;align-items:flex-end;height:32px">
      ${weeklyCompletion.map(w => `<div title="Uge ${w.week}: ${w.done}/${w.total} pas (${w.pct}%)" style="flex:1;background:rgba(255,255,255,.3);border-radius:2px 2px 0 0;height:${Math.max(w.pct,4)}%;transition:height .3s"></div>`).join("")}
    </div>` : ""}
  </div>`;

  const curNote = weekMeta(cur).note;
  if(curNote) html += `<div class="focus"><div class="l">Ugens fokus</div><div class="t">${esc(curNote)}</div></div>`;

  for(let w=cur; w<=Math.min(cur+2,total); w++){
    const days = weekDays(eva,w);
    html += `<div class="wk-title">Uge ${w}${w===cur?" · denne uge":""}</div>`;
    if(w!==cur && weekMeta(w).note) html += `<div class="wk-note">${esc(weekMeta(w).note)}</div>`;
    html += days.length ? days.map(d=>dayCard(d,todayIso)).join("")
                        : `<div class="done-banner">Ingen pas planlagt endnu</div>`;
  }

  html += `<div class="section-title">Fuld plan · uge 1–${total}</div>`;
  for(let w=1; w<=total; w++){
    const days = weekDays(eva,w);
    html += `<div class="acc"><div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
      <span><b>Uge ${w}</b> &nbsp;<span>${esc(weekMeta(w).note||"")}</span></span>
      <i class="ti ti-chevron-down chev" style="font-size:16px"></i></div>
      <div class="acc-body">${days.map(d=>dayCard(d,todayIso)).join("")||""}</div></div>`;
  }
  content.innerHTML = html;
}
main().then(() => { try { maybeStartTour(); } catch(e) { /* tour må aldrig vælte siden */ } });

// ═══ U3: ONBOARDING-TOUR — engangs rundvisning, gemt i localStorage ═══
const TOUR_KEY = "eva_tour_done_v1";
const TOUR_STEPS = [
  { sel: ".focus",         t: "Din fremgang",       d: "Pas gjort, denne uge, streak og dage til Médoc — opdateres automatisk." },
  { sel: ".day",           t: "Ugens pas",          d: "Hver dag har sit pas med beskrivelse. Dagens pas er fremhævet." },
  { sel: ".done-check",    t: "Markér gennemført",  d: "Tryk på fluebenet når du har trænet — så tæller det med i din streak." },

let TOUR_I = -1, TOUR_NODES = null;

function maybeStartTour(){
  if (localStorage.getItem(TOUR_KEY)) return;
  startTour();
}

function startTour(){
  tourTeardown();
  const hole = document.createElement("div");
  hole.id = "tour-hole";
  hole.style.cssText = "position:absolute;z-index:200;border-radius:12px;pointer-events:none;box-shadow:0 0 0 9999px rgba(18,32,25,.55);transition:all .25s ease";
  const tip = document.createElement("div");
  tip.id = "tour-tip";
  tip.style.cssText = "position:absolute;z-index:201;background:var(--white);border-radius:12px;padding:14px 16px;max-width:300px;box-shadow:0 6px 24px rgba(18,32,25,.25);font-family:inherit";
  document.body.appendChild(hole);
  document.body.appendChild(tip);
  TOUR_NODES = { hole, tip };
  TOUR_I = -1;
  window.addEventListener("resize", tourReposition, { passive: true });
  tourNext();
}

function tourNext(){
  if (!TOUR_NODES) return;
  TOUR_I++;
  // Spring trin over hvis elementet ikke findes (fx ingen pas med done-check endnu)
  while (TOUR_I < TOUR_STEPS.length && !tourTarget()) TOUR_I++;
  if (TOUR_I >= TOUR_STEPS.length) { tourEnd(); return; }
  const el = tourTarget();
  el.scrollIntoView({ block: "center", behavior: "auto" });
  requestAnimationFrame(() => requestAnimationFrame(tourReposition));
}

function tourTarget(){
  const step = TOUR_STEPS[TOUR_I];
  if (!step) return null;
  const els = document.querySelectorAll(step.sel);
  for (const el of els){
    const r = el.getBoundingClientRect();
    if (r.width > 0 && r.height > 0) return el;
  }
  return null;
}

function tourReposition(){
  if (!TOUR_NODES || TOUR_I < 0 || TOUR_I >= TOUR_STEPS.length) return;
  const el = tourTarget();
  if (!el) return;
  const step = TOUR_STEPS[TOUR_I];
  const r = el.getBoundingClientRect();
  const pad = 6, sy = window.scrollY, sx = window.scrollX;
  const { hole, tip } = TOUR_NODES;
  hole.style.left   = (sx + r.left - pad) + "px";
  hole.style.top    = (sy + r.top  - pad) + "px";
  hole.style.width  = (r.width  + pad*2) + "px";
  hole.style.height = (r.height + pad*2) + "px";
  tip.innerHTML = `
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">${TOUR_I+1} af ${TOUR_STEPS.length}</div>
    <div style="font-size:16px;font-weight:700;margin-top:2px">${esc(step.t)}</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45">${esc(step.d)}</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="tourEnd()" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px">Spring over</button>
      <button onclick="tourNext()" style="flex:1;padding:8px 10px;border-radius:8px;border:none;background:var(--teal);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600">${TOUR_I === TOUR_STEPS.length-1 ? "Færdig" : "Næste"}</button>
    </div>`;
  // Tip under målet hvis der er plads, ellers over
  const tipH = 150, below = r.bottom + tipH + 16 < window.innerHeight;
  const w = Math.min(300, window.innerWidth - 24);
  tip.style.width = w + "px";
  tip.style.left  = Math.max(12, Math.min(sx + r.left, sx + window.innerWidth - w - 12)) + "px";
  tip.style.top   = (below ? sy + r.bottom + 12 : Math.max(sy + 12, sy + r.top - tipH - 12)) + "px";
}

function tourEnd(){
  localStorage.setItem(TOUR_KEY, "1");
  tourTeardown();
}

function tourTeardown(){
  window.removeEventListener("resize", tourReposition);
  if (TOUR_NODES){ TOUR_NODES.hole.remove(); TOUR_NODES.tip.remove(); TOUR_NODES = null; }
  TOUR_I = -1;
}

// ── U4: Fejl-recovery — Prøv igen / Tjek igen / Rapportér fejl ───────
let U4_CTX = null;
function syncTitleDur(){
  const m=document.getElementById("f-mins"), n=document.getElementById("f-name");
  if(!m||!n||!m.value) return;
  n.value = n.value.replace(/(\d+)\s*min$/i, m.value + " min");
}
function u4Err(message, opts){
  opts = opts || {};
  U4_CTX = { ts: new Date().toISOString(), side: location.pathname,
             besked: String(message).replace(/<[^>]*>/g, ""),
             action: (typeof SHEET_STATE !== "undefined" && SHEET_STATE) ? SHEET_STATE.action : null,
             entryId: (typeof SHEET_STATE !== "undefined" && SHEET_STATE) ? SHEET_STATE.entryId : null,
             requestId: opts.requestId || null,
             browser: navigator.userAgent };
  const primary = 'flex:1;padding:8px 12px;border-radius:8px;border:none;background:var(--wine,var(--teal,#444));color:#fff;cursor:pointer;font-family:inherit';
  const second  = 'flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--cream-d,#ddd);background:var(--white,#fff);color:var(--wine,var(--teal,#444));cursor:pointer;font-family:inherit';
  const hint = opts.tokenHint
    ? `<div style="font-size:12px;margin-top:6px;opacity:.75">Ligner udløbet eller ugyldig token — forny via ⚙ Token (guide: docs/PAT_RENEWAL.md i repoet).</div>` : "";
  let btns = "";
  if (opts.retry)      btns += `<button style="${primary}" onclick="${opts.retry}">Prøv igen</button>`;
  if (opts.checkAgain) btns += `<button style="${primary}" onclick="u4CheckAgain('${opts.requestId}','${opts.target || "sheet-msg"}')">Tjek igen</button>`;
  btns += `<button style="${second}" onclick="u4Report(this)">Rapportér fejl</button>`;
  return `<div class="err-box">${message}${hint}</div>
    <div style="display:flex;gap:8px;margin-top:10px">${btns}</div>`;
}
async function u4Report(btnEl){
  const txt = "Fast as Fifty — fejlrapport\n" + JSON.stringify(U4_CTX || {}, null, 2);
  let ok = false;
  try { await navigator.clipboard.writeText(txt); ok = true; }
  catch(e){
    try { const ta = document.createElement("textarea"); ta.value = txt;
          ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.focus(); ta.select();
          ok = document.execCommand("copy"); ta.remove(); } catch(e2){}
  }
  if (btnEl) btnEl.textContent = ok ? "✓ Kopieret — indsæt i Claude" : "Kopiering fejlede";
}
async function u4CheckAgain(requestId, targetId){
  const el = document.getElementById(targetId || "sheet-msg");
  if (!el || !requestId) return;
  el.innerHTML = `<div class="ok-box" style="opacity:.8">Tjekker resultat…</div>`;
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/data/edit_result.json?t=${Date.now()}`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const results = await res.json();
    const r = results[requestId];
    if (!r) {
      el.innerHTML = u4Err("Stadig intet resultat. Workflowet kører muligvis endnu — eller fejlede (tjek Actions-fanen på GitHub).",
                           {requestId: requestId, checkAgain: true, target: targetId});
      return;
    }
    if (r.status === "ok") {
      el.innerHTML = `<div class="ok-box">Ændringen ER gennemført.</div>`;
      if (typeof PLAN_CACHE !== "undefined") PLAN_CACHE = null;
      setTimeout(function(){ if (typeof closeSheet === "function") closeSheet(); if (typeof main === "function") main(); }, 1500);
      return;
    }
    el.innerHTML = u4Err("Resultat: " + r.status + " — " + esc((r.gate && r.gate.msg) || ""), {requestId: requestId});
  } catch(e){
    el.innerHTML = u4Err("Kunne ikke hente resultat: " + esc(e.message || e),
                         {requestId: requestId, checkAgain: true, target: targetId});
  }
}

async function renderSheet(){

  const wo = entry ? entry.workout : null;
  const sheet = document.getElementById("sheet");
  const dateStr = (() => { const d = new Date(s.dateIso+"T12:00:00");
    return `${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}. ${MON_DA[d.getMonth()]}`; })();

  if (s.action === "adjust"){
    sheet.innerHTML = `<h3>Justér pas</h3><div class="sub">${dateStr} · ${esc(wo?.name||"")}</div>

async function submitEdit(){
  const s = SHEET_STATE; if (!s) return;

  let params = {};
  if (s.action === "adjust") {
    params = { name: v("f-name"),
               moving_time: parseInt(v("f-mins"))*60,
               description: v("f-desc"), note: v("f-note") };
  } else if (s.action === "move") {
    params = { target_date: s.moveTarget, mode: "swap" };
  } else if (s.action === "swap_template") {
    params = { template_id: s.templateId };
  } else if (s.action === "cancel") {
    params = { note: v("f-note") };
  }

  const requestId = "eva-" + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  const msg = document.getElementById("sheet-msg");
  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)"><i class="ti ti-loader"></i> Sender ændring…</div>`;

  const token = getToken();
  if (!token) { msg.innerHTML = `<div class="err-box">Ingen GitHub-token gemt. Tap Token øverst.</div>`; return; }

  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/dispatches`, {
    method:"POST", headers:{ "Authorization":`token ${token}`,
      "Accept":"application/vnd.github+json", "Content-Type":"application/json" },
    body: JSON.stringify({ event_type: "plan-edit", client_payload: {
      requestId, action: s.action, entryId: s.entryId, params,
      confirmedWarn: s.confirmedWarn, athlete: "eva" }})
  });
  if (r.status !== 204) {
    msg.innerHTML = u4Err(`Dispatch fejlede: HTTP ${r.status}.`, {retry:"submitEdit()", tokenHint: r.status===401||r.status===403});
    return;
  }

  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)">Behandler… (kan tage op til et par minutter)</div>`;
  for (let i=0; i<60; i++){
    await new Promise(r=>setTimeout(r, 3000));
    try {
      const res = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/data/edit_result.json?t=${Date.now()}`);
      if (!res.ok) continue;
      const results = await res.json();
      const r = results[requestId];
      if (!r) continue;
      if (r.status === "reject") {
        msg.innerHTML = `<div class="err-box"><b>Afvist:</b> ${esc(r.gate.msg)}</div>
          <button class="secondary" style="margin-top:10px;padding:8px 14px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);color:var(--teal);cursor:pointer" onclick="closeSheet()">OK</button>`;
        return;
      }
      if (r.status === "warn") {
        msg.innerHTML = `<div class="warn-box"><b>Advarsel:</b> ${esc(r.gate.msg)}</div>
          <div style="display:flex;gap:8px;margin-top:10px">
          <button class="secondary" onclick="closeSheet()" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);cursor:pointer">Fortryd</button>
          <button class="primary" onclick="confirmWarnAndRetry()" style="flex:1;padding:8px;border-radius:8px;border:none;background:var(--teal);color:var(--white);cursor:pointer">Fortsæt alligevel</button></div>`;
        return;
      }
      msg.innerHTML = `<div class="ok-box"><i class="ti ti-check"></i> Planen er opdateret. Word-master synkroniseret til OneDrive.</div>`;
      PLAN_CACHE = null;
      setTimeout(()=>{ closeSheet(); main(); }, 2000);
      return;
    } catch(e) { /* keep polling */ }
  }
  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)">Det tager længere tid end normalt (GitHub kan være langsom lige nu). Ændringen er sandsynligvis gennemført — luk og træk ned for at genindlæse.</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button style="flex:1;padding:8px 12px;border-radius:8px;border:none;background:var(--wine);color:#fff;cursor:pointer;font-family:inherit" onclick="u4CheckAgain('${requestId}','sheet-msg')">Tjek igen</button>
      <button style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);color:var(--wine);cursor:pointer;font-family:inherit" onclick="closeSheet(); main();">Luk &amp; genindlæs</button>
    </div>`;
}

async function confirmWarnAndRetry(){ SHEET_STATE.confirmedWarn = true; await submitEdit(); }

const v = id => document.getElementById(id).value;

async function toggleDone(entryId, dateIso){
  const token = getToken();
  if (!token) { alert("Ingen token gemt. Tap Token øverst."); return; }
  // Optimistic UI: opdater checkmark øjeblikkeligt
  const btn = event?.currentTarget;

  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/dispatches`, {
    method:"POST", headers:{ "Authorization":`token ${token}`,
      "Accept":"application/vnd.github+json", "Content-Type":"application/json" },
    body: JSON.stringify({ event_type: "plan-edit", client_payload: {
      requestId, action: "toggle_done", entryId, params: {},
      confirmedWarn: false, athlete: "eva" }})
  });
  if (r.status !== 204) {
    // Rul optimistic UI tilbage
    if (btn) { btn.classList.toggle('done'); btn.closest('.day')?.classList.toggle('done'); }
    alert(`Dispatch fejlede: HTTP ${r.status}`);

  PLAN_CACHE = null;
  setTimeout(()=>main(), 25000);  // stille refresh efter 25 sek
}

// ═══ ICS CALENDAR EXPORT (med uge-scope) ═══
let ICS_SCOPE = null;

function showIcsModal(){
  ICS_SCOPE = null;
  const btn = document.getElementById('ics-download-btn');
  const preview = document.getElementById('ics-preview');
  if (btn) btn.style.display = 'none';

async function pickIcsScope(weeks){
  ICS_SCOPE = weeks;
  document.querySelectorAll('.ics-week-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.weeks) === weeks);
  });
  const entries = await getIcsEntries(weeks);
  const preview = document.getElementById('ics-preview');
  const btn = document.getElementById('ics-download-btn');
  const btnText = document.getElementById('ics-btn-text');
  const labelMap = {1:'denne uge', 2:'denne + næste uge', 3:'3 uger frem', 0:'hele planen'};
  const fileMap = {1:'denne-uge', 2:'to-uger', 3:'tre-uger', 0:'hele'};
  if (entries.length === 0) {
    preview.textContent = 'Ingen pas i den valgte periode.';
    btn.style.display = 'none';
  } else {
    preview.textContent = `${entries.length} pas i ${labelMap[weeks]}`;
    btnText.textContent = `Hent eva-medoc-${fileMap[weeks]}.ics`;
    btn.style.display = 'block';
  }
}

async function getIcsEntries(weeks){
  const r = await fetch(`data/plan.json?t=${Date.now()}`, {cache:"no-store"});
  const plan = await r.json();
  const eva = plan.athletes.eva;
  const todayIso = iso(new Date());
  const start = new Date(todayIso+"T12:00:00");
  const monday = new Date(start);
  monday.setDate(monday.getDate() - ((start.getDay()+6)%7));
  const windowEnd = weeks === 0
    ? new Date(eva.program.raceDay+"T23:59:59")
    : addDays(monday, weeks*7);
  const entries = [];
  for (const d of eva.days){
    const dDate = new Date(d.date+"T00:00:00");
    if (dDate < monday || dDate >= windowEnd) continue;
    for (const e of (d.entries||[])){
      if (e.workout) entries.push({date:d.date, entry:e});
    }
  }
  return entries;
}

async function downloadIcs(){
  const weeks = ICS_SCOPE;
  if (weeks === null) return;
  const entries = await getIcsEntries(weeks);

  const pad = n => String(n).padStart(2,'0');
  const fmtDate = (d, hour=8, min=0) => {
    const dt = new Date(d+"T00:00:00");
    dt.setHours(hour, min, 0);
    return `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
  };
  const escapeIcs = s => String(s||"").replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');

  const lines = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Fast as Fifty//Eva Medoc//EN",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "X-WR-CALNAME:Eva · Médoc",
    "X-WR-TIMEZONE:Europe/Copenhagen",
  ];

  const now = new Date();
  const dtstamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;

  for (const {date, entry} of entries){
    const wo = entry.workout;
    const durMin = wo.moving_time ? Math.round(wo.moving_time/60) : 40;
    const startStr = fmtDate(date, 8, 0);
    const endDt = new Date(date+"T08:00:00");
    endDt.setMinutes(endDt.getMinutes()+durMin);
    const endStr = fmtDate(date, endDt.getHours(), endDt.getMinutes());
    const uid = `${entry.id||date}-eva@fast-as-50`;

    lines.push(
      "BEGIN:VEVENT",
      `UID:${uid}`,
      `DTSTAMP:${dtstamp}`,
      `DTSTART;TZID=Europe/Copenhagen:${startStr}`,
      `DTEND;TZID=Europe/Copenhagen:${endStr}`,
      `SUMMARY:${escapeIcs(wo.name)}`,
      `DESCRIPTION:${escapeIcs((wo.description||'') + (entry.note?`\n\n${entry.note}`:''))}`,
      "CATEGORIES:Træning",
      // Alarm dagen før kl 20:00 (12 timer før pas kl 8:00)
      "BEGIN:VALARM",
      "TRIGGER:-PT12H",
      "ACTION:DISPLAY",
      `DESCRIPTION:${escapeIcs("I morgen: " + wo.name)}`,
      "END:VALARM",
      // Alarm 30 min før
      "BEGIN:VALARM",
      "TRIGGER:-PT30M",
      "ACTION:DISPLAY",
      `DESCRIPTION:${escapeIcs("Om 30 min: " + wo.name)}`,
      "END:VALARM",
      "END:VEVENT"
    );
  }
  lines.push("END:VCALENDAR");

  const fileMap = {1:'denne-uge', 2:'to-uger', 3:'tre-uger', 0:'hele'};
  const blob = new Blob([lines.join("\r\n")], {type:"text/calendar;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `eva-medoc-${fileMap[weeks]}.ics`;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);

  closeIcs();
}

// -- U2: push athlete-id (Eva) + service worker-registrering --------
const PUSH_ATHLETE_ID = "eva";
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/fast-as-50/sw.js").then(reg => { reg.update(); });
}
// -- U2: Web Push opt-in (fælles for index.html + eva.html) --------
// VAPID public key (offentlig per design — privat nøgle ligger server-side).
const VAPID_PUBLIC = "BHyYLHHV0bt4MNTG3wI0syiiUJUpaPFtIKfgn1i-SK1Ng64KMR3aGc3I76ZDml50jv5bnQ_kRRNcvuDenVsU49M";
const PUSH_SUBSCRIBE_KEY = "fast50_push_sub";   // localStorage: sidst kendte subscription
const PUSH_ATHLETE = (typeof PUSH_ATHLETE_ID !== "undefined") ? PUSH_ATHLETE_ID : "kennet";

function _urlB64ToUint8(base64){
  const pad = "=".repeat((4 - base64.length % 4) % 4);
  const b64 = (base64 + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(b64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

// iOS Safari kræver at PWA'en er installeret til hjemmeskærm (display-mode:
// standalone) FØR Push virker. Vi detekterer det, så vi kan vise den rigtige
// besked til Eva i stedet for en knap der fejler tavst.
function _isStandalone(){
  return window.matchMedia("(display-mode: standalone)").matches
      || window.navigator.standalone === true;
}
function _isIOS(){
  return /iP(hone|ad|od)/.test(navigator.userAgent)
      || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}
function pushSupported(){
  return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;
}

// Returnerer: 'unsupported' | 'needs-install' | 'granted' | 'denied' | 'default'
function pushState(){
  if (!pushSupported()) return "unsupported";
  if (_isIOS() && !_isStandalone()) return "needs-install";
  return Notification.permission;   // 'granted' | 'denied' | 'default'
}

async function pushSubscribe(){
  if (!pushSupported()) return { ok:false, reason:"unsupported" };
  const perm = await Notification.requestPermission();
  if (perm !== "granted") return { ok:false, reason:perm };
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub){
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: _urlB64ToUint8(VAPID_PUBLIC),
    });
  }
  const subJson = sub.toJSON();
  subJson.athlete = PUSH_ATHLETE;
  localStorage.setItem(PUSH_SUBSCRIBE_KEY, JSON.stringify(subJson));
  // Send til backend (aktiveres i Spor B — sendSubscription defineres der).
  if (typeof sendSubscriptionToBackend === "function"){
    try { await sendSubscriptionToBackend(subJson); }
    catch(e){ console.warn("push: kunne ikke sende subscription til backend", e); }
  }
  return { ok:true, subscription:subJson };
}

async function pushUnsubscribe(){
  if (!pushSupported()) return;
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  if (sub) await sub.unsubscribe();
  localStorage.removeItem(PUSH_SUBSCRIBE_KEY);
}

// Renderer opt-in-knap/-status i et givet container-element.
async function renderPushToggle(containerId){
  const el = document.getElementById(containerId);
  if (!el) return;
  const st = pushState();
  const wrap = (inner) => `<div style="font-size:13px;line-height:1.5">${inner}</div>`;
  if (st === "unsupported"){
    el.innerHTML = wrap("Påmindelser understøttes ikke i denne browser.");
    return;
  }
  if (st === "needs-install"){
    el.innerHTML = wrap('For at få påmindelser på iPhone: tryk <b>Del</b>-ikonet og vælg <b>Føj til hjemmeskærm</b>. Åbn derefter appen fra hjemmeskærmen.');
    return;
  }
  if (st === "granted"){
    el.innerHTML = wrap('Påmindelser er slået <b>til</b> · <button id="push-off" style="background:none;border:none;color:var(--muted,#888);text-decoration:underline;cursor:pointer;font:inherit">slå fra</button>');
    const off = document.getElementById("push-off");
    if (off) off.onclick = async () => { await pushUnsubscribe(); renderPushToggle(containerId); };
    return;
  }
  if (st === "denied"){
    el.innerHTML = wrap("Påmindelser er blokeret. Slå dem til i browserens indstillinger for denne side.");
    return;
  }
  // default — tilbyd opt-in
  el.innerHTML = `<button id="push-on" style="padding:8px 14px;border-radius:8px;border:none;background:var(--teal,var(--wine,#59182A));color:#fff;cursor:pointer;font:inherit;font-size:13px">Slå daglige påmindelser til</button><div id="push-msg" style="font-size:12px;color:var(--muted,#888);margin-top:6px"></div>`;
  const on = document.getElementById("push-on");
  on.onclick = async () => {
    const msg = document.getElementById("push-msg");
    if (msg) msg.textContent = "Aktiverer…";
    const r = await pushSubscribe();
    if (r.ok) renderPushToggle(containerId);
    else if (msg) msg.textContent = r.reason === "denied"
      ? "Du afviste påmindelser. Slå dem til i browserindstillinger."
      : "Kunne ikke aktivere påmindelser (" + r.reason + ").";
  };
}

// Render push-toggle når siden er klar
// -- U2: send subscription til backend via repository_dispatch --------
// Genbruger klientens gemte GitHub-token (samme som plan-edit-flowet).
// Fejler stille hvis ingen token — subscription er allerede gemt lokalt.
const PUSH_GH_REPO = "hammerbamsen/fast-as-50";
async function sendSubscriptionToBackend(subJson){
  const token = localStorage.getItem("af_gh_token");
  if (!token){
    console.warn("push: ingen GitHub-token — subscription gemt lokalt, ikke sendt til server");
    return { ok:false, reason:"no-token" };
  }
  const r = await fetch(`https://api.github.com/repos/${PUSH_GH_REPO}/dispatches`, {
    method:"POST",
    headers:{ "Authorization":`token ${token}`,
              "Accept":"application/vnd.github+json",
              "Content-Type":"application/json" },
    body: JSON.stringify({ event_type:"push-subscribe", client_payload:{ subscription:subJson } })
  });
  return { ok: r.status === 204, status: r.status };
}
renderPushToggle("push-toggle");
