<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest-af.json">
<link rel="apple-touch-icon" href="af-icon.png">
<title>AF-dag?</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600&family=Hanken+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #ECE4D7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; font-family: 'Hanken Grotesk', sans-serif; }
  .card { background: #FDFAF6; border-radius: 16px; padding: 32px 24px; max-width: 360px; width: 100%; text-align: center; border: 1px solid #DDD3C3; }
  .label { font-family: 'Space Mono', monospace; font-size: 10px; color: #7A6A58; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .date { font-family: 'Newsreader', serif; font-size: 28px; color: #1E3A5C; margin-bottom: 4px; }
  .note { font-family: 'Space Mono', monospace; font-size: 10px; color: #BE863A; margin-bottom: 6px; letter-spacing: 0.05em; }
  .question { font-size: 16px; color: #1A1008; margin-bottom: 16px; line-height: 1.5; }
  .streak-box { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
  .streak-item { text-align: center; }
  .streak-num { font-family: 'Newsreader', serif; font-size: 32px; color: #1E3A5C; line-height: 1; }
  .streak-lbl { font-family: 'Space Mono', monospace; font-size: 9px; color: #7A6A58; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .streak-fire { font-size: 18px; }
  .buttons { display: flex; gap: 12px; margin-bottom: 16px; }
  .btn { flex: 1; padding: 18px 12px; border-radius: 10px; border: none; font-family: 'Hanken Grotesk', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-ja  { background: #1E3A5C; color: #ECE4D7; }
  .btn-nej { background: #DDD3C3; color: #7A6A58; }
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .week-nav-btn { background: none; border: none; font-family: 'Space Mono', monospace; font-size: 16px; color: #7A6A58; cursor: pointer; padding: 4px 8px; }
  .week-nav-btn:disabled { color: #DDD3C3; cursor: default; }
  .week-nav-lbl { font-family: 'Space Mono', monospace; font-size: 9px; color: #7A6A58; letter-spacing: 0.08em; text-transform: uppercase; }
  .week-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
  .day-dot { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; cursor: default; }
  .dot-af    { background: #1E3A5C; color: #ECE4D7; }
  .dot-nej   { background: #DDD3C3; color: #7A6A58; }
  .dot-today { outline: 2px solid #BE863A; outline-offset: 2px; }
  .dot-active{ outline: 2px solid #1E3A5C; outline-offset: 2px; }
  .dot-empty { background: #ECE4D7; color: #C8BBA8; border: 1px dashed #DDD3C3; }
  .dot-future{ background: #ECE4D7; color: #DDD3C3; border: 1px solid #ECE4D7; }
  .status { font-size: 13px; color: #7A6A58; min-height: 18px; margin-bottom: 4px; }
  .status.ok  { color: #1A7A5E; font-weight: 600; }
  .status.err { color: #C0392B; }
  .done-title { font-family: 'Newsreader', serif; font-size: 24px; color: #1E3A5C; margin-bottom: 8px; }
  .done-sub   { font-size: 14px; color: #7A6A58; line-height: 1.6; margin-bottom: 4px; }
  .setup-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #DDD3C3; font-family: 'Space Mono', monospace; font-size: 12px; margin-bottom: 12px; background: #ECE4D7; }
  .btn-setup { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #1E3A5C; color: #ECE4D7; font-family: 'Hanken Grotesk', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
  .footer { margin-top: 18px; font-family: 'Space Mono', monospace; font-size: 9px; color: #7A6A58; }
  a.dash-link { color: #BE863A; text-decoration: none; font-weight: 700; }
  .refresh-btn { background: none; border: 1px solid #DDD3C3; border-radius: 8px; padding: 7px 16px; font-family: 'Space Mono', monospace; font-size: 9px; color: #7A6A58; letter-spacing: .08em; cursor: pointer; margin-top: 12px; }
  .refresh-btn:active { background: #DDD3C3; }
  .last-updated { font-family: 'Space Mono', monospace; font-size: 8px; color: #7A6A58; margin-top: 4px; min-height: 12px; letter-spacing: .06em; }
  #ptr-indicator { position:fixed; top:0; left:0; right:0; height:0; background:#1E3A5C; color:#BE863A; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; overflow:hidden; z-index:999; transition:height .15s ease; pointer-events:none; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #DDD3C3; border-top-color: #1E3A5C; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card"><div id="view"></div></div>
<script>
const STORAGE_KEY = "af_log_v3";
const SECRET_KEY  = "af_plan_secret";  // delt hemmelighed til Worker'ens dispatch-ruter

let WORKER_CONFIG = null;
async function loadWorkerConfig(){
  if (WORKER_CONFIG) return WORKER_CONFIG;
  try {
    const r = await fetch(`data/auth_config.json?t=${Date.now()}`, {cache:"no-store"});
    WORKER_CONFIG = r.ok ? await r.json() : { workerUrl: "" };
  } catch(e) {
    WORKER_CONFIG = { workerUrl: "" };
  }
  return WORKER_CONFIG;
}
async function dispatchViaWorker(path, clientPayload){
  const cfg = await loadWorkerConfig();
  const secret = getSecret();
  if (!secret) throw new Error("Ingen hemmelighed gemt.");
  if (!cfg.workerUrl) throw new Error("Worker-URL ikke sat i data/auth_config.json.");
  const r = await fetch(`${cfg.workerUrl.replace(/\/$/, "")}${path}`, {
    method: "POST",
    headers: { "X-Plan-Secret": secret, "Content-Type": "application/json" },
    body: JSON.stringify(clientPayload)
  });
  if (!r.ok) {
    const errText = await r.text().catch(()=>"");
    const err = new Error(`HTTP ${r.status}. ${errText.slice(0,200)}`);
    err.status = r.status;
    throw err;
  }
  return r;
}

const DK_DAYS   = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
const DK_MONTHS = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
const SHORT     = ["Søn","Man","Tir","Ons","Tor","Fre","Lør"];

// ── Datofunktioner ────────────────────────────────────────────
function toKey(d)   { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayKey() { return toKey(new Date()); }
function mondayOf(d){ const m=new Date(d); const diff=m.getDay()===0?-6:1-m.getDay(); m.setDate(m.getDate()+diff); m.setHours(0,0,0,0); return m; }
function weekStart(){ return mondayOf(new Date()); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function formatDate(k){ const d=new Date(k+'T12:00:00'); return `${DK_DAYS[d.getDay()]} ${d.getDate()}. ${DK_MONTHS[d.getMonth()]}`; }
function formatWeekLabel(mon){
  const sun=addDays(mon,6);
  if(mon.getMonth()===sun.getMonth()) return `${mon.getDate()}–${sun.getDate()}. ${DK_MONTHS[mon.getMonth()]}`;
  return `${mon.getDate()}. ${DK_MONTHS[mon.getMonth()]} – ${sun.getDate()}. ${DK_MONTHS[sun.getMonth()]}`;
}

// ── Storage ───────────────────────────────────────────────────
function getSecret() { return localStorage.getItem(SECRET_KEY) || ''; }
function setSecret(s){ localStorage.setItem(SECRET_KEY, s); }
function getLog()     { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { return {}; } }
function saveLog(log) { localStorage.setItem(STORAGE_KEY, JSON.stringify(log)); }

// ── Streak beregning (fra localStorage — optimistisk visning) ──
// data.json's autoritative af_log/streak opdateres nu server-side af
// af-registrering.yml (se worker.js's /af-registrering + workflowets
// update_kpi.py-kald), ikke længere af browseren direkte.
let globalStreak = 0;

function calcStreak(log) {
  // Gå baglæns fra i går og tæl sammenhængende AF-dage
  let streak = 0;
  let check = new Date();
  // Tillad op til 2 uregistrerede dage i halen (i dag + i går
  // kan mangle, da check-in ofte sker næste aften)
  let grace = 2;
  while(grace > 0 && log[toKey(check)] === undefined) { check = addDays(check, -1); grace--; }
  if(log[toKey(check)] === false) { return 0; } // Ikke-AF dag stopper streak
  while(log[toKey(check)] === true) { streak++; check = addDays(check, -1); }
  return streak;
}

function afCountForWeek(mon, log) {
  const today = todayKey();
  let count = 0;
  for(let i=0;i<7;i++){
    const k = toKey(addDays(mon,i));
    if(k > today) break;
    if(log[k] === true) count++;
  }
  return count;
}

// ── Uge-strip (kan vise en vilkårlig uge) ────────────────────
function weekStrip(mon, activeKey, log) {
  const today = todayKey();
  let h = '<div class="week-row">';
  for(let i=0;i<7;i++){
    const d = addDays(mon, i);
    const k = toKey(d);
    if(k > today) { h+=`<div class="day-dot dot-future">${SHORT[d.getDay()]}</div>`; continue; }
    const v = log[k];
    let c = 'day-dot ';
    if(v===true) c+='dot-af'; else if(v===false) c+='dot-nej'; else c+='dot-empty';
    if(k===today) c+=' dot-today';
    if(k===activeKey&&k!==today) c+=' dot-active';
    h+=`<div class="${c}">${SHORT[d.getDay()]}</div>`;
  }
  return h+'</div>';
}

// ── Ugenavigation ─────────────────────────────────────────────
let viewWeekOffset = 0; // 0 = denne uge, -1 = forrige uge, osv.

function getViewMonday() {
  const m = weekStart();
  m.setDate(m.getDate() + viewWeekOffset * 7);
  return m;
}

function renderWeekNav(mon) {
  const isCurrentWeek = viewWeekOffset === 0;
  const weekLbl = isCurrentWeek ? 'DENNE UGE' : formatWeekLabel(mon);
  return `
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">←</button>
      <div class="week-nav-lbl">${weekLbl}</div>
      <button class="week-nav-btn" onclick="changeWeek(1)" ${isCurrentWeek?'disabled':''}>→</button>
    </div>
  `;
}

function changeWeek(dir) {
  if(dir === 1 && viewWeekOffset >= 0) return;
  viewWeekOffset += dir;
  // Max 8 uger tilbage (projektstart)
  if(viewWeekOffset < -8) { viewWeekOffset = -8; return; }
  showDone(); // Refresh done-skærm med ny uge
}

// ── Queue (kun denne uge) ─────────────────────────────────────
function buildQueue() {
  const log=getLog(), q=[];
  const mon=weekStart(), today=todayKey();
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const k=toKey(d);
    if(k>today) break;
    if(log[k]===undefined) q.push(k);
  }
  return q;
}

// ── Setup ─────────────────────────────────────────────────────
function showSetup() {
  document.getElementById('view').innerHTML = `
    <div class="label">Fast as Fifty · Opsætning</div>
    <div class="date" style="font-size:20px;margin-bottom:16px">Første gang</div>
    <p style="font-size:13px;color:#7A6A58;margin-bottom:20px;line-height:1.6">
      Safari tilbyder at gemme den i iCloud Keychain — så du aldrig mister den igen.
    </p>
    <form id="setup-form" action="javascript:void(0)" autocomplete="on" onsubmit="saveSetup(event)">
      <input type="text" name="username" value="fast-as-50" autocomplete="username" style="display:none" readonly>
      <input class="setup-input" id="token-input" type="password"
             name="password" autocomplete="current-password"
             placeholder="delt hemmelighed" required>
      <button class="btn-setup" type="submit">Gem og fortsæt</button>
    </form>
    <p style="font-size:11px;color:#7A6A58;margin-top:12px;line-height:1.5">
      Første gang: sig <b>Yes</b> til Safaris tilbud om at gemme adgangskoden.<br>
      Har du mistet den? Klik i tekstfeltet → Safari foreslår hemmeligheder den har gemt.
    </p>
  `;
  setTimeout(()=>document.getElementById('token-input')?.focus(), 120);
}

function saveSetup(e) {
  if (e) e.preventDefault();
  const t = document.getElementById('token-input').value.trim();
  if(!t) { alert('Indsæt en hemmelighed først.'); return; }
  setSecret(t);
  // Skriv koden ind i sidens adresse, saa 'Foej til hjemmeskaerm' fanger den automatisk.
  try { history.replaceState({}, '', location.pathname + '#s=' + encodeURIComponent(t)); } catch(_e){}
  init();
}

// ── Spørgsmål ─────────────────────────────────────────────────
let queue=[], qIdx=0;

function showQuestion(key) {
  const log = getLog();
  const streak = globalStreak > 0 ? globalStreak : calcStreak(log);
  const weekCount = afCountForWeek(weekStart(), log);
  const isToday = key===todayKey();
  document.getElementById('view').innerHTML=`
    <div class="label">Fast as Fifty · AF-dag</div>
    <div class="date">${formatDate(key)}</div>
    ${!isToday?'<div class="note">MANGLER REGISTRERING</div>':''}
    <div class="question">Var det en alkoholfri dag?</div>
    <div class="streak-box">
      <div class="streak-item">
        <div class="streak-num">${streak}</div>
        <div class="streak-lbl">Streak</div>
      </div>
      <div class="streak-item" style="padding-top:6px;color:#7A6A58;font-size:20px">·</div>
      <div class="streak-item">
        <div class="streak-num">${weekCount}/7</div>
        <div class="streak-lbl">Denne uge</div>
      </div>
    </div>
    <div class="buttons">
      <button class="btn btn-ja" onclick="answer(true)">Ja</button>
      <button class="btn btn-nej" onclick="answer(false)">Nej</button>
    </div>
    ${renderWeekNav(weekStart())}
    ${weekStrip(weekStart(), key, log)}
    <div class="status" id="status"></div>
    <div class="footer"><a class="dash-link" href="https://hammerbamsen.github.io/fast-as-50">Åbn dashboard</a></div>
  `;
}

// ── Done-skærm (med ugebladring) ──────────────────────────────
function showDone() {
  const log = getLog();
  const mon = getViewMonday();
  const streak = globalStreak > 0 ? globalStreak : calcStreak(log);
  const weekCount = afCountForWeek(mon, log);
  const isCurrentWeek = viewWeekOffset === 0;
  const msg = weekCount>=5?'Mål nået!':weekCount>=3?'God uge — fortsæt.':'Keep moving forward.';

  document.getElementById('view').innerHTML=`
    <div class="label">Fast as Fifty · AF-dag</div>
    <div class="streak-box" style="margin-bottom:16px">
      <div class="streak-item">
        <div class="streak-num">${streak}</div>
        <div class="streak-lbl">Streak</div>
      </div>
      <div class="streak-item" style="padding-top:6px;color:#7A6A58;font-size:20px">·</div>
      <div class="streak-item">
        <div class="streak-num">${weekCount}/7</div>
        <div class="streak-lbl">${isCurrentWeek?'Denne uge':formatWeekLabel(mon)}</div>
      </div>
    </div>
    ${isCurrentWeek?`<div class="done-sub" style="margin-bottom:12px">${msg}</div>`:''}
    ${renderWeekNav(mon)}
    ${weekStrip(mon, null, log)}
    <div class="footer" style="margin-top:8px">
      <a class="dash-link" href="https://hammerbamsen.github.io/fast-as-50">Åbn dashboard</a>
      <br>
      <button class="refresh-btn" onclick="triggerRefresh()">↻ OPDATÉR DATA</button>
      <div class="last-updated" id="last-updated-af" style="text-align:center"></div>
    </div>
  `;
  updateLastUpdated();
}

// ── Refresh ────────────────────────────────────────────────────
async function triggerRefresh() {
  const btn = document.querySelector('.refresh-btn');
  if(!btn) return;
  btn.disabled = true;
  btn.textContent = '↻ HENTER...';
  try {
    await init();
    btn.textContent = '✓ OPDATERET';
    setTimeout(() => { if(btn) { btn.textContent = '↻ OPDATÉR DATA'; btn.disabled = false; } }, 2000);
  } catch(e) {
    btn.textContent = '↻ OPDATÉR DATA';
    btn.disabled = false;
  }
}

function updateLastUpdated() {
  const el = document.getElementById('last-updated-af');
  if(el) el.textContent = 'SIDST OPDATERET ' + new Date().toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'});
}

// ── Pull-to-refresh ────────────────────────────────────────────
(function() {
  let startY = 0, pulling = false;
  const threshold = 80;
  const ptr = document.createElement('div');
  ptr.id = 'ptr-indicator';
  ptr.textContent = '↓ TRÆK FOR AT OPDATERE';
  document.body.appendChild(ptr);
  document.addEventListener('touchstart', e => {
    if(window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if(!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 0) {
      ptr.style.height = Math.min(dy * 0.5, 56) + 'px';
      ptr.textContent = dy > threshold ? '↑ SLIP FOR AT OPDATERE' : '↓ TRÆK FOR AT OPDATERE';
    }
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if(!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    ptr.style.height = '0';
    if(dy > threshold) { ptr.style.height = '44px'; setTimeout(() => window.location.reload(true), 400); }
  }, { passive: true });
})();

// ── Svar ──────────────────────────────────────────────────────
// ── U4: Fejl-recovery — Prøv igen / Rapportér fejl ──────────────────
let U4_CTX = null;
function u4Err(containerId, message, opts){
  opts = opts || {};
  U4_CTX = { ts:new Date().toISOString(), side:location.pathname,
             besked:String(message).replace(/<[^>]*>/g,""), browser:navigator.userAgent };
  const el = document.getElementById(containerId);
  if(!el) return;
  const primary='padding:8px 14px;border-radius:8px;border:none;background:#2A4E78;color:#fff;cursor:pointer;font:inherit';
  const second ='padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#2A4E78;cursor:pointer;font:inherit';
  const hint = opts.tokenHint
    ? '<div style="font-size:12px;margin-top:6px;opacity:.8">Ligner en forkert eller manglende delt hemmelighed \u2014 \u00e5bn ?reset og inds\u00e6t den igen.</div>' : '';
  let btns='';
  if(opts.retry) btns += '<button style="'+primary+'" onclick="'+opts.retry+'">Pr\u00f8v igen</button>';
  btns += '<button style="'+second+'" onclick="u4Report(this)">Rapport\u00e9r fejl</button>';
  el.className='status err';
  el.style.cssText='';
  el.innerHTML = '<div style="padding:10px;background:#FAEEDA;border-radius:10px;color:#633806">\u26a0 '+message+hint+'</div>'
    + '<div style="display:flex;gap:8px;margin-top:8px;justify-content:center">'+btns+'</div>';
}
async function u4Report(btnEl){
  const txt = 'Fast as Fifty \u2014 fejlrapport\n' + JSON.stringify(U4_CTX || {}, null, 2);
  let ok=false;
  try { await navigator.clipboard.writeText(txt); ok=true; }
  catch(e){ try { const ta=document.createElement('textarea'); ta.value=txt;
        ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
        ta.focus(); ta.select(); ok=document.execCommand('copy'); ta.remove(); } catch(e2){} }
  if(btnEl) btnEl.textContent = ok ? '\u2713 Kopieret \u2014 inds\u00e6t i Claude' : 'Kopiering fejlede';
}

async function answer(isAF) {
  const key = queue[qIdx];
  const log = getLog(); log[key] = isAF;  // kun i memory — gemmes først ved succes
  document.querySelector('.buttons').style.display='none';
  document.getElementById('status').innerHTML='<span class="spinner"></span>Sender...';

  try {
    // Dispatch til Worker'en — af-registrering.yml opdaterer Intervals.icu OG
    // data.json's af_log/streak server-side (kalder update_kpi.py). Streak
    // vist her er optimistisk (fra lokal log) — autoritativ værdi lander i
    // data.json få sekunder senere.
    await dispatchViaWorker('/af-registrering', { date: key, alkohol: isAF ? 0 : 1 });

    // Lykkedes — gem lokalt NU
    saveLog(log);
    const streak = calcStreak(log);

    const statusEl = document.getElementById('status');
    statusEl.className='status ok';
    statusEl.innerHTML = isAF
      ? '<span style="font-size:20px">\u2713</span> Registreret som AF-dag'
      : '<span style="font-size:20px">\u2713</span> Registreret';
    statusEl.style.cssText='color:#1A7A5E;font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;justify-content:center;padding:10px;background:#E1F5EE;border-radius:10px;margin-top:8px';
    globalStreak = streak;
    await new Promise(r=>setTimeout(r,1200));

  } catch(e) {
    console.error('AF push fejl:', e);
    const detail = String(e && e.message ? e.message : e).replace(/[<>]/g,'');
    u4Err('status', 'Ikke gemt \u2014 ' + detail,
          { retry: 'answer(' + (isAF ? 'true' : 'false') + ')',
            tokenHint: /401|403|Bad credentials/i.test(detail) });
    return;   // bliv stående — advance kun ved success, så registreringen ikke tabes
  }
  qIdx++; qIdx<queue.length?showQuestion(queue[qIdx]):showDone();
}


// ── Sync fra data.json (Intervals-data) ───────────────────────
async function syncFromIntervals() {
  try {
    const r = await fetch('https://raw.githubusercontent.com/hammerbamsen/fast-as-50/main/data.json?t=' + Date.now());
    if(!r.ok) return;
    const data = await r.json();

    // Synk af_log fra Intervals (denne uge)
    if(data.af_log && typeof data.af_log === 'object') {
      const log = getLog();
      let changed = false;
      Object.entries(data.af_log).forEach(([date, val]) => {
        if(log[date] === undefined) {
          log[date] = (val === 0);
          changed = true;
        }
      });
      if(changed) saveLog(log);
    }

    // Sæt global streak fra data.json hvis tilgængelig
    if(data.af && data.af.streak !== undefined) {
      globalStreak = data.af.streak;
    }
  } catch(e) {
    console.log('Sync fejl:', e.message);
  }
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  if(window.location.search.includes('reset')) {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(SECRET_KEY);
    window.history.replaceState({}, '', window.location.pathname);
  }
  // Seed delt hemmelighed fra URL-hash (#s=...) — lader et hjemmeskaerms-ikon
  // saa koden ind igen ved HVER aabning, saa den overlever at iOS rydder localStorage.
  // Hash-delen sendes aldrig til nogen server; koden ligger kun paa enheden.
  try {
    var _seed = new URLSearchParams((location.hash||'').replace(/^#/,'')).get('s');
    if(_seed){ setSecret(_seed); }
  } catch(_e){}
  if(!getSecret()) { showSetup(); return; }

  document.getElementById('view').innerHTML = '<div style="text-align:center;padding:40px;font-family:Space Mono,monospace;font-size:11px;color:#7A6A58;letter-spacing:.08em">HENTER DATA...</div>';

  await syncFromIntervals();

  queue = buildQueue();
  qIdx = 0;
  queue.length===0 ? showDone() : showQuestion(queue[0]);
}

init();
</script>
