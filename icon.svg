<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Baggrund -->
  <rect width="512" height="512" rx="110" fill="#59182A"/>

  <!-- Subtil tekstur -->
  <rect width="512" height="512" rx="110" fill="url(#grain)" opacity="0.04"/>

  <!-- Stregarm der holder 50 oppe — simpel, stærk -->
  <!-- Overarm -->
  <line x1="120" y1="420" x2="200" y2="300" stroke="#BE863A" stroke-width="18" stroke-linecap="round"/>
  <!-- Underarm bøjet opad -->
  <line x1="200" y1="300" x2="260" y2="260" stroke="#BE863A" stroke-width="18" stroke-linecap="round"/>
  <!-- Hånd/håndled -->
  <line x1="260" y1="260" x2="275" y2="235" stroke="#BE863A" stroke-width="14" stroke-linecap="round"/>
  <!-- Albue-punkt -->
  <circle cx="200" cy="300" r="10" fill="#BE863A"/>

  <!-- Skulder -->
  <circle cx="120" cy="418" r="14" fill="#BE863A" opacity="0.6"/>

  <!-- 50 — stort, serif, hvid -->
  <text x="295" y="370"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="220"
    font-weight="bold"
    fill="#ECE4D7"
    opacity="0.97"
    letter-spacing="-8">50</text>

  <!-- Underline accent -->
  <rect x="150" y="415" width="220" height="5" rx="2.5" fill="#BE863A" opacity="0.5"/>
</svg>