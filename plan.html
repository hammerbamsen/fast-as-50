<script>
const NAV = [
  {id:"today",    label:"I dag",   ti:"ti-calendar",       href:"index.html"},
  {id:"plan",     label:"Plan",    ti:"ti-route",          href:"plan.html", active:true},
  {id:"week",     label:"Uge",     ti:"ti-calendar-week",  href:"index.html#week"},
  {id:"overview", label:"Træning", ti:"ti-layout-grid",    href:"index.html#overview"},
  {id:"body",     label:"Krop",    ti:"ti-heart",          href:"index.html#body"},
  {id:"rules",    label:"Regler",  ti:"ti-checklist",      href:"index.html#rules"},
];
document.getElementById("side-nav").innerHTML = NAV.map(n=>`
  <a class="nav-btn ${n.active?"active":""}" href="${n.href}"><i class="ti ${n.ti}" style="font-size:18px"></i> ${n.label}</a>`).join("");
document.getElementById("bottom-nav").innerHTML = NAV.map(n=>`
  <a class="bottom-btn ${n.active?"active":""}" href="${n.href}"><i class="ti ${n.ti}" style="font-size:22px"></i><span>${n.label}</span></a>`).join("");

const DISC = { Run:"run", Ride:"bike", VirtualRide:"bike", Swim:"swim", OpenWaterSwim:"openwater",
               WeightTraining:"strength", Hike:"hike", Walk:"walk" };
const DAYS_DA = ["Man","Tir","Ons","Tor","Fre","Lør","Søn"];
const MON_DA  = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
const RULE_DA = { max_runs:"For mange løbedage", consecutive_runs:"Fortløbende løb",
                  vo2_missing:"VO2 mangler", vo2_excess:"Ekstra VO2",
                  missing_recovery:"Recovery mangler", tsb_floor:"TSB under gulv", ctl_ramp:"CTL-ramp", low_readiness:"Lav readiness", race_tsb:"Race-TSB", taper_ctl_rising:"Taper: CTL stiger", plan_actual_mismatch:"Plan/faktisk uoverensstemmelse" };

const esc = s => String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const iso = d => d.toISOString().slice(0,10);
const addDays = (d,n)=>{ const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const fmtDur = s => { if(!s) return ""; const m=Math.round(s/60);
  return m>=90 && m%30===0 ? `${Math.floor(m/60)}t${m%60?` ${m%60}m`:""}` : `${m} min`; };
const fmtDate = d => `${d.getDate()}. ${MON_DA[d.getMonth()]}`;

async function getJSON(url, optional=false){
  try { const r = await fetch(`${url}?t=${Date.now()}`, {cache:"no-store"});
        if(!r.ok) throw new Error(r.status);
        return await r.json(); }
  catch(e){ if(optional) return null; throw new Error(`${url}: ${e.message}`); }
}

function dayCard(day, todayIso){
  const d = new Date(day.date+"T12:00:00");
  const dn = `<div class="dn"><b>${DAYS_DA[(d.getDay()+6)%7]}</b><span>${fmtDate(d)}</span></div>`;
  const workouts = (day.entries||[]).filter(e=>e.workout);
  const isToday = day.date===todayIso;
  if(!workouts.length){
    const restEntry = (day.entries||[])[0];
    const restId = restEntry?.id;
    const note = (day.entries||[]).map(e=>e.note).filter(Boolean).join(" · ") || "Hviledag";
    return `<div class="day ${isToday?"today":""}">
      <div class="day-row" onclick="this.parentElement.classList.toggle('open')">${dn}
        <div class="wo rest"><i class="ti ti-moon" style="font-size:15px"></i> ${esc(note)}</div>
        ${restId?`<i class="ti ti-chevron-down chev" style="font-size:16px"></i>`:""}</div>
      ${restId?`<div class="day-actions">
        <button onclick="event.stopPropagation(); openSheet('swap_template','${restId}','${day.date}')"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px"></i> Tilføj pas</button>
        <button onclick="event.stopPropagation(); openSheet('adjust','${restId}','${day.date}')"><i class="ti ti-note" style="font-size:14px;vertical-align:-2px"></i> Note</button>
      </div>`:""}</div>`;
  }
  const rows = workouts.map(e=>{
    const w=e.workout, disc=DISC[w.type]||"free";
    return `<span style="display:flex;align-items:center;gap:8px;margin-top:2px">
      <span class="dot" style="background:var(--${disc})"></span>
      <span><span class="nm">${esc(w.name)}</span>
      <span class="mt" style="display:block">${fmtDur(w.moving_time)}${e.note?` · ${esc(e.note)}`:""}</span></span></span>`;
  }).join("");
  const details = workouts.map(e=>esc(e.workout.description||"")).filter(Boolean).join("\n\n");
  return `<div class="day ${isToday?"today":""}">
    <div class="day-row" onclick="this.parentElement.classList.toggle('open')">${dn}
      <div class="wo">${rows}</div>
      ${details?`<i class="ti ti-chevron-down chev" style="font-size:16px"></i>`:""}</div>
    ${details?`<div class="day-detail">${details}</div>`:""}
    ${workouts.map(w => `<div class="day-actions">
      ${workouts.length>1?`<div style="font-size:11px;color:var(--muted);margin-bottom:4px">${esc(w.workout.name)}</div>`:""}
      <button onclick="event.stopPropagation(); openSheet('adjust','${w.id}','${day.date}')"><i class="ti ti-adjustments" style="font-size:14px;vertical-align:-2px"></i> Justér</button>
      <button onclick="event.stopPropagation(); openSheet('move','${w.id}','${day.date}')"><i class="ti ti-arrows-move" style="font-size:14px;vertical-align:-2px"></i> Flyt</button>
      <button onclick="event.stopPropagation(); openSheet('swap_template','${w.id}','${day.date}')"><i class="ti ti-refresh" style="font-size:14px;vertical-align:-2px"></i> Skift pas</button>
      <button class="danger" onclick="event.stopPropagation(); openSheet('cancel','${w.id}','${day.date}')"><i class="ti ti-x" style="font-size:14px;vertical-align:-2px"></i> Aflys</button>
    </div>`).join("")}</div>`;
}

function weekFlagsHtml(vw, currentWeek){
  if(!vw) return "";
  const fl = vw.flags||[];
  if(!fl.length && vw.week<=currentWeek+2 && vw.week>=currentWeek)
    return `<span class="badge ok"><i class="ti ti-check" style="font-size:12px"></i>Friel OK</span>`;
  return fl.map(f=>`<span class="badge ${f.level==="HARD"?"hard":"warn"} ${f.historic?"hist":""}" title="${esc(f.msg)}">
    <i class="ti ${f.level==="HARD"?"ti-alert-triangle":"ti-alert-circle"}" style="font-size:12px"></i>${RULE_DA[f.rule]||f.rule}</span>`).join(" ");
}

function weekBlock(plan, view, w, todayIso, expandedDays=true){
  const meta = plan.weeks.find(x=>x.week===w) || {};
  const vw = view && view.kennet.weeks.find(x=>x.week===w);
  const start = new Date(meta.start+"T12:00:00");
  const daysMap = Object.fromEntries(plan.athletes.kennet.days.map(d=>[d.date,d]));
  let days = "";
  for(let i=0;i<7;i++){
    const di = iso(addDays(start,i));
    days += dayCard(daysMap[di]||{date:di,entries:[]}, todayIso);
  }
  const dev = vw && vw.deviation!==null && vw.deviation!==undefined
    ? `<div class="wk-dev">CTL-projektion ${vw.projEndCtl} — ${Math.abs(vw.deviation).toFixed(1)} ${vw.deviation<0?"under":"over"} pejlemærket ${meta.ctlTarget}</div>` : "";
  const head = `<div class="wk-head"><span class="wn">Uge ${w}</span>
      <span class="wm">${esc(meta.blockType||"")} · ${esc(meta.location||"")} · ${meta.tssTarget||"–"} TSS</span>
      ${weekFlagsHtml(vw, currentWeekOf(plan, todayIso))}</div>${dev}`;
  if(expandedDays) return `<div class="wk">${head}${days}</div>`;
  return `<div class="acc"><div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
      <div class="l"><span class="wn">Uge ${w}</span><span class="wm">${esc(meta.blockType||"")} · ${esc(meta.location||"")}</span>
      ${weekFlagsHtml(vw, currentWeekOf(plan, todayIso))}</div>
      <i class="ti ti-chevron-down chev" style="font-size:16px"></i></div>
      <div class="acc-body">${dev}${days}</div></div>`;
}

function currentWeekOf(plan, todayIso){
  const start = new Date(plan.program.start+"T12:00:00");
  const t = new Date(todayIso+"T12:00:00");
  return Math.min(Math.max(Math.floor((t-start)/864e5/7)+1, 1), plan.program.totalWeeks);
}

function ctlChart(plan, view, dash){
  const start = new Date(plan.program.start+"T12:00:00");
  const end = addDays(start, plan.program.totalWeeks*7);
  const W=640, H=220, PL=34, PR=8, PT=10, PB=24;
  const x = d => PL + ( (new Date(d+"T12:00:00")-start)/(end-start) ) * (W-PL-PR);
  const target = plan.weeks.map(w=>({d: iso(addDays(new Date(w.start+"T12:00:00"),6)), v:w.ctlTarget}));
  const proj = view ? view.kennet.projection : [];
  const actual = (dash && Array.isArray(dash.ctlCurve) ? dash.ctlCurve : [])
    .map((v,i)=>({d: iso(addDays(new Date(plan.weeks[i].start+"T12:00:00"),6)), v}));
  const seed = view ? view.kennet.seed : null;
  const all = [...target.map(p=>p.v), ...proj.map(p=>p.ctl), ...actual.map(p=>p.v)].filter(v=>v!=null);
  const lo = Math.floor(Math.min(...all,30)/10)*10, hi = Math.ceil(Math.max(...all,70)/10)*10;
  const y = v => PT + (1-(v-lo)/(hi-lo)) * (H-PT-PB);
  const line = (pts,get) => pts.map((p,i)=>`${i?"L":"M"}${x(p.d).toFixed(1)},${y(get(p)).toFixed(1)}`).join(" ");

  // Camps + travel: identificér fra location-feltet
  const campKeywords = [
    { match: /mallorca/i, color: "rgba(220,170,60,.10)", label: "Mallorca" },
    { match: /norge/i,    color: "rgba(90,150,210,.10)", label: "Norge" },
    { match: /wales/i,    color: "rgba(120,160,110,.10)", label: "Wales" },
  ];
  let campBands = "", campLabels = "";
  const campBlocks = [];  // {start, end, kw}
  for (const w of plan.weeks) {
    const loc = (w.location||"").toLowerCase();
    for (const kw of campKeywords) {
      if (kw.match.test(loc)) {
        campBlocks.push({start: w.start, end: iso(addDays(new Date(w.start+"T12:00:00"), 7)), kw});
      }
    }
  }
  // Merge overlappende bånd
  campBlocks.sort((a,b) => a.start.localeCompare(b.start));
  const merged = [];
  for (const b of campBlocks) {
    const prev = merged[merged.length-1];
    if (prev && prev.kw.label === b.kw.label && prev.end >= b.start) {
      prev.end = b.end > prev.end ? b.end : prev.end;
    } else {
      merged.push({...b});
    }
  }
  for (const b of merged) {
    const x1 = x(b.start), x2 = x(b.end);
    campBands += `<rect x="${x1}" y="${PT}" width="${x2-x1}" height="${H-PT-PB}" fill="${b.kw.color}"/>`;
    campLabels += `<text x="${(x1+x2)/2}" y="${PT+10}" font-size="9" fill="var(--muted)" text-anchor="middle" font-style="italic">${b.kw.label}</text>`;
  }

  let grid="";
  for(let v=lo; v<=hi; v+=10)
    grid += `<line x1="${PL}" y1="${y(v)}" x2="${W-PR}" y2="${y(v)}" stroke="var(--cream)" stroke-width="1"/>
             <text x="${PL-6}" y="${y(v)+3.5}" font-size="10" fill="var(--muted)" text-anchor="end">${v}</text>`;
  let months=""; const m0=new Date(start);
  for(let d=new Date(m0.getFullYear(),m0.getMonth()+1,1); d<end; d.setMonth(d.getMonth()+1))
    months += `<text x="${x(iso(d))}" y="${H-8}" font-size="10" fill="var(--muted)" text-anchor="middle">${MON_DA[d.getMonth()]}</text>`;
  const todayX = x(iso(new Date()));
  const seedPt = seed && proj.length ? `<circle cx="${x(seed.date)}" cy="${y(seed.ctl)}" r="4" fill="var(--gold)"/>` : "";
  const projPath = seed && proj.length
    ? line([{d:seed.date, ctl:seed.ctl}, ...proj], p=>p.ctl) : "";

  // Interaktive hover-punkter — Faktisk CTL (større dot for tap-mål) og projektion
  let hoverPoints = "";
  for (const p of actual) {
    hoverPoints += `<circle cx="${x(p.d)}" cy="${y(p.v)}" r="8" fill="transparent"
      onmouseover="ctlTip(evt,'${p.d}','Faktisk CTL','${p.v}')" onmouseout="ctlTipHide()"
      ontouchstart="ctlTip(evt,'${p.d}','Faktisk CTL','${p.v}')"/>`;
  }
  for (const p of proj) {
    hoverPoints += `<circle cx="${x(p.d)}" cy="${y(p.ctl)}" r="6" fill="transparent"
      onmouseover="ctlTip(evt,'${p.d}','Projektion','${p.ctl.toFixed(1)}'${p.tsb!=null?`,'${p.tsb.toFixed(1)}'`:""})" onmouseout="ctlTipHide()"
      ontouchstart="ctlTip(evt,'${p.d}','Projektion','${p.ctl.toFixed(1)}'${p.tsb!=null?`,'${p.tsb.toFixed(1)}'`:""})"/>`;
  }

  return `<div style="position:relative">
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block" role="img" aria-label="CTL-udvikling" onmouseleave="ctlTipHide()">
    ${campBands}
    ${grid}${months}
    ${campLabels}
    <line x1="${todayX}" y1="${PT}" x2="${todayX}" y2="${H-PB}" stroke="var(--cream-d)" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="${line(target,p=>p.v)}" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-dasharray="5,4"/>
    ${projPath?`<path d="${projPath}" fill="none" stroke="var(--gold)" stroke-width="2.2"/>`:""}
    ${actual.length?`<path d="${line(actual,p=>p.v)}" fill="none" stroke="var(--wine)" stroke-width="2.2"/>`:""}
    ${actual.length?`<circle cx="${x(actual[actual.length-1].d)}" cy="${y(actual[actual.length-1].v)}" r="4" fill="var(--wine)"/>`:""}
    ${seedPt}
    ${hoverPoints}
  </svg>
  <div id="ctl-tooltip" style="position:absolute;display:none;background:var(--wine);color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;pointer-events:none;z-index:10;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15)"></div>
  </div>
  <div class="legend">
    <span style="--lc:var(--wine)">Faktisk CTL</span>
    <span style="--lc:var(--gold)">Kalibreret projektion</span>
    <span class="dashed" style="--lc:var(--muted)">Pejlemærke</span>
  </div>`;
}

function ctlTip(evt, date, label, ctl, tsb){
  const tip = document.getElementById('ctl-tooltip');
  if (!tip) return;
  const d = new Date(date+"T12:00:00");
  const dateStr = `${d.getDate()}. ${MON_DA[d.getMonth()]}`;
  tip.innerHTML = `<b>${dateStr}</b><br>${label}: ${ctl}${tsb?`<br>TSB: ${tsb}`:""}`;
  tip.style.display = 'block';
  const rect = evt.target.closest('svg').getBoundingClientRect();
  const parentRect = tip.parentElement.getBoundingClientRect();
  const cx = parseFloat(evt.target.getAttribute('cx'));
  const cy = parseFloat(evt.target.getAttribute('cy'));
  const scale = rect.width / 640;
  tip.style.left = (cx * scale + 8) + 'px';
  tip.style.top = (cy * scale - 30) + 'px';
}
function ctlTipHide(){
  const tip = document.getElementById('ctl-tooltip');
  if (tip) tip.style.display = 'none';
}

let WORKER_CONFIG = null;

async function loadWorkerConfig(){
  if (WORKER_CONFIG) return WORKER_CONFIG;
  try {
    WORKER_CONFIG = await getJSON("data/auth_config.json", true) || { workerUrl: "" };
  } catch(e) {
    WORKER_CONFIG = { workerUrl: "" };
  }
  return WORKER_CONFIG;
}

const getSecret = () => localStorage.getItem(SECRET_KEY);
const setSecret = s => localStorage.setItem(SECRET_KEY, s);

// Fælles dispatch mod Worker'ens /plan-edit — bruges af submitEdit,
// suggestMoveAlternatives og restoreCommit. Kaster Error (med .status ved
// HTTP-fejl) i stedet for at returnere ok/fejl, så kalderen selv styrer UI.
async function dispatchPlanEdit(clientPayload){
  const cfg = await loadWorkerConfig();
  const secret = getSecret();
  if (!secret) throw new Error("Ingen hemmelighed gemt. Tap Token øverst.");
  if (!cfg.workerUrl) throw new Error("Worker-URL ikke sat i data/auth_config.json.");
  const r = await fetch(`${cfg.workerUrl.replace(/\/$/, "")}/plan-edit`, {
    method: "POST",
    headers: { "X-Plan-Secret": secret, "Content-Type": "application/json" },
    body: JSON.stringify(clientPayload)
  });
  if (!r.ok) {
    const errText = await r.text().catch(()=>"");
    const err = new Error(`HTTP ${r.status}. ${errText.slice(0,200)}`);
    err.status = r.status;
    throw err;
  }
  return r;
}

let U4_CTX = null;
function syncTitleDur(){
  const m=document.getElementById("f-mins"), n=document.getElementById("f-name");
  if(!m||!n||!m.value) return;
  n.value = n.value.replace(/(\d+)\s*min$/i, m.value + " min");
}
function u4Err(message, opts){
  opts = opts || {};
  U4_CTX = { ts: new Date().toISOString(), side: location.pathname,
             besked: String(message).replace(/<[^>]*>/g, ""),
             action: (typeof SHEET_STATE !== "undefined" && SHEET_STATE) ? SHEET_STATE.action : null,
             entryId: (typeof SHEET_STATE !== "undefined" && SHEET_STATE) ? SHEET_STATE.entryId : null,
             requestId: opts.requestId || null,
             browser: navigator.userAgent };
  const primary = 'flex:1;padding:8px 12px;border-radius:8px;border:none;background:var(--wine,var(--teal,#444));color:#fff;cursor:pointer;font-family:inherit';
  const second  = 'flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--cream-d,#ddd);background:var(--white,#fff);color:var(--wine,var(--teal,#444));cursor:pointer;font-family:inherit';
  const hint = opts.tokenHint
    ? `<div style="font-size:12px;margin-top:6px;opacity:.75">Ligner en forkert eller manglende delt hemmelighed — tjek/gem den igen via ⚙ Token.</div>` : "";
  let btns = "";
  if (opts.retry)      btns += `<button style="${primary}" onclick="${opts.retry}">Prøv igen</button>`;
  if (opts.checkAgain) btns += `<button style="${primary}" onclick="u4CheckAgain('${opts.requestId}','${opts.target || "sheet-msg"}')">Tjek igen</button>`;
  btns += `<button style="${second}" onclick="u4Report(this)">Rapportér fejl</button>`;
  return `<div class="err-box">${message}${hint}</div>
    <div style="display:flex;gap:8px;margin-top:10px">${btns}</div>`;
}
async function u4Report(btnEl){
  const txt = "Fast as Fifty — fejlrapport\n" + JSON.stringify(U4_CTX || {}, null, 2);
  let ok = false;
  try { await navigator.clipboard.writeText(txt); ok = true; }
  catch(e){
    try { const ta = document.createElement("textarea"); ta.value = txt;
          ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.focus(); ta.select();
          ok = document.execCommand("copy"); ta.remove(); } catch(e2){}
  }
  if (btnEl) btnEl.textContent = ok ? "✓ Kopieret — indsæt i Claude" : "Kopiering fejlede";
}
async function u4CheckAgain(requestId, targetId){
  const el = document.getElementById(targetId || "sheet-msg");
  if (!el || !requestId) return;
  el.innerHTML = `<div class="ok-box" style="opacity:.8">Tjekker resultat…</div>`;
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/data/edit_result.json?t=${Date.now()}`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const results = await res.json();
    const r = results[requestId];
    if (!r) {
      el.innerHTML = u4Err("Stadig intet resultat. Workflowet kører muligvis endnu — eller fejlede (tjek Actions-fanen på GitHub).",
                           {requestId: requestId, checkAgain: true, target: targetId});
      return;
    }
    if (r.status === "ok") {
      el.innerHTML = `<div class="ok-box">Ændringen ER gennemført.</div>`;
      if (typeof PLAN_CACHE !== "undefined") PLAN_CACHE = null;
      setTimeout(function(){ if (typeof closeSheet === "function") closeSheet(); if (typeof main === "function") main(); }, 1500);
      return;
    }
    el.innerHTML = u4Err("Resultat: " + r.status + " — " + esc((r.gate && r.gate.msg) || ""), {requestId: requestId});
  } catch(e){
    el.innerHTML = u4Err("Kunne ikke hente resultat: " + esc(e.message || e),
                         {requestId: requestId, checkAgain: true, target: targetId});
  }
}

async function renderSheet(){
  const s = SHEET_STATE; if (!s) return;
  const plan = await loadPlan();
  const day = plan.athletes.kennet.days.find(d => d.date === s.dateIso);
  const entry = day && day.entries.find(e => e.id === s.entryId);
  const wo = entry ? entry.workout : null;
  const sheet = document.getElementById("sheet");
  const dateStr = (() => { const d = new Date(s.dateIso+"T12:00:00");
    return `${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}. ${MON_DA[d.getMonth()]}`; })();

  if (s.action === "adjust"){
    sheet.innerHTML = `<h3>Justér pas</h3><div class="sub">${dateStr} · ${esc(wo?.name||"")}</div>
      <label>Navn</label><input id="f-name" value="${esc(wo?.name||"")}">
      <label>Type</label><select id="f-type">
        ${["Run","Ride","Swim","OpenWaterSwim","WeightTraining","Hike","Walk"].map(t=>`<option ${wo?.type===t?"selected":""}>${t}</option>`).join("")}
      </select>
      <label>Varighed (minutter)</label><input id="f-mins" type="number" value="${wo?.moving_time?Math.round(wo.moving_time/60):60}" min="10" max="360" oninput="syncTitleDur()">
      <label>Beskrivelse (intervaller, zoner)</label><textarea id="f-desc">${esc(wo?.description||"")}</textarea>
      <label>Note</label><input id="f-note" value="${esc(entry?.note||"")}">
      <div id="sheet-msg"></div>
      <div class="btn-row"><button class="secondary" onclick="closeSheet()">Fortryd</button>
      <button class="primary" onclick="submitEdit()">Gem</button></div>`;
  }
  else if (s.action === "move"){
    const start = new Date(s.dateIso+"T12:00:00");
    const opts = [];
    for (let i=-3;i<=14;i++){
      if (i===0) continue;
      const d = addDays(start,i);
      const iso_ = iso(d);
      const targetDay = plan.athletes.kennet.days.find(x=>x.date===iso_);
      const wos = targetDay ? targetDay.entries.filter(e=>e.workout).map(e=>e.workout.name).join(", ") : "";
      opts.push(`<button onclick="pickMoveTarget('${iso_}')"><b>${DAYS_DA[(d.getDay()+6)%7]} ${d.getDate()}.${MON_DA[d.getMonth()]}</b><span>${esc(wos)||"hvile"}</span></button>`);
    }
    sheet.innerHTML = `<h3>Flyt pas</h3><div class="sub">${dateStr} · ${esc(wo?.name||"")}</div>
      <label>Vælg måldag (byt automatisk)</label>
      <div class="day-picker">${opts.join("")}</div>
      <div id="sheet-msg"></div>
      <div class="btn-row"><button class="secondary" onclick="closeSheet()">Fortryd</button></div>`;
  }
  else if (s.action === "swap_template"){
    const lib = await loadLib();
    sheet.innerHTML = `<h3>Skift pas</h3><div class="sub">${dateStr} · ${esc(wo?.name||"")}</div>
      <div class="tpl-list">${lib.templates.map(t=>`
        <div class="tpl-item" onclick="pickTemplate('${t.id}')"><b>${esc(t.name)}</b>
        <span>${t.type||"hvile"}${t.moving_time?` · ${Math.round(t.moving_time/60)} min`:""}</span></div>`).join("")}</div>
      <div id="sheet-msg"></div>
      <div class="btn-row"><button class="secondary" onclick="closeSheet()">Fortryd</button></div>`;
  }
  else if (s.action === "cancel"){
    sheet.innerHTML = `<h3>Aflys pas</h3><div class="sub">${dateStr} · ${esc(wo?.name||"")}</div>
      <p style="font-size:14px;margin:12px 0">Dagen bliver til hviledag i Intervals og Outlook. Kan altid ændres tilbage.</p>
      <label>Note (valgfri)</label><input id="f-note" value="Aflyst — hviledag">
      <div id="sheet-msg"></div>
      <div class="btn-row"><button class="secondary" onclick="closeSheet()">Fortryd</button>
      <button class="primary danger" onclick="submitEdit()">Aflys</button></div>`;
  }
}

function pickMoveTarget(targetIso){
  SHEET_STATE.moveTarget = targetIso;
  submitEdit();
}
function pickTemplate(tplId){
  SHEET_STATE.templateId = tplId;
  submitEdit();
}

async function submitEdit(msgTarget){
  const s = SHEET_STATE; if (!s) return;

  let params = {};
  if (s._fromAdaptation) {
    // T3: forslaget bærer allerede server-korrekte action + params.
    params = s._adaptParams || {};
  } else if (s.action === "adjust") {
    params = { name: v("f-name"), type: v("f-type"),
               moving_time: parseInt(v("f-mins"))*60,
               description: v("f-desc"), note: v("f-note") };
  } else if (s.action === "move") {
    params = { target_date: s.moveTarget, mode: "swap" };
  } else if (s.action === "swap_template") {
    params = { template_id: s.templateId };
  } else if (s.action === "cancel") {
    params = { note: v("f-note") };
  }

  const requestId = "r" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const payload = {
    requestId, action: s.action, entryId: s.entryId, params, confirmedWarn: s.confirmedWarn
  };

  const msg = document.getElementById(msgTarget || "sheet-msg");
  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)"><i class="ti ti-loader" style="font-size:14px"></i> Sender ændring…</div>`;

  try {
    await dispatchPlanEdit(payload);
  } catch(e) {
    msg.innerHTML = u4Err("Dispatch fejlede: " + esc(e.message||e), {retry:"submitEdit()", tokenHint: e.status===401||e.status===403});
    return;
  }

  // Poll edit_result.json
  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)">Behandler… (kan tage op til et par minutter)</div>`;
  for (let i=0; i<60; i++){
    await new Promise(r=>setTimeout(r, 3000));
    try {
      const res = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/data/edit_result.json?t=${Date.now()}`);
      if (!res.ok) continue;
      const results = await res.json();
      const r = results[requestId];
      if (!r) continue;
      if (r.status === "reject") {
        const suggestBtn = s.action === "move"
          ? `<button class="primary" style="margin-top:10px;padding:8px 14px;border-radius:8px;border:none;background:var(--wine);color:#fff;cursor:pointer" onclick="suggestMoveAlternatives()"><i class="ti ti-bulb"></i> Foreslå bedre dage</button>`
          : "";
        msg.innerHTML = `<div class="err-box"><b>Afvist:</b> ${esc(r.gate.msg)}</div>
          <div style="display:flex;gap:8px;margin-top:10px">
          <button class="secondary" style="flex:1;padding:8px 14px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);color:var(--wine);cursor:pointer" onclick="closeSheet()">OK</button>
          ${suggestBtn?`<div style="flex:1">${suggestBtn}</div>`:""}
          </div>`;
        return;
      }
      if (r.status === "warn") {
        const suggestBtn = s.action === "move"
          ? `<button style="margin-top:8px;padding:8px 14px;border-radius:8px;border:1px solid var(--wine);background:var(--white);color:var(--wine);cursor:pointer;width:100%" onclick="suggestMoveAlternatives()"><i class="ti ti-bulb"></i> Se bedre alternativer</button>`
          : "";
        msg.innerHTML = `<div class="warn-box"><b>Advarsel:</b> ${esc(r.gate.msg)}</div>
          ${suggestBtn}
          <div style="display:flex;gap:8px;margin-top:10px">
          <button class="secondary" onclick="closeSheet()" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);cursor:pointer">Fortryd</button>
          <button class="primary" onclick="confirmWarnAndRetry()" style="flex:1;padding:8px;border-radius:8px;border:none;background:var(--wine);color:var(--white);cursor:pointer">Fortsæt alligevel</button></div>`;
        return;
      }
      // status = ok
      const syncMsg = r.sync_errors && r.sync_errors.length
        ? `Opdateret. ${r.sync_errors.length} sync-fejl — næste auto-sync retter.`
        : "Opdateret. Intervals + Outlook + Word synkroniseret.";
      msg.innerHTML = `<div class="ok-box"><i class="ti ti-check"></i> ${syncMsg}</div>`;
      PLAN_CACHE = null;  // invalidér cache
      setTimeout(()=>{ closeSheet(); main(); }, 2000);
      return;
    } catch(e) { /* keep polling */ }
  }
  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)">Det tager længere tid end normalt (GitHub kan være langsom lige nu). Ændringen er sandsynligvis gennemført — luk og træk ned for at genindlæse.</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button style="flex:1;padding:8px 12px;border-radius:8px;border:none;background:var(--wine);color:#fff;cursor:pointer;font-family:inherit" onclick="u4CheckAgain('${requestId}','sheet-msg')">Tjek igen</button>
      <button style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);color:var(--wine);cursor:pointer;font-family:inherit" onclick="closeSheet(); main();">Luk &amp; genindlæs</button>
    </div>`;
}

async function confirmWarnAndRetry(){
  SHEET_STATE.confirmedWarn = true;
  await submitEdit(SHEET_STATE && SHEET_STATE._fromAdaptation ? "adapt-msg" : undefined);
}

async function suggestMoveAlternatives(){
  const s = SHEET_STATE;
  const msg = document.getElementById("sheet-msg");
  msg.innerHTML = `<div class="ok-box" style="color:var(--muted)"><i class="ti ti-loader"></i> Analyserer alternativer…</div>`;

  const requestId = "suggest-" + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  try {
    await dispatchPlanEdit({
      requestId, action: "suggest_move", entryId: s.entryId,
      params: { window_days: 7 }, confirmedWarn: false, athlete: "kennet"
    });
  } catch(e) {
    msg.innerHTML = u4Err("Kunne ikke starte forslags-analyse: " + esc(e.message||e), {retry:"suggestMoveAlternatives()", tokenHint: e.status===401||e.status===403});
    return;
  }

  for (let i=0; i<20; i++){
    await new Promise(r=>setTimeout(r, 3000));
    try {
      const res = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/data/edit_result.json?t=${Date.now()}`);
      if (!res.ok) continue;
      const results = await res.json();
      const r = results[requestId];
      if (!r || r.status !== "suggestion") continue;
      // Vis alternativer
      const ok = (r.alternatives||[]).filter(a=>a.status==="ok").slice(0,6);
      const warn = (r.alternatives||[]).filter(a=>a.status==="warn").slice(0,3);
      if (!ok.length && !warn.length) {
        msg.innerHTML = `<div class="warn-box">Ingen problemfri dage fundet i ±7 dage. Prøv en større flytning eller behold nuværende plan.</div>
          <button class="secondary" onclick="closeSheet()" style="margin-top:10px;padding:8px 14px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);color:var(--wine);cursor:pointer;width:100%">Luk</button>`;
        return;
      }
      const fmtBtn = (a, kind) => {
        const d = new Date(a.date+"T12:00:00");
        const dow = ["Man","Tir","Ons","Tor","Fre","Lør","Søn"][(d.getDay()+6)%7];
        const off = a.offset > 0 ? `+${a.offset}d` : `${a.offset}d`;
        const color = kind === "ok" ? "var(--wine)" : "var(--warn)";
        return `<button style="padding:10px 12px;border-radius:8px;border:1px solid ${color};background:var(--white);color:${color};cursor:pointer;text-align:left;font-family:'Hanken Grotesk',sans-serif;font-size:13px" onclick="acceptSuggestion('${a.date}')">
          <b style="display:block">${dow} ${d.getDate()}.${MON_DA[d.getMonth()]}</b>
          <span style="font-size:11px;color:var(--muted)">${off} · ${kind==="ok"?"Godkendt":"Advarsel"}</span>
        </button>`;
      };
      msg.innerHTML = `<div class="ok-box"><b>Foreslåede dage:</b> Fri klik en dag for at flytte pas'et dertil.</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:10px">
          ${ok.map(a=>fmtBtn(a,"ok")).join("")}
          ${warn.map(a=>fmtBtn(a,"warn")).join("")}
        </div>
        <button class="secondary" onclick="closeSheet()" style="margin-top:10px;padding:8px 14px;border-radius:8px;border:1px solid var(--cream-d);background:var(--white);color:var(--wine);cursor:pointer;width:100%">Luk</button>`;
      return;
    } catch(e) { /* keep polling */ }
  }
  msg.innerHTML = u4Err("Timeout på forslags-analyse — den kører muligvis stadig. Prøv igen om lidt.", {retry:"suggestMoveAlternatives()"});
}

async function acceptSuggestion(targetIso){
  SHEET_STATE.action = "move";
  SHEET_STATE.moveTarget = targetIso;
  SHEET_STATE.confirmedWarn = true;  // accepter evt. WARN direkte
  await submitEdit();
}

// ═══ HISTORIK + ROLLBACK ═══
async function showHistory(){
  SHEET_STATE = { action: "history" };
  const sheet = document.getElementById("sheet");
  const bg = document.getElementById("sheet-bg");
  sheet.innerHTML = `<h3>Historik</h3>
    <div class="sub">De sidste 20 planændringer. Klik "Gendan" for at rulle tilbage.</div>
    <div id="history-list" style="max-height:60vh;overflow-y:auto;margin-top:12px">
      <div style="color:var(--muted);text-align:center;padding:20px"><i class="ti ti-loader"></i> Henter…</div>
    </div>
    <div class="btn-row"><button class="secondary" onclick="closeSheet()">Luk</button></div>`;
  bg.classList.add("open"); sheet.classList.add("open");

  try {
    // Public repo — ingen token nødvendig for at læse commit-historik
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/commits?path=data/plan.json&per_page=20`, {
      headers: {"Accept": "application/vnd.github+json"}
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const commits = await r.json();
    const list = commits.map((c, i) => {
      const dt = new Date(c.commit.author.date);
      const ago = timeAgo(dt);
      const msg = c.commit.message.split('\n')[0].slice(0, 80);
      const isCurrent = i === 0;
      return `<div style="border-bottom:1px solid var(--cream);padding:12px 0">
        <div style="font-size:12px;color:var(--muted)">${ago} · ${c.sha.slice(0,7)}</div>
        <div style="font-size:13.5px;margin:4px 0">${esc(msg)}</div>
        ${isCurrent
          ? `<div style="font-size:11px;color:var(--gold);font-weight:600">NUVÆRENDE</div>`
          : `<button onclick="restoreCommit('${c.sha}')" style="padding:6px 12px;border-radius:6px;border:1px solid var(--wine);background:var(--white);color:var(--wine);cursor:pointer;font-size:12px;font-family:'Hanken Grotesk',sans-serif;margin-top:4px"><i class="ti ti-restore" style="font-size:12px"></i> Gendan</button>`}
      </div>`;
    }).join("");
    document.getElementById('history-list').innerHTML = list;
  } catch(e) {
    document.getElementById('history-list').innerHTML = u4Err("Fejl: " + esc(e.message||e), {retry:"showHistory()"});
  }
}

function timeAgo(dt){
  const s = Math.floor((new Date() - dt)/1000);
  if (s < 60) return "lige nu";
  if (s < 3600) return `${Math.floor(s/60)} min siden`;
  if (s < 86400) return `${Math.floor(s/3600)} timer siden`;
  const days = Math.floor(s/86400);
  if (days === 1) return "i går";
  if (days < 7) return `${days} dage siden`;
  return dt.toLocaleDateString("da-DK", {day:"numeric", month:"short"});
}

async function restoreCommit(sha){
  if (!confirm(`Rul plan.json tilbage til commit ${sha.slice(0,7)}?\n\nprogramMeta (arkiv) og fitnessSeed bevares.`)) return;
  document.getElementById('history-list').innerHTML = `<div class="ok-box"><i class="ti ti-loader"></i> Starter rollback…</div>`;

  try {
    // Dispatch restore-action — workflow'et henter selv den gamle plan (payload < 65KB)
    const requestId = "restore-" + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    await dispatchPlanEdit({
      requestId, action: "restore_from_commit", entryId: "N/A",
      params: { source_commit: sha },
      confirmedWarn: true, athlete: "kennet"
    });

    document.getElementById('history-list').innerHTML = `<div class="ok-box"><i class="ti ti-loader"></i> Ruller tilbage… (kan tage 30 sek)</div>`;
    // Poll for result
    for (let i=0; i<20; i++){
      await new Promise(r=>setTimeout(r, 3000));
      try {
        const res = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/data/edit_result.json?t=${Date.now()}`);
        if (!res.ok) continue;
        const results = await res.json();
        const r = results[requestId];
        if (!r) continue;
        if (r.status === "ok") {
          document.getElementById('history-list').innerHTML = `<div class="ok-box"><i class="ti ti-check"></i> Planen er rullet tilbage. Genindlæser om 2 sek…</div>`;
          PLAN_CACHE = null;
          setTimeout(()=>{ closeSheet(); main(); }, 2000);
          return;
        }
        if (r.status === "reject" || r.status === "warn") {
          document.getElementById('history-list').innerHTML = `<div class="err-box">Rollback afvist: ${esc(r.gate?.msg||"")}</div>`;
          return;
        }
      } catch(e) {}
    }
    document.getElementById('history-list').innerHTML = u4Err("Timeout — rollback er muligvis gennemført alligevel.", {requestId: requestId, checkAgain: true, target: "history-list"});
  } catch(e) {
    document.getElementById('history-list').innerHTML = u4Err("Fejl: " + esc(e.message||e), {retry:"restoreCommit('" + sha + "')"});
  }
}

const v = id => document.getElementById(id).value;
