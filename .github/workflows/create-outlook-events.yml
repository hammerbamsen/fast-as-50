name: Sync workouts til Outlook kalender

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Uge nummer (1-14)'
        required: true
        default: '2'
  repository_dispatch:
    types: [workouts-built]

permissions:
  contents: read

jobs:
  sync-outlook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Slet og genopret Traening-events i Outlook
        env:
          AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
          INTERVALS_API_KEY:    ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          WEEK: ${{ github.event.inputs.week || github.event.client_payload.week || '2' }}
        run: python3 .github/workflows/scripts/sync_outlook.py
