name: Sync workouts til Outlook kalender

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Uge nummer (1-14)'
        required: true
        default: '2'
  repository_dispatch:
    types: [workouts-built]
  workflow_call:
    inputs:
      week:
        description: 'Uge nummer (1-14)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync-outlook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Slet og genopret Traening-events i Outlook
        env:
          AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
          INTERVALS_API_KEY:    ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          WEEK: ${{ inputs.week || github.event.inputs.week || github.event.client_payload.week }}
        run: |
          set -o pipefail
          if [ -z "$WEEK" ]; then echo "FEJL: week-input mangler — afbryder (ingen default)"; exit 1; fi
          python3 .github/workflows/scripts/sync_outlook.py 2>&1 | tee /tmp/sync_out.txt
      - name: Gem debug-log
        if: always()
        run: |
          git config user.name "fast50-debug"
          git config user.email "debug@fast50.local"
          mkdir -p debug
          cp /tmp/sync_out.txt debug/outlook_sync_debug.txt 2>/dev/null || echo "ingen output" > debug/outlook_sync_debug.txt
          git add debug/outlook_sync_debug.txt
          git commit -m "debug: outlook sync log" || true
          git pull --rebase origin main || true
          git push || true
