name: Push workouts til TrainingPeaks

on:
  workflow_dispatch:
    inputs:
      uge:
        description: 'Ugenummer (1-14)'
        required: false
        default: 'auto'

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Push workouts
        env:
          TP_AUTH_COOKIE: ${{ secrets.TP_AUTH_COOKIE }}
        run: python scripts/push_workouts.py
