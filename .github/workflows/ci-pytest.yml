name: CI pytest

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/ci-pytest.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: python3 -m pytest scripts/modules/ -q
