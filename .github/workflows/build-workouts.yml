name: Byg 14-ugers workouts i Intervals.icu

on:
  schedule:
    - cron: '0 5 * * 0'  # Hver søndag kl. 05:00 UTC
  workflow_dispatch:
    inputs:
      week_only:
        description: 'Upload kun specifik uge (0=fremtidige uger, -1=alle)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  build-workouts:
    runs-on: ubuntu-latest
    outputs:
      week: ${{ steps.nextweek.outputs.week }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Upload workouts til Intervals.icu
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          WEEK_ONLY: ${{ github.event.inputs.week_only || '0' }}
        run: python3 scripts/build_workouts.py $WEEK_ONLY

      - name: Beregn næste uge
        id: nextweek
        if: success()
        run: |
          WEEK=$(python3 -c "
          from datetime import date
          PLAN_START = date(2026, 6, 1)
          today = date.today()
          current_week = min(max((today - PLAN_START).days // 7 + 1, 1), 14)
          next_week = min(current_week + 1, 14)
          print(next_week)
          ")
          echo "Næste uge = $WEEK"
          echo "week=$WEEK" >> "$GITHUB_OUTPUT"

      - name: Notifikation ved fejl
        if: failure()
        run: |
          curl -s -X POST "https://hook.eu1.make.com/rwyuzi27urezk1389gytkv8sda23jbdj" \
            -H "Content-Type: application/json" \
            -d '{"workflow":"${{ github.workflow }}","status":"FEJL","repo":"${{ github.repository }}","run":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

  # Native workflow_call — ingen PAT nødvendig (erstatter tidligere curl-dispatch med GH_TOKEN)
  outlook-sync:
    needs: build-workouts
    uses: ./.github/workflows/create-outlook-events.yml
    with:
      week: ${{ needs.build-workouts.outputs.week }}
    secrets: inherit
