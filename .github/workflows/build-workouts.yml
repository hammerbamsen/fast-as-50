name: Byg 14-ugers workouts i Intervals.icu

on:
  workflow_dispatch:
    inputs:
      week_only:
        description: 'Upload kun specifik uge (0=alle, 2=kun uge 2 osv)'
        required: false
        default: '0'

jobs:
  build-workouts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Upload workouts til Intervals.icu
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          WEEK_ONLY: ${{ github.event.inputs.week_only || '0' }}
        run: python3 scripts/build_workouts.py $INTERVALS_API_KEY $WEEK_ONLY
