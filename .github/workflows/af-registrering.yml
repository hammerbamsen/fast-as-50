name: Check-in registrering

on:
  repository_dispatch:
    types: [af-registrering, checkin]

permissions:
  contents: write

jobs:
  send-to-intervals:
    runs-on: ubuntu-latest
    concurrency:
      group: kpi-update
      cancel-in-progress: false
    steps:
      - name: Send til Intervals.icu
        run: |
          DATE="${{ github.event.client_payload.date }}"
          ALKOHOL="${{ github.event.client_payload.alkohol }}"
          PROTEIN="${{ github.event.client_payload.protein }}"
          ENERGI="${{ github.event.client_payload.energi }}"
          STRESS="${{ github.event.client_payload.stress }}"

          # Byg JSON payload
          PAYLOAD="{\"Alkohol\": $ALKOHOL"
          if [ -n "$PROTEIN" ]; then PAYLOAD="$PAYLOAD, \"protein\": $PROTEIN"; fi
          if [ -n "$ENERGI" ]; then PAYLOAD="$PAYLOAD, \"motivation\": $ENERGI"; fi
          if [ -n "$STRESS" ]; then PAYLOAD="$PAYLOAD, \"fatigue\": $STRESS"; fi
          PAYLOAD="$PAYLOAD}"

          HTTP=$(curl -s -o /tmp/resp.txt -w "%{http_code}" --max-time 30 --retry 3 --retry-all-errors --retry-delay 3 -X PUT \
            "https://intervals.icu/api/v1/athlete/i599466/wellness/$DATE" \
            -u "API_KEY:${{ secrets.INTERVALS_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "000")
          echo "Intervals svar ($HTTP):"
          cat /tmp/resp.txt 2>/dev/null || true

          # Skriv debug-fil til repo (altid, uanset udfald)
          BODY=$(head -c 400 /tmp/resp.txt 2>/dev/null || echo "intet svar")
          printf 'tid_utc: %s\ndato: %s\nhttp: %s\nsvar: %s\n' "$(date -u +%FT%T)" "$DATE" "$HTTP" "$BODY" > /tmp/debug.txt
          B64=$(base64 -w0 /tmp/debug.txt)
          SHA=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/debug/af_dispatch_debug.txt" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('sha',''))")
          if [ -n "$SHA" ]; then SHAFIELD=", \"sha\": \"$SHA\""; else SHAFIELD=""; fi
          curl -s -o /dev/null -w "debug-fil skrevet: HTTP %{http_code}\n" -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/debug/af_dispatch_debug.txt" \
            -d "{\"message\": \"debug: af-dispatch $DATE http=$HTTP\", \"content\": \"$B64\"$SHAFIELD}"

          if [ "$HTTP" != "200" ]; then
            echo "::error::Intervals PUT fejlede med HTTP $HTTP for $DATE"
            exit 1
          fi
          echo "Gemt: $DATE alkohol=$ALKOHOL"

      # Kun af-registrering opdaterer data.json's af_log/streak med det samme —
      # dette erstatter den GET+PUT-blok af.html tidligere lavede direkte i
      # browseren med sin PAT (fjernet i samme omgang som token-fri dispatch).
      # checkin.html rørte aldrig data.json client-side — af_log for
      # checkin-events opdateres fortsat kun af den almindelige 30-min-cron.
      - name: Checkout
        if: github.event.action == 'af-registrering'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python setup
        if: github.event.action == 'af-registrering'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        if: github.event.action == 'af-registrering'
        run: pip install requests
      - name: Opdater data.json (af_log/streak)
        if: github.event.action == 'af-registrering'
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_kpi.py
      - name: Commit og push data.json
        if: github.event.action == 'af-registrering'
        run: |
          git config user.name "Fast as Fifty Bot"
          git config user.email "bot@hammerbamsen.github.io"
          git add data.json
          if git diff --staged --quiet; then
            echo "Ingen ændringer"
            exit 0
          fi
          git commit -m "AF-registrering: data.json opdateret $(date +%Y-%m-%d_%H:%M)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin main && echo "Push OK forsøg $i" && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 3
          done
          echo "Push fejlede efter 3 forsøg"
          exit 1
