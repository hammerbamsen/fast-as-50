name: Sync filer til OneDrive

on:
  push:
    paths:
      - 'data/Master_Plan.xlsx'
      - 'data/Fast_as_Fifty_Masterplan_2026.docx'
      - 'data/Eva_Medoc_Traningsplan_2026.docx'
      - 'data/Eva_Medoc_Master.xlsx'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - run: pip install requests

      - name: Hent token
        id: token
        run: |
          TOKEN=$(python3 -c "
          import os, requests, sys
          r = requests.post(
              'https://login.microsoftonline.com/' + os.environ['AZURE_TENANT_ID'] + '/oauth2/v2.0/token',
              data={'grant_type':'client_credentials','client_id':os.environ['AZURE_CLIENT_ID'],'client_secret':os.environ['AZURE_CLIENT_SECRET'],'scope':'https://graph.microsoft.com/.default'}
          )
          if r.status_code != 200: print('FEJL:'+str(r.status_code)+r.text,file=sys.stderr); sys.exit(1)
          print(r.json()['access_token'])
          ")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token hentet OK"

      - name: Upload Master_Plan.xlsx
        run: |
          curl -s -o /tmp/r.json -w "HTTP %{http_code}" -X PUT \
            "https://graph.microsoft.com/v1.0/drives/b!l3-EhhmboESLtqZs3mskwcfYgAb0uTBJtdZFBL1IqyUao41S6zySS6Rj_0KgtpbJ/items/01Y5SFS4EESRNSDGISBJCJQ5UURGEHA6FS:/Master_Plan.xlsx:/content" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @data/Master_Plan.xlsx
          cat /tmp/r.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK:',d.get('name','?'),d.get('size','?'),'bytes')" 2>/dev/null || cat /tmp/r.json

      - name: Upload Fast_as_Fifty_Masterplan_2026.docx
        run: |
          curl -s -o /tmp/r.json -w " HTTP %{http_code}" -X PUT \
            "https://graph.microsoft.com/v1.0/drives/b!l3-EhhmboESLtqZs3mskwcfYgAb0uTBJtdZFBL1IqyUao41S6zySS6Rj_0KgtpbJ/items/01Y5SFS4EESRNSDGISBJCJQ5UURGEHA6FS:/Fast_as_Fifty_Masterplan_2026.docx:/content" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @data/Fast_as_Fifty_Masterplan_2026.docx
          cat /tmp/r.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK:',d.get('name','?'),d.get('size','?'),'bytes')" 2>/dev/null || cat /tmp/r.json

      - name: Upload Eva_Medoc_Traningsplan_2026.docx
        run: |
          curl -s -o /tmp/r.json -w " HTTP %{http_code}" -X PUT \
            "https://graph.microsoft.com/v1.0/drives/b!l3-EhhmboESLtqZs3mskwcfYgAb0uTBJtdZFBL1IqyUao41S6zySS6Rj_0KgtpbJ/items/01Y5SFS4EESRNSDGISBJCJQ5UURGEHA6FS:/Eva_Medoc_Traningsplan_2026.docx:/content" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @data/Eva_Medoc_Traningsplan_2026.docx
          cat /tmp/r.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK:',d.get('name','?'),d.get('size','?'),'bytes')" 2>/dev/null || cat /tmp/r.json

      - name: Upload Eva_Medoc_Master.xlsx
        run: |
          curl -s -o /tmp/r.json -w " HTTP %{http_code}" -X PUT \
            "https://graph.microsoft.com/v1.0/drives/b!l3-EhhmboESLtqZs3mskwcfYgAb0uTBJtdZFBL1IqyUao41S6zySS6Rj_0KgtpbJ/items/01Y5SFS4EESRNSDGISBJCJQ5UURGEHA6FS:/Eva_Medoc_Master.xlsx:/content" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @data/Eva_Medoc_Master.xlsx
          cat /tmp/r.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('OK:',d.get('name','?'),d.get('size','?'),'bytes')" 2>/dev/null || cat /tmp/r.json

      - name: Notifikation ved fejl
        if: failure()
        run: |
          curl -s -X POST "https://hook.eu1.make.com/rwyuzi27urezk1389gytkv8sda23jbdj" \
            -H "Content-Type: application/json" \
            -d '{"workflow":"${{ github.workflow }}","status":"FEJL","repo":"${{ github.repository }}","run":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
