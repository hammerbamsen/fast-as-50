name: Sync filer til OneDrive

on:
  push:
    paths:
      - 'data/Master_Plan.xlsx'
      - 'data/Fast_as_Fifty_Masterplan_2026.docx'
      - 'data/Eva_Medoc_Traningsplan_2026.docx'
      - 'data/Eva_Medoc_Master.xlsx'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer afhængigheder
        run: pip install requests

      - name: Sync filer til OneDrive
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import os, sys, requests

          resp = requests.post(
              "https://login.microsoftonline.com/{}/oauth2/v2.0/token".format(os.environ['AZURE_TENANT_ID']),
              data={
                  "grant_type":    "client_credentials",
                  "client_id":     os.environ["AZURE_CLIENT_ID"],
                  "client_secret": os.environ["AZURE_CLIENT_SECRET"],
                  "scope":         "https://graph.microsoft.com/.default",
              }
          )
          if resp.status_code != 200:
              print("Token fejl: {} {}".format(resp.status_code, resp.text), file=sys.stderr)
              sys.exit(1)
          token = resp.json()["access_token"]
          print("Token OK")

          DRIVE   = "b!l3-EhhmboESLtqZs3mskwcfYgAb0uTBJtdZFBL1IqyUao41S6zySS6Rj_0KgtpbJ"
          FOLDER  = "01Y5SFS4EESRNSDGISBJCJQ5UURGEHA6FS"
          hdrs    = {"Authorization": "Bearer {}".format(token), "Content-Type": "application/octet-stream"}

          files = [
              ("data/Master_Plan.xlsx",                   "Master_Plan.xlsx"),
              ("data/Fast_as_Fifty_Masterplan_2026.docx", "Fast_as_Fifty_Masterplan_2026.docx"),
              ("data/Eva_Medoc_Traningsplan_2026.docx",   "Eva_Medoc_Traningsplan_2026.docx"),
              ("data/Eva_Medoc_Master.xlsx",              "Eva_Medoc_Master.xlsx"),
          ]

          ok = err = 0
          for local, remote in files:
              if not os.path.exists(local):
                  print("SKIP {}".format(local))
                  continue
              url = "https://graph.microsoft.com/v1.0/drives/{}/items/{}:/{}:/content".format(DRIVE, FOLDER, remote)
              with open(local, "rb") as f:
                  r = requests.put(url, headers=hdrs, data=f)
              if r.status_code in (200, 201):
                  print("OK {} ({} bytes)".format(remote, os.path.getsize(local)))
                  ok += 1
              else:
                  print("FAIL {}: {} {}".format(remote, r.status_code, r.text[:200]))
                  err += 1

          print("Done: {} ok, {} fejl".format(ok, err))
          if err:
              sys.exit(1)
          PYEOF
