name: Sync filer til OneDrive

on:
  push:
    paths:
      - 'data/Master_Plan.xlsx'
      - 'data/Fast_as_Fifty_Masterplan_2026.docx'
      - 'data/Eva_Medoc_Traningsplan_2026.docx'
      - 'data/Eva_Medoc_Master.xlsx'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer afhængigheder
        run: pip install requests

      - name: Sync filer til OneDrive
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import os, sys, requests

          # Token
          resp = requests.post(
              f"https://login.microsoftonline.com/{os.environ['AZURE_TENANT_ID']}/oauth2/v2.0/token",
              data={
                  "grant_type":    "client_credentials",
                  "client_id":     os.environ["AZURE_CLIENT_ID"],
                  "client_secret": os.environ["AZURE_CLIENT_SECRET"],
                  "scope":         "https://graph.microsoft.com/.default",
              }
          )
          if resp.status_code != 200:
              print(f"Token fejl: {resp.status_code} {resp.text}", file=sys.stderr)
              sys.exit(1)
          token = resp.json()["access_token"]
          print("✅ Token OK")

          # Upload alle filer
          DRIVE  = "b!l3-EhhmboESLtqZs3mskwcfYgAb0uTBJtdZFBL1IqyUao41S6zySS6Rj_0KgtpbJ"
          FOLDER = "Claude/Fast as Fifty - træningsplan"
          hdrs   = {"Authorization": f"Bearer {token}", "Content-Type": "application/octet-stream"}

          files = [
              ("data/Master_Plan.xlsx",                   "Master_Plan.xlsx"),
              ("data/Fast_as_Fifty_Masterplan_2026.docx", "Fast_as_Fifty_Masterplan_2026.docx"),
              ("data/Eva_Medoc_Traningsplan_2026.docx",   "Eva_Medoc_Traningsplan_2026.docx"),
              ("data/Eva_Medoc_Master.xlsx",              "Eva_Medoc_Master.xlsx"),
          ]

          ok = err = 0
          for local, remote in files:
              if not os.path.exists(local):
                  print(f"⚠️  {local} ikke fundet - springer over")
                  continue
              url = (f"https://graph.microsoft.com/v1.0/drives/{DRIVE}"
                     f"/root:/{FOLDER}/{remote}:/content")
              with open(local, "rb") as f:
                  r = requests.put(url, headers=hdrs, data=f)
              if r.status_code in (200, 201):
                  print(f"✅ {remote} ({os.path.getsize(local):,} bytes)")
                  ok += 1
              else:
                  print(f"❌ {remote}: HTTP {r.status_code} - {r.text[:200]}")
                  err += 1

          print(f"\nResultat: {ok} uploadet, {err} fejl")
          if err:
              sys.exit(1)
          PYEOF
