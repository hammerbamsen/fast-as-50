name: Debug planned
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run debug
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: python scripts/debug_planned.py
      - name: Commit
        run: |
          git config user.name "Bot"
          git config user.email "bot@x.com"
          git add debug_planned.json
          git diff --staged --quiet || git commit -m "debug planned output"
          git push
