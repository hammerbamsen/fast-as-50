name: Daglig dashboard-opdatering

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'
    - cron: '5,15,25,35,45,55 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kpi-update
  cancel-in-progress: false

jobs:
  opdater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Kør opdatering
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_kpi.py
      - name: Commit og push data.json
        run: |
          git config user.name "Fast as Fifty Bot"
          git config user.email "bot@hammerbamsen.github.io"
          git add data.json
          if git diff --staged --quiet; then
            echo "Ingen ændringer"
          else
            git commit -m "KPI auto-opdatering $(date +%Y-%m-%d_%H:%M)"
            git pull --rebase origin main
            git push
          fi
