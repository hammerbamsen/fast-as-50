name: Daglig dashboard-opdatering

on:
  # CRON GENAKTIVERET 2026-07-04: Actions er primær opdater-kilde (kører uden Mac).
  # Tidligere antagelse om at Intervals blokerer Actions-IPs var forkert (bevist 2/7 + 4/7).
  # launchd på Mac beholdes som redundans — concurrency-lås håndterer overlap.
  # 2026-07-08: */10 blev throttlet hårdt af GitHub (timers-huller) — ændret til */30
  # for færre oversprungne kørsler. Data ændrer sig sjældnere end det alligevel.
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kpi-update
  cancel-in-progress: false

jobs:
  opdater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Kør opdatering
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          python scripts/update_kpi.py 2>&1 | tee /tmp/kpi.log
          code=${PIPESTATUS[0]}
          echo "PYEXIT=$code" | tee -a /tmp/kpi.log
          exit $code
      - name: Debug capture on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          tail -c 6000 /tmp/kpi.log > /tmp/tail.txt || echo "no log file" > /tmp/tail.txt
          CONTENT=$(base64 -w0 /tmp/tail.txt)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/contents/debug/kpi_last_error.txt" | python3 -c "import sys,json;print(json.load(sys.stdin).get('sha',''))" 2>/dev/null)
          if [ -n "$SHA" ]; then EXTRA=",\"sha\":\"$SHA\""; else EXTRA=""; fi
          curl -s -X PUT -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/contents/debug/kpi_last_error.txt" -d "{\"message\":\"debug capture (midlertidig)\",\"content\":\"$CONTENT\"$EXTRA}" -o /dev/null -w "capture HTTP %{http_code}\n"
      - name: Commit og push data.json
        run: |
          git config user.name "Fast as Fifty Bot"
          git config user.email "bot@hammerbamsen.github.io"
          git add data.json
          if git diff --staged --quiet; then
            echo "Ingen ændringer"
            exit 0
          fi
          git commit -m "KPI auto-opdatering $(date +%Y-%m-%d_%H:%M)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin main && echo "Push OK forsøg $i" && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 3
          done
          echo "Push fejlede efter 3 forsøg"
          exit 1
