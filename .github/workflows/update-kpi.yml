name: Daglig dashboard-opdatering

on:
  # CRON GENAKTIVERET 2026-07-04: Actions er primær opdater-kilde (kører uden Mac).
  # Tidligere antagelse om at Intervals blokerer Actions-IPs var forkert (bevist 2/7 + 4/7).
  # launchd på Mac beholdes som redundans — concurrency-lås håndterer overlap.
  # 2026-07-08: */10 blev throttlet hårdt af GitHub (timers-huller) — ændret til */30
  # for færre oversprungne kørsler. Data ændrer sig sjældnere end det alligevel.
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_coach:
        description: 'Tving frisk AI-coachvurdering (ignorer 6-timers cache)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: kpi-update
  cancel-in-progress: false

jobs:
  opdater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Kør opdatering
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Sat via workflow_dispatch-input. Cron-korsler sender ingen inputs
          # -> tom streng -> cachen respekteres som hidtil.
          COACH_FORCE: ${{ inputs.force_coach && '1' || '' }}
        run: python scripts/update_kpi.py
      - name: Commit og push data.json
        run: |
          git config user.name "Fast as Fifty Bot"
          git config user.email "bot@hammerbamsen.github.io"
          git add data.json
          if git diff --staged --quiet; then
            echo "Ingen ændringer"
            exit 0
          fi
          git commit -m "KPI auto-opdatering $(date +%Y-%m-%d_%H:%M)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin main && echo "Push OK forsøg $i" && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 3
          done
          echo "Push fejlede efter 3 forsøg"
          exit 1
