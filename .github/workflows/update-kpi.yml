name: Daglig dashboard-opdatering

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  opdater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Kør opdatering
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_kpi.py
      - name: Commit og push
        run: |
          git config user.name "Fast as Fifty Bot"
          git config user.email "bot@hammerbamsen.github.io"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto $(date +%Y-%m-%d)"
          git push
