name: Daglig dashboard-opdatering

on:
  schedule:
    # Dag (05-22 UTC): hvert 10. minut
    - cron: '0,10,20,30,40,50 5-22 * * *'
    # Nat (22-05 UTC): hvert 30. minut
    - cron: '0,30 22-23,0-4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kpi-update
  cancel-in-progress: false

jobs:
  opdater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Kør opdatering
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_kpi.py
      - name: Commit og push data.json
        run: |
          git config user.name "Fast as Fifty Bot"
          git config user.email "bot@hammerbamsen.github.io"
          git add data.json
          if git diff --staged --quiet; then
            echo "Ingen ændringer"
            exit 0
          fi
          git commit -m "KPI auto-opdatering $(date +%Y-%m-%d_%H:%M)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin main && echo "Push OK forsøg $i" && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 3
          done
          echo "Push fejlede efter 3 forsøg"
          exit 1

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: opdater
    if: failure()
    steps:
      - name: Send fejlnotifikation
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          to: kennet@hammerby.com
          from: Fast as 50 Bot <${{ secrets.NOTIFY_EMAIL_USER }}>
          subject: "⚠️ fast-as-50 workflow fejlede — ${{ github.run_id }}"
          body: |
            KPI-opdateringen fejlede kl. ${{ github.event.head_commit.timestamp }}.

            Kørsel: https://github.com/hammerbamsen/fast-as-50/actions/runs/${{ github.run_id }}

            Tjek loggen for detaljer.
