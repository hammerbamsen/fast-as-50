name: Debug secrets
on: workflow_dispatch
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test secrets og skriv status
        env:
          GH_TOKEN_S: ${{ secrets.GH_TOKEN }}
          IK: ${{ secrets.INTERVALS_API_KEY }}
          IA: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: |
          mkdir -p debug
          {
            echo "kørt: $(date -u +%FT%TZ)"
            echo "GH_TOKEN længde: ${#GH_TOKEN_S}"
            echo "GH_TOKEN api.github.com/user → HTTP $(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: token $GH_TOKEN_S" https://api.github.com/user)"
            echo "GH_TOKEN repo-adgang → HTTP $(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: token $GH_TOKEN_S" https://api.github.com/repos/hammerbamsen/fast-as-50/contents/data.json)"
            echo "INTERVALS_API_KEY længde: ${#IK}"
            echo "INTERVALS_ATHLETE_ID længde: ${#IA}"
            echo "Intervals athlete → HTTP $(curl -s -o /dev/null -w '%{http_code}' -u "API_KEY:$IK" https://intervals.icu/api/v1/athlete/$IA)"
          } > debug/secrets_check.txt
          cat debug/secrets_check.txt
      - name: Commit status (bruger indbygget GITHUB_TOKEN)
        run: |
          git config user.name "debug-bot"
          git config user.email "bot@hammerbamsen.github.io"
          git add debug/secrets_check.txt
          git commit -m "debug: secrets-status" || echo "ingen ændring"
          git push
