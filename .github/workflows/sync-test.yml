name: Sync filer til OneDrive

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer afhængigheder
        run: pip install requests

      - name: Upload
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import os, sys, requests
          TENANT = os.environ["AZURE_TENANT_ID"]
          CLIENT = os.environ["AZURE_CLIENT_ID"]
          SECRET = os.environ["AZURE_CLIENT_SECRET"]
          resp = requests.post(
              "https://login.microsoftonline.com/" + TENANT + "/oauth2/v2.0/token",
              data={"grant_type": "client_credentials", "client_id": CLIENT,
                    "client_secret": SECRET, "scope": "https://graph.microsoft.com/.default"}
          )
          if resp.status_code != 200:
              print("Token fejl: " + str(resp.status_code) + " " + resp.text)
              sys.exit(1)
          token = resp.json()["access_token"]
          print("Token OK")
          DRIVE = "b!l3-EhhmboESLtqZs3mskwcfYgAb0uTBJtdZFBL1IqyUao41S6zySS6Rj_0KgtpbJ"
          FOLDER_ID = "01Y5SFS4EESRNSDGISBJCJQ5UURGEHA6FS"
          hdrs = {"Authorization": "Bearer " + token, "Content-Type": "application/octet-stream"}
          files = [
              ("data/Master_Plan.xlsx", "Master_Plan.xlsx"),
              ("data/Fast_as_Fifty_Masterplan_2026.docx", "Fast_as_Fifty_Masterplan_2026.docx"),
              ("data/Eva_Medoc_Traningsplan_2026.docx", "Eva_Medoc_Traningsplan_2026.docx"),
              ("data/Eva_Medoc_Master.xlsx", "Eva_Medoc_Master.xlsx"),
          ]
          ok = err = 0
          for local, remote in files:
              url = "https://graph.microsoft.com/v1.0/drives/" + DRIVE + "/items/" + FOLDER_ID + ":/" + remote + ":/content"
              with open(local, "rb") as fi:
                  r = requests.put(url, headers=hdrs, data=fi)
              if r.status_code in (200, 201):
                  print("OK " + remote)
                  ok += 1
              else:
                  print("FAIL " + remote + ": " + str(r.status_code) + " " + r.text[:200])
                  err += 1
          if err:
              sys.exit(1)
          print("Alle filer uploadet: " + str(ok))
          PYEOF
