name: Debug aktiviteter
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Kør debug
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: python scripts/debug_activities.py
      - name: Commit debug-output
        run: |
          git config user.name "Debug Bot"
          git config user.email "debug@bot.com"
          git add debug_activities.json
          git commit -m "debug output" || echo "ingen ændring"
          git pull --rebase origin main
          git push
