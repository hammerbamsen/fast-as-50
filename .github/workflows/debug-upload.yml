name: Debug workout upload

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Test og gem output
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 scripts/test_upload.py $INTERVALS_API_KEY 2>&1 | tee debug_output.txt
          
          # Push output til repo
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add debug_output.txt
          git commit -m "debug: workout upload output" || true
          git push
