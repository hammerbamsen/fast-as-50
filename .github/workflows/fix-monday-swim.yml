name: Fix mandag 29jun svøm

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - name: Slet og genopret
        env:
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          python3 << 'EOF'
          import os, requests

          CLIENT_ID     = os.environ['AZURE_CLIENT_ID']
          TENANT_ID     = os.environ['AZURE_TENANT_ID']
          CLIENT_SECRET = os.environ['AZURE_CLIENT_SECRET']

          # Token
          resp = requests.post(
              f"https://login.microsoftonline.com/{TENANT_ID}/oauth2/v2.0/token",
              data={'grant_type':'client_credentials','client_id':CLIENT_ID,
                    'client_secret':CLIENT_SECRET,'scope':'https://graph.microsoft.com/.default'}
          )
          resp.raise_for_status()
          token = resp.json()['access_token']
          hdrs = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          USER = "kennet@hammerby.com"

          # Hent alle events mandag 29/6
          r = requests.get(
              f"https://graph.microsoft.com/v1.0/users/{USER}/calendarView",
              headers={k:v for k,v in hdrs.items() if k!='Content-Type'},
              params={'startDateTime':'2026-06-29T00:00:00','endDateTime':'2026-06-29T23:59:59','$select':'id,subject,categories'}
          )
          events = r.json().get('value', [])
          print(f"Events mandag: {[e['subject'] for e in events]}")

          # Slet styrke og svøm-uden-kategori
          for e in events:
              subj = e['subject']
              cats = e.get('categories', [])
              if 'Styrke' in subj or ('Svøm' in subj and 'Træning' not in cats):
                  dr = requests.delete(f"https://graph.microsoft.com/v1.0/users/{USER}/events/{e['id']}", headers=hdrs)
                  print(f"  Slettet ({dr.status_code}): {subj}")

          # Opret svøm korrekt
          event = {
              'subject': '🏊 Svøm 1500m let teknisk',
              'body': {'contentType':'text','content':'- 400m varm-op Z1 8m freeride

5x
- 100m teknik Z1-Z2 2m freeride

- 300m cool 6m freeride'},
              'start': {'dateTime':'2026-06-29T06:00:00','timeZone':'Europe/Copenhagen'},
              'end':   {'dateTime':'2026-06-29T06:45:00','timeZone':'Europe/Copenhagen'},
              'categories': ['Træning'],
              'showAs': 'busy',
              'isReminderOn': True,
              'reminderMinutesBeforeStart': 30,
          }
          cr = requests.post(f"https://graph.microsoft.com/v1.0/users/{USER}/events", headers=hdrs, json=event)
          if cr.status_code == 201:
              print(f"  ✅ Svøm oprettet med Træning-kategori")
          else:
              print(f"  ❌ {cr.status_code}: {cr.text[:200]}")
          EOF
