name: Fix mandag 29jun swim

on:
  push:
    paths:
      - '.github/workflows/fix-monday-swim.yml'
  repository_dispatch:
    types: [fix-monday-swim]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests
      - name: Slet og genopret svom mandag
        env:
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python3 .github/workflows/scripts/fix_monday_swim.py
