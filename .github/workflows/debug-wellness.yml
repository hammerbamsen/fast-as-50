name: Debug wellness
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hent wellness og gem
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: |
          curl -s -u "API_KEY:$INTERVALS_API_KEY"             "https://intervals.icu/api/v1/athlete/$INTERVALS_ATHLETE_ID/wellness?oldest=2026-05-30&newest=2026-06-07"             > debug_output.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add debug_output.txt
          git commit -m "debug wellness full week" || echo "ingen"
          git push
