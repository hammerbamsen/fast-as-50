<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fast as Fifty">
<title>Fast as Fifty</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --wine: #59182A; --wine-d: #3E0F1D; --wine-l: #7A2038;
  --gold: #BE863A; --gold-l: #D4A55A;
  --cream: #ECE4D7; --cream-d: #DDD3C3;
  --ink: #1A1008; --muted: #7A6A58; --white: #FDFAF6;
  --run: #C0392B; --bike: #2874A6; --swim: #1A7A5E; --strength: #7D3C98; --free: #7A6A58;
  --r: 12px;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--cream); font-family:'Hanken Grotesk',sans-serif; color:var(--ink); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--cream-d); border-radius:2px; }

/* Layout */
.app { display:flex; min-height:100vh; }
.sidebar { width:200px; flex-shrink:0; background:var(--wine); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:50; }
.main { margin-left:200px; flex:1; padding:28px 28px 80px; max-width:860px; }
.bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--wine); border-top:1px solid var(--wine-l); padding:6px 0 14px; z-index:100; justify-content:space-around; align-items:center; }

@media(max-width:768px) {
  .sidebar { display:none !important; }
  .main { margin-left:0 !important; padding:16px 14px 90px !important; max-width:100% !important; }
  .bottom-nav { display:flex !important; }
}

/* Sidebar */
.sidebar-logo { padding:22px 20px 18px; border-bottom:1px solid var(--wine-l); }
.sidebar-logo-text { font-family:'Newsreader',serif; font-size:20px; color:var(--white); line-height:1.1; }
.sidebar-logo-text span { color:var(--gold); }
.sidebar-sub { font-family:'Space Mono',monospace; font-size:9px; color:rgba(255,255,255,0.35); margin-top:4px; letter-spacing:.08em; }
.sidebar-nav { flex:1; padding:10px; }
.nav-btn { width:100%; display:flex; align-items:center; gap:10px; padding:10px; border-radius:8px; border:none; background:transparent; border-left:3px solid transparent; color:rgba(255,255,255,.55); font-family:'Hanken Grotesk',sans-serif; font-size:14px; cursor:pointer; text-align:left; transition:all .15s; margin-bottom:2px; }
.nav-btn:hover { color:rgba(255,255,255,.85); background:rgba(255,255,255,.05); }
.nav-btn.active { color:var(--gold); background:rgba(190,134,58,.15); border-left-color:var(--gold); font-weight:600; }
.nav-btn svg { flex-shrink:0; }
.sidebar-footer { padding:14px 20px; border-top:1px solid var(--wine-l); }
.sidebar-footer-week { font-family:'Space Mono',monospace; font-size:9px; color:var(--gold); letter-spacing:.07em; margin-bottom:2px; }
.sidebar-footer-block { font-family:'Space Mono',monospace; font-size:9px; color:rgba(255,255,255,.3); }

/* Bottom nav */
.bottom-btn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:4px 8px; color:rgba(255,255,255,.4); transition:color .15s; }
.bottom-btn.active { color:var(--gold); }
.bottom-btn span { font-family:'Hanken Grotesk',sans-serif; font-size:10px; font-weight:400; }
.bottom-btn.active span { font-weight:700; }

/* Page header */
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:8px; }
.page-title { font-family:'Newsreader',serif; font-size:28px; color:var(--ink); line-height:1; }
.page-sub { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-top:2px; }
.page-meta { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); text-align:right; }
.page-meta-week { color:var(--wine); font-weight:700; }

/* Cards */
.card { background:var(--white); border-radius:var(--r); padding:18px 16px; border:1px solid var(--cream-d); margin-bottom:14px; }
.card-wine { background:var(--wine); border-color:transparent; position:relative; overflow:hidden; }
.card-wine::before { content:''; position:absolute; top:-20px; right:-20px; width:120px; height:120px; border-radius:50%; background:var(--wine-l); opacity:.4; }
.label { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:12px; }
.label-gold { color:var(--gold); }

/* Coach speech */
.coach-text { font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#FDFAF6; line-height:1.65; position:relative; }
.coach-hl { color:var(--gold); font-weight:700; }

/* KPI grid */
.kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
.kpi-card { background:var(--white); border-radius:10px; padding:14px 10px 16px; border:1px solid var(--cream-d); position:relative; overflow:hidden; }
.kpi-bar { position:absolute; bottom:0; left:0; right:0; height:3px; border-radius:0 0 10px 10px; }
.kpi-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:.07em; margin-bottom:6px; }
.kpi-value { font-family:'Newsreader',serif; font-size:22px; color:var(--wine); line-height:1; margin-bottom:4px; }
.kpi-unit { font-size:12px; color:var(--muted); font-family:'Space Mono',monospace; }
.kpi-sub { font-family:'Hanken Grotesk',sans-serif; font-size:11px; color:var(--muted); }

/* Session hero */
.session-hero { padding:24px 20px; }
.session-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:14px; position:relative; }
.session-title { font-family:'Newsreader',serif; font-size:26px; color:var(--white); margin:8px 0 6px; }
.session-meta { display:flex; gap:12px; }
.session-duration { font-family:'Space Mono',monospace; font-size:12px; color:var(--gold); }
.session-zone { font-family:'Space Mono',monospace; font-size:12px; color:rgba(255,255,255,.6); }
.session-desc { font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:rgba(255,255,255,.7); margin-top:10px; line-height:1.5; max-width:320px; }
.complete-btn { background:transparent; border:1.5px solid var(--gold); border-radius:8px; padding:10px 16px; color:var(--gold); font-family:'Hanken Grotesk',sans-serif; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .2s; white-space:nowrap; }
.complete-btn.done { background:var(--gold); color:var(--wine); }

/* Week strip */
.week-strip { display:flex; gap:5px; }
.wday { flex:1; border-radius:8px; padding:8px 3px; display:flex; flex-direction:column; align-items:center; gap:4px; border:1.5px solid var(--cream-d); background:rgba(221,211,195,.4); }
.wday.is-today { border-color:var(--wine); background:rgba(89,24,42,.08); }
.wday.done-run { border-color:var(--run); background:rgba(192,57,43,.1); }
.wday.done-bike { border-color:var(--bike); background:rgba(40,116,166,.1); }
.wday.done-swim { border-color:var(--swim); background:rgba(26,122,94,.1); }
.wday.done-strength { border-color:var(--strength); background:rgba(125,60,152,.1); }
.wday.done-free { border-color:var(--free); background:rgba(122,106,88,.1); }
.wday-name { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); font-weight:400; }
.wday.is-today .wday-name { color:var(--wine); font-weight:700; }

/* Status row */
.status-row { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; margin-bottom:14px; }
.stat-card { background:var(--white); border-radius:10px; padding:14px 10px; border:1px solid var(--cream-d); text-align:center; }
.stat-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:.08em; margin-bottom:4px; }
.stat-value { font-family:'Newsreader',serif; font-size:26px; color:var(--wine); line-height:1; }
.stat-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); margin-top:2px; }

/* AF Ring */
.af-ring { display:flex; flex-direction:column; align-items:center; gap:3px; }
.af-ring-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:.07em; }

/* Discipline tag */
.disc-tag { display:inline-flex; align-items:center; gap:4px; border-radius:4px; padding:3px 8px; font-family:'Space Mono',monospace; font-weight:700; letter-spacing:.08em; font-size:11px; }

/* Progress bars */
.prog-row { margin-bottom:18px; }
.prog-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.prog-lbl { font-family:'Hanken Grotesk',sans-serif; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
.prog-vals { font-family:'Space Mono',monospace; font-size:12px; }
.prog-now { color:var(--gold); font-weight:700; }
.prog-muted { color:var(--muted); font-size:10px; }
.prog-track { position:relative; height:8px; background:var(--cream-d); border-radius:4px; }
.prog-fill { position:absolute; left:0; top:0; height:100%; border-radius:4px; transition:width .6s; }
.prog-dot { position:absolute; top:-2px; width:12px; height:12px; border-radius:50%; border:2px solid white; transform:translateX(-50%); }
.prog-pct { text-align:right; margin-top:3px; font-family:'Space Mono',monospace; font-size:9px; }

/* Zone bars */
.zone-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.zone-lbl { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; width:20px; }
.zone-bar { flex:1; height:26px; border-radius:4px; display:flex; align-items:center; padding-left:10px; }
.zone-name { font-family:'Hanken Grotesk',sans-serif; font-size:12px; font-weight:600; }
.zone-range { font-family:'Space Mono',monospace; font-size:11px; color:var(--ink); width:90px; text-align:right; }

/* Period timeline */
.period-scroll { overflow-x:auto; padding-bottom:4px; }
.period-row { display:flex; gap:3px; min-width:560px; }
.period-cell { flex:1; min-width:34px; height:44px; border-radius:5px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1.5px solid; transition:all .2s; }
.period-cell .pc-lbl { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; }
.period-cell .pc-num { font-family:'Space Mono',monospace; font-size:8px; }
.period-legend { display:flex; gap:14px; margin-top:10px; }
.legend-dot { width:10px; height:10px; border-radius:2px; }

/* CTL Graph */
.ctl-svg { width:100%; height:auto; }

/* Week sessions */
.wsession { display:flex; align-items:center; gap:12px; padding:14px; border-radius:10px; margin-bottom:8px; border:1.5px solid var(--cream-d); background:var(--white); }
.wsession.is-today { border-color:var(--wine); background:rgba(89,24,42,.05); }
.wsession-icon { width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.wsession-body { flex:1; }
.wsession-title { font-family:'Hanken Grotesk',sans-serif; font-size:15px; font-weight:600; color:var(--ink); }
.wsession-day { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); }
.today-badge { font-family:'Space Mono',monospace; font-size:9px; background:rgba(89,24,42,.12); color:var(--wine); padding:2px 6px; border-radius:3px; margin-left:6px; }

/* Event cards */
.event-card { display:flex; align-items:center; gap:12px; padding:12px; background:var(--cream); border-radius:8px; margin-bottom:10px; }
.event-days { font-family:'Newsreader',serif; font-size:28px; color:var(--wine); line-height:1; }
.event-days-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }

/* Rules */
.rule-row { display:flex; gap:12px; align-items:flex-start; padding:14px; background:var(--white); border:1px solid var(--cream-d); border-radius:10px; margin-bottom:8px; }
.rule-num { font-family:'Space Mono',monospace; font-size:10px; color:var(--gold); font-weight:700; flex-shrink:0; margin-top:2px; }
.rule-title { font-family:'Newsreader',serif; font-size:15px; font-weight:600; color:var(--wine); margin-bottom:4px; }
.rule-body { font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:var(--muted); line-height:1.5; }

/* Strength */
.strength-tag { font-family:'Hanken Grotesk',sans-serif; font-size:12px; background:var(--cream); border:1px solid var(--cream-d); border-radius:6px; padding:5px 10px; color:var(--ink); display:inline-block; margin:0 4px 6px 0; }
.eq-note { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); margin-top:10px; }

/* Weekday page header card */
.hero-card { background:var(--wine); border-radius:var(--r); padding:20px 18px; margin-bottom:16px; }
.hero-eyebrow { font-family:'Space Mono',monospace; font-size:10px; color:var(--gold); letter-spacing:.1em; margin-bottom:4px; }
.hero-title { font-family:'Newsreader',serif; font-size:24px; color:var(--white); margin:0 0 2px; }
.hero-sub { font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:rgba(255,255,255,.6); }

/* Page sections */
.page { display:none; }
.page.active { display:block; }

/* Spinner */
.spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--cream-d); border-top-color:var(--wine); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading { display:flex; align-items:center; justify-content:center; height:200px; }
</style>
</head>

function icon(name, size=20, color="currentColor") {
  return ICONS[name]?.replace(/SIZE/g,size).replace(/COLOR/g,color) || "";
}

function discTag(disc, small=false) {
  const sz = small ? {fs:10,p:"2px 6px",ic:11} : {fs:11,p:"3px 8px",ic:13};
  return `<span class="disc-tag" style="background:${C[disc]}18;color:${C[disc]};border:1px solid ${C[disc]}40;font-size:${sz.fs}px;padding:${sz.p}">${icon(disc,sz.ic,C[disc])} ${DISC_LABEL[disc]}</span>`;
}

// ── Helpers ───────────────────────────────────────────────────
function afRing(done, target) {
  const r=22, circ=2*Math.PI*r, pct=done/target;
  return `<div class="af-ring">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="${r}" fill="none" stroke="var(--cream-d)" stroke-width="5"/>
      <circle cx="30" cy="30" r="${r}" fill="none" stroke="var(--wine)" stroke-width="5"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"
        stroke-linecap="round" transform="rotate(-90 30 30)"/>
      <text x="30" y="35" text-anchor="middle" fill="var(--wine)" font-size="13"
        font-family="'Space Mono',monospace" font-weight="700">${done}/${target}</text>
    </svg>
    <span class="af-ring-label">AF-DAGE</span>
  </div>`;
}

function weekStrip() {
  return `<div class="week-strip">${D.week_sessions.map(s=>{
    const doneClass = s.done ? `done-${s.disc}` : "";
    const todayClass = s.today ? "is-today" : "";
    const ico = s.done ? icon("check",14,C[s.disc]) : icon(s.disc,14,s.today?"var(--wine)":"var(--muted)");
    return `<div class="wday ${doneClass} ${todayClass}">
      <span class="wday-name">${s.day}</span>${ico}
    </div>`;
  }).join("")}</div>`;
}

function progressMetric(label, startVal, nowVal, goalVal, unit, color) {
  const isInverse = startVal > goalVal;
  const diff = Math.round(Math.abs(nowVal - goalVal) * 10) / 10;
  const arrow = isInverse ? "↓" : "↑";
  const diffText = `${arrow} ${diff}${unit} til mål`;

  return `<div style="display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--cream-d)">
    <div style="width:120px;flex-shrink:0">
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.06em;margin-bottom:4px">${label}</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">start: ${startVal}${unit}</div>
    </div>
    <div style="flex:1;text-align:center">
      <div style="font-family:'Newsreader',serif;font-size:38px;color:var(--wine);line-height:1">${nowVal}</div>
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">${unit}</div>
    </div>
    <div style="width:120px;flex-shrink:0;text-align:right">
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:${color};font-weight:700;margin-bottom:4px">${diffText}</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">mål: ${goalVal}${unit}</div>
    </div>
  </div>`;
}

// ── Navigation ────────────────────────────────────────────────
const PAGES = [
  {id:"today",    label:"I dag",    icon:"today"},
  {id:"week",     label:"Uge",      icon:"week"},
  {id:"overview", label:"Overblik", icon:"overview"},
  {id:"body",     label:"Krop",     icon:"body"},
  {id:"rules",    label:"Regler",   icon:"rules"},
];

let activePage = "today";

function renderNav() {
  document.getElementById("sidebar-nav").innerHTML = PAGES.map(p=>`
    <button class="nav-btn ${activePage===p.id?"active":""}" onclick="navigate('${p.id}')">
      ${icon(p.icon, 18, activePage===p.id?"var(--gold)":"rgba(255,255,255,.55)")} ${p.label}
    </button>`).join("");

  document.getElementById("bottom-nav").innerHTML = PAGES.map(p=>`
    <button class="bottom-btn ${activePage===p.id?"active":""}" onclick="navigate('${p.id}')">
      ${icon(p.icon, 22, activePage===p.id?"var(--gold)":"rgba(255,255,255,.4)")}
      <span>${p.label}</span>
    </button>`).join("");
}

function navigate(pageId) {
  activePage = pageId;
  const page = PAGES.find(p=>p.id===pageId);
  document.getElementById("page-title").textContent = page.label;
  document.getElementById("page-sub").textContent = pageId==="today" ? `${D.dayName}, ${D.date}` : "";

  PAGES.forEach(p=>document.getElementById(`page-${p.id}`).classList.remove("active"));
  document.getElementById(`page-${pageId}`).classList.add("active");

  // Render den aktive side
  const renders = {today:renderToday, week:renderWeek, overview:renderOverview, body:renderBody, rules:renderRules};
  document.getElementById(`page-${pageId}`).innerHTML = renders[pageId]();

  renderNav();
}

function toggleDone(btn) {
  sessionDone = !sessionDone;
  btn.className = `complete-btn ${sessionDone?"done":""}`;
  btn.innerHTML = `${icon("check",15,sessionDone?"var(--wine)":"var(--gold)")} ${sessionDone?"Gennemført":"Markér gennemført"}`;
}

function updateMeta() {
  document.getElementById("sf-week").textContent = `UGE ${D.week}/${D.totalWeeks}`;
  document.getElementById("sf-block").textContent = `${D.blockType} BLOCK`;
  document.getElementById("pm-week").textContent = `UGE ${D.week}/${D.totalWeeks}`;
  document.getElementById("pm-block").textContent = D.blockType;
  document.getElementById("page-sub").textContent = activePage==="today" ? `${D.dayName}, ${D.date}` : "";
}

// ── Fetch data.json og render ─────────────────────────────────
async function init() {
  // Render med defaults først — ingen loading screen
  renderNav();
  updateMeta();
  navigate("today");

  // Hent friske data i baggrunden
  try {
    const r = await fetch("data.json?t=" + Date.now());
    if (r.ok) {
      const remote = await r.json();
      const m = remote.meta || {};
      if (m.week)                       D.week                   = m.week;
      if (m.totalWeeks)                 D.totalWeeks             = m.totalWeeks;
      if (m.blockType)                  D.blockType              = m.blockType;
      if (m.daysToMedoc != null)        D.daysToMedoc            = m.daysToMedoc;
      if (m.daysToChristiansborg!=null) D.daysToChristiansborg   = m.daysToChristiansborg;
      if (m.dayName)                    D.dayName                = m.dayName;
      if (m.date)                       D.date                   = m.date;
      if (remote.af)                    D.afDays.weekDone        = remote.af.weekDone || 0;
      if (remote.kpis) {
        const km = remote.kpis;
        D.kpis = [
          {label:"VÆGT",           value:km.weight?.value  ||"—", unit:"kg",  sub:"Mål <72 kg",        color:"#27AE60"},
          {label:"FEDT%",          value:km.fat?.value     ||"—", unit:"%",   sub:"Mål <20%",          color:"#F39C12"},
          {label:"CTL FITNESS",    value:km.ctl?.value     ||"—", unit:"",    sub:"Mål 60 (uge 11)",   color:"#C0392B"},
          {label:"HRV SNIT 7D",    value:km.hrv?.value     ||"—", unit:" ms", sub:"Stigende trend",    color:"#7A6A58"},
          {label:"TSS COMPLIANCE", value:km.tss?.value     ||"—", unit:"",    sub:"Mål >85%",          color:"#7A6A58"},
          {label:"LØB KM/UGE",     value:km.runKm?.value   ||"—", unit:" km", sub:"Mål 40+ km uge 10", color:"#C0392B"},
        ];
      }
      if (remote.ctlCurve)       D.ctlCurve       = remote.ctlCurve;
      if (remote.coachSpeech)    D.coachSpeech    = remote.coachSpeech;
      if (remote.coachHighlight) D.coachHighlight = remote.coachHighlight;
      if (remote.weekFocus)      D.weekFocus      = remote.weekFocus;
      if (remote.week_sessions)  D.week_sessions  = remote.week_sessions;
      if (remote.today) {
        // Håndter både flat og nested format
        if (remote.today.title) D.today = remote.today;
        else if (remote.today.session) D.today = remote.today.session;
      }

      // Re-render med friske data
      updateMeta();
      navigate(activePage);
    }
  } catch(e) {
    console.log("data.json ikke tilgængelig, bruger defaults");
  }
}

init();
</script>
