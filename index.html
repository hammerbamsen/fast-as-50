<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fast as Fifty">
<title>Fast as Fifty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #ECE4D7; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #DDD3C3; border-radius: 2px; }
  @media (max-width: 768px) {
    .sidebar { display: none !important; }
    .main-content { margin-left: 0 !important; padding: 20px 14px 90px !important; max-width: 100% !important; }
    .bottom-nav { display: flex !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

async function fetchData() {
  try {
    const r = await fetch("data.json?t=" + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

function mergeData(remote) {
  if (!remote) return;
  const m = remote.meta || {};
  if (m.week)                 DATA.week                 = m.week;
  if (m.totalWeeks)           DATA.totalWeeks           = m.totalWeeks;
  if (m.blockType)            DATA.blockType            = m.blockType;
  if (m.daysToMedoc != null)  DATA.daysToMedoc          = m.daysToMedoc;
  if (m.daysToChristiansborg != null) DATA.daysToChristiansborg = m.daysToChristiansborg;
  if (m.dayName)              DATA.today.dayName        = m.dayName;
  if (m.date)                 DATA.today.date           = m.date;
  if (remote.af != null)      DATA.afDays.weekDone      = remote.af.weekDone || 0;
  if (remote.kpis) {
    const km = remote.kpis;
    DATA.kpis = [
      { label:"VÆGT",           value: km.weight?.value  || "—", unit:"kg",  sub:"Mål <72 kg",         color:"#27AE60" },
      { label:"FEDT%",          value: km.fat?.value     || "—", unit:"%",   sub:"Mål <20%",           color:"#F39C12" },
      { label:"CTL FITNESS",    value: km.ctl?.value     || "—", unit:"",    sub:"Mål 60 (uge 11)",    color:"#C0392B" },
      { label:"HRV SNIT 7D",    value: km.hrv?.value     || "—", unit:" ms", sub:"Stigende trend",     color:"#7A6A58" },
      { label:"TSS COMPLIANCE", value: km.tss?.value     || "—", unit:"",    sub:"Mål >85%",           color:"#7A6A58" },
      { label:"LØB KM/UGE",     value: km.runKm?.value   || "—", unit:" km", sub:"Mål 40+ km uge 10",  color:"#C0392B" },
    ];
  }
  if (remote.ctlCurve) DATA.ctlCurve = remote.ctlCurve;
  if (remote.coachSpeech)    DATA.coachSpeech    = remote.coachSpeech;
  if (remote.coachHighlight) DATA.coachHighlight = remote.coachHighlight;
  if (remote.weekFocus)      DATA.weekFocus      = remote.weekFocus;
}

const C = {
  wine:"#59182A", wineD:"#3E0F1D", wineL:"#7A2038",
  gold:"#BE863A", goldL:"#D4A55A",
  cream:"#ECE4D7", creamD:"#DDD3C3",
  ink:"#1A1008", muted:"#7A6A58", white:"#FDFAF6",
  run:"#C0392B", bike:"#2874A6", swim:"#1A7A5E", strength:"#7D3C98", free:"#7A6A58",
};

// DATA hentes fra data.json ved opstart
let DATA = {
  athlete:"Kennet Hammerby", week:1, totalWeeks:14, blockType:"BUILD",
  daysToMedoc:93, daysToChristiansborg:86,
  weight:{ start:74.5, now:74.5, goal:72, unit:"kg" },
  bodyFat:{ start:23, now:23, goal:20, unit:"%" },
  ctl:{ start:34, now:34, goal:60, unit:"" },
  afDays:{ done:0, target:5, weekDone:4 },
  weekFocus:"Aktivér systemet. Første build-uge — hold igen på intensitet, byg volumen gradvist. Fokus: protein ≥ 150 g/dag, søvn ≥ 7 t, 5 AF-dage.",
  coachSpeech:"Du starter fra CTL 34 — lavere end din Ironman-baggrund tilsiger, men ærligt. {HL} Uge 1: etabler rytmen. 5 AF-dage, protein ved hvert måltid.",
  coachHighlight:"14 uger konsistens løfter dig til CTL 60.",
  kpis:[
    { label:"VÆGT",           value:"74,5", unit:"kg",  sub:"Mål <72 kg",         color:"#27AE60" },
    { label:"FEDT%",          value:"23,0", unit:"%",   sub:"Mål <20%",           color:"#F39C12" },
    { label:"CTL FITNESS",    value:"34,2", unit:"",    sub:"Mål 60 (uge 11)",    color:"#C0392B" },
    { label:"HRV SNIT 7D",    value:"—",    unit:" ms", sub:"Stigende trend",     color:"#7A6A58" },
    { label:"TSS COMPLIANCE", value:"—",    unit:"",    sub:"Mål >85%",           color:"#7A6A58" },
    { label:"LØB KM/UGE",     value:"13,8", unit:" km", sub:"Mål 40+ km uge 10",  color:"#C0392B" },
  ],
  today:{ dayName:"Torsdag", date:"5. jun",
    session:{ discipline:"strength", title:"Styrke fuld + walk", duration:"60 min", zone:"–", desc:"30 min fuldt styrkeprogram + 30 min walk. Hjemme.", completed:false }
  },
  week_sessions:[
    { day:"Man", disc:"bike",     label:"Hometrainer + Styrke",  done:true },
    { day:"Tir", disc:"run",      label:"Løb easy (Malmø)",      done:true },
    { day:"Ons", disc:"run",      label:"Løb easy (Malmø)",      done:true },
    { day:"Tor", disc:"strength", label:"Styrke + walk",         done:false, today:true },
    { day:"Fre", disc:"bike",     label:"Cykling 5×3 Z3",        done:false },
    { day:"Lør", disc:"run",      label:"Lang løb 90 min Z2",    done:false },
    { day:"Søn", disc:"swim",     label:"Svøm 2000m + cykel",    done:false },
  ],
  ctlCurve:[34,36,38,41,44,43,41,45,49,53,57,55,58,60],

const discColor = { run:C.run, bike:C.bike, swim:C.swim, strength:C.strength, free:C.free };
const discLabel = { run:"LØB", bike:"CYKEL", swim:"SVØM", strength:"STYRKE", free:"FRI" };

// ── SVG Icons ──────────────────────────────────────────────────
function Icon({ name, size=20, color="currentColor" }) {
  const s = { width:size, height:size, display:"inline-block", flexShrink:0, verticalAlign:"middle" };
  const p = { fill:"none", stroke:color, strokeWidth:"1.8", strokeLinecap:"round", strokeLinejoin:"round" };
  const icons = {
    run:      <svg style={s} viewBox="0 0 24 24" {...p}><path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/><path d="m7 21 3-6 2 2 3-4"/><path d="m5 12 3-2 2 3 4-2 1-4"/></svg>,
    bike:     <svg style={s} viewBox="0 0 24 24" {...p}><circle cx="6" cy="15" r="4"/><circle cx="18" cy="15" r="4"/><path d="M6 15 9 6h6l2 4-5 2"/><path d="m9 6 2 3"/></svg>,
    swim:     <svg style={s} viewBox="0 0 24 24" {...p}><path d="M2 12c1.5-2 3-2 4.5 0s3 2 4.5 0 3-2 4.5 0 3 2 4.5 0"/><path d="M2 17c1.5-2 3-2 4.5 0s3 2 4.5 0 3-2 4.5 0 3 2 4.5 0"/><circle cx="17" cy="5" r="2"/><path d="m14 7 3-2 3 4"/></svg>,
    strength: <svg style={s} viewBox="0 0 24 24" {...p}><path d="M6 12h12"/><path d="M4 10h2v4H4zM18 10h2v4h-2z"/><path d="M2 11h2v2H2zM20 11h2v2h-2z"/></svg>,
    free:     <svg style={s} viewBox="0 0 24 24" {...p}><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>,
    check:    <svg style={s} viewBox="0 0 24 24" {...p}><polyline points="20 6 9 17 4 12"/></svg>,
    today:    <svg style={s} viewBox="0 0 24 24" {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    week:     <svg style={s} viewBox="0 0 24 24" {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="14" x2="8" y2="18"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="16" y1="14" x2="16" y2="18"/></svg>,
    overview: <svg style={s} viewBox="0 0 24 24" {...p}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
    body:     <svg style={s} viewBox="0 0 24 24" {...p}><circle cx="12" cy="5" r="2"/><path d="M12 7v6l-3 5M12 13l3 5"/><path d="M9 9h6"/></svg>,
    rules:    <svg style={s} viewBox="0 0 24 24" {...p}><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
    flag:     <svg style={s} viewBox="0 0 24 24" {...p}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>,
  };
  return icons[name] || <svg style={s} viewBox="0 0 24 24"/>;
}

function DisciplineTag({ disc, small }) {
  const sz = small ? { fs:10, p:"2px 6px", iconSz:11 } : { fs:11, p:"3px 8px", iconSz:13 };
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:4,
      background:discColor[disc]+"18", color:discColor[disc],
      border:`1px solid ${discColor[disc]}40`, borderRadius:4,
      padding:sz.p, fontSize:sz.fs, fontFamily:"'Space Mono',monospace", fontWeight:700, letterSpacing:"0.08em" }}>
      <Icon name={disc} size={sz.iconSz} color={discColor[disc]} />
      {discLabel[disc]}
    </span>
  );
}

function ProgressMetric({ label, start, now, goal, unit, color=C.gold }) {
  const pct = Math.min(100, Math.max(0, Math.round(((start - now) / (start - goal)) * 100)));
  return (
    <div style={{ marginBottom:18 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6 }}>
        <span style={{ fontFamily:"'Hanken Grotesk',sans-serif", fontSize:12, color:C.muted, letterSpacing:"0.05em", textTransform:"uppercase" }}>{label}</span>
        <span style={{ fontFamily:"'Space Mono',monospace", fontSize:12, color:C.ink }}>
          <span style={{ color:C.muted, fontSize:10 }}>{start}{unit} → </span>
          <span style={{ color:C.gold, fontWeight:700 }}>{now}{unit}</span>
          <span style={{ color:C.muted, fontSize:10 }}> → {goal}{unit}</span>
        </span>
      </div>
      <div style={{ position:"relative", height:8, background:C.creamD, borderRadius:4 }}>
        <div style={{ position:"absolute", left:0, top:0, height:"100%", width:`${Math.max(2,pct)}%`, background:color, borderRadius:4 }} />
        <div style={{ position:"absolute", left:`${Math.max(2,pct)}%`, top:-2, width:12, height:12, borderRadius:"50%", background:color, border:`2px solid white`, transform:"translateX(-50%)" }} />
      </div>
      <div style={{ textAlign:"right", marginTop:3 }}>
        <span style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:pct>0?C.gold:C.muted }}>{pct}% af mål</span>
      </div>
    </div>
  );
}

function AFRing({ done, target }) {
  const r=22, circ=2*Math.PI*r, pct=done/target;
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r={r} fill="none" stroke={C.creamD} strokeWidth="5"/>
        <circle cx="30" cy="30" r={r} fill="none" stroke={C.wine} strokeWidth="5"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
          strokeLinecap="round" transform="rotate(-90 30 30)"/>
        <text x="30" y="35" textAnchor="middle" fill={C.wine} fontSize="13" fontFamily="'Space Mono',monospace" fontWeight="700">{done}/{target}</text>
      </svg>
      <span style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:C.muted, letterSpacing:"0.07em" }}>AF-DAGE</span>
    </div>
  );
}

function CTLGraph({ data, currentWeek }) {
  const W=500, H=120, pad={t:10,r:20,b:30,l:30};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const mn=30, mx=65;
  const x=i => pad.l+(i/(data.length-1))*iW;
  const y=v => pad.t+iH-((v-mn)/(mx-mn))*iH;
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  const area=`M${x(0)},${y(data[0])} `+data.map((v,i)=>`L${x(i)},${y(v)}`).join(" ")+` L${x(data.length-1)},${H-pad.b} L${x(0)},${H-pad.b} Z`;
  const wkLabels=["B1","","","R","","","","R","","","","R","CB","MD"];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:"auto" }}>
      <defs>
        <linearGradient id="ctlGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.gold} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={C.gold} stopOpacity="0.03"/>
        </linearGradient>
      </defs>
      {[35,45,55].map(v=>(
        <g key={v}>
          <line x1={pad.l} x2={W-pad.r} y1={y(v)} y2={y(v)} stroke={C.creamD} strokeWidth="1"/>
          <text x={pad.l-4} y={y(v)+4} textAnchor="end" fill={C.muted} fontSize="9" fontFamily="'Space Mono',monospace">{v}</text>
        </g>
      ))}
      <path d={area} fill="url(#ctlGrad)"/>
      <polyline points={pts} fill="none" stroke={C.gold} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((v,i)=>(
        <circle key={i} cx={x(i)} cy={y(v)} r={i===currentWeek-1?5:3}
          fill={i<currentWeek?C.gold:C.creamD}
          stroke={i===currentWeek-1?C.wine:C.gold}
          strokeWidth={i===currentWeek-1?2:1}/>
      ))}
      {wkLabels.map((label,i)=>(
        <text key={i} x={x(i)} y={H-4} textAnchor="middle"
          fill={i===currentWeek-1?C.wine:C.muted} fontSize="8"
          fontFamily="'Space Mono',monospace"
          fontWeight={i===currentWeek-1?"700":"400"}>
          {label||(i+1)}
        </text>
      ))}
    </svg>
  );
}

function ZoneBars({ zones }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
      {zones.map((z,i)=>(
        <div key={i} style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:z.color, width:20, fontWeight:700 }}>{z.label}</span>
          <div style={{ flex:1, height:26, background:z.color+"22", borderRadius:4, border:`1px solid ${z.color}44`, display:"flex", alignItems:"center", paddingLeft:10 }}>
            <span style={{ fontFamily:"'Hanken Grotesk',sans-serif", fontSize:12, color:z.color, fontWeight:600 }}>{z.name}</span>
          </div>
          <span style={{ fontFamily:"'Space Mono',monospace", fontSize:11, color:C.ink, width:90, textAlign:"right" }}>{z.range}</span>
        </div>
      ))}
    </div>
  );
}

function PeriodTimeline({ weeks, currentWeek }) {
  const typeColor = { build:C.wine, recovery:C.swim, race:C.gold };
  return (
    <div style={{ overflowX:"auto", paddingBottom:4 }}>
      <div style={{ display:"flex", gap:3, minWidth:560 }}>
        {weeks.map(w=>(
          <div key={w.week} style={{
            flex:1, minWidth:34, height:44, borderRadius:5,
            background:w.week===currentWeek?typeColor[w.type]:typeColor[w.type]+"22",
            border:`1.5px solid ${typeColor[w.type]}`,
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          }}>
            <span style={{ fontFamily:"'Space Mono',monospace", fontSize:9, fontWeight:700, color:w.week===currentWeek?C.white:typeColor[w.type] }}>{w.label}</span>
            <span style={{ fontFamily:"'Space Mono',monospace", fontSize:8, color:w.week===currentWeek?C.white+"cc":typeColor[w.type]+"aa" }}>{w.week}</span>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:14, marginTop:10 }}>
        {[["build",C.wine,"BUILD"],["recovery",C.swim,"RECOVERY"],["race",C.gold,"RACE"]].map(([k,col,lbl])=>(
          <div key={k} style={{ display:"flex", alignItems:"center", gap:5 }}>
            <div style={{ width:10, height:10, borderRadius:2, background:col }}/>
            <span style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:C.muted }}>{lbl}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Card wrapper ──
function Card({ children, highlight=false, style={} }) {
  return (
    <div style={{ background:highlight?C.wine:C.white, borderRadius:12,
      padding:"18px 16px", border:`1px solid ${highlight?"transparent":C.creamD}`,
      marginBottom:14, position:"relative", overflow:"hidden", ...style }}>
      {children}
    </div>
  );
}

function Label({ children }) {
  return <div style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:C.muted, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:12 }}>{children}</div>;
}

// ══ PAGES ══════════════════════════════════════════════════════


function CoachSpeech() {
  const parts = DATA.coachSpeech.split("{HL}");
  return (
    <div style={{ background:C.wine, borderRadius:12, padding:"18px 18px", marginBottom:14 }}>
      <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:C.gold, letterSpacing:"0.1em", marginBottom:8 }}>TRÆNER + DIÆTIST · UGE {DATA.week}</div>
      <p style={{ fontFamily:"'Hanken Grotesk',sans-serif", fontSize:14, color:C.white, lineHeight:1.65, margin:0 }}>
        {parts[0]}<span style={{ color:C.gold, fontWeight:700 }}>{DATA.coachHighlight}</span>{parts[1]}
      </p>
    </div>
  );
}

function KPIGrid() {
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:14 }}>
      {DATA.kpis.map((kpi,i)=>(
        <div key={i} style={{ background:C.white, borderRadius:10, padding:"14px 12px", border:`1px solid ${C.creamD}`, position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", bottom:0, left:0, right:0, height:3, background:kpi.color, borderRadius:"0 0 10px 10px" }}/>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:C.muted, letterSpacing:"0.07em", marginBottom:6 }}>{kpi.label}</div>
          <div style={{ fontFamily:"'Newsreader',serif", fontSize:22, color:C.wine, lineHeight:1, marginBottom:4 }}>
            {kpi.value}<span style={{ fontSize:13, color:C.muted, fontFamily:"'Space Mono',monospace" }}>{kpi.unit}</span>
          </div>
          <div style={{ fontFamily:"'Hanken Grotesk',sans-serif", fontSize:11, color:C.muted }}>{kpi.sub}</div>
        </div>
      ))}
    </div>
  );
}

function PageToday({ session, setSession }) {
  return (
    <div>
      <CoachSpeech/>
      <KPIGrid/>
      {/* Hero */}
      <Card highlight style={{ padding:"24px 20px" }}>
        <div style={{ position:"absolute", top:-20, right:-20, width:120, height:120, borderRadius:"50%", background:C.wineL, opacity:0.4 }}/>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:14, position:"relative" }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              <Icon name={session.discipline} size={22} color={C.gold}/>
              <DisciplineTag disc={session.discipline}/>
            </div>
            <h2 style={{ fontFamily:"'Newsreader',serif", fontSize:26, color:C.white, margin:"0 0 6px" }}>{session.title}</h2>
            <div style={{ display:"flex", gap:12 }}>
              <span style={{ fontFamily:"'Space Mono',monospace", fontSize:12, color:C.gold }}>{session.duration}</span>
              {session.zone !== "–" && <span style={{ fontFamily:"'Space Mono',monospace", fontSize:12, color:C.white+"99" }}>Zone {session.zone}</span>}
            </div>
            <p style={{ fontFamily:"'Hanken Grotesk',sans-serif", fontSize:13, color:C.white+"bb", marginTop:10, lineHeight:1.5, maxWidth:300 }}>{session.desc}</p>
          </div>
          <button onClick={()=>setSession({...session,completed:!session.completed})} style={{
            background:session.completed?C.gold:"transparent", border:`1.5px solid ${C.gold}`,
            borderRadius:8, padding:"10px 16px", color:session.completed?C.wine:C.gold,
            fontFamily:"'Hanken Grotesk',sans-serif", fontSize:13, fontWeight:700,
            cursor:"pointer", display:"flex", alignItems:"center", gap:6, transition:"all 0.2s",
          }}>
            <Icon name="check" size={15} color={session.completed?C.wine:C.gold}/>
            {session.completed?"Gennemført":"Markér gennemført"}
          </button>
        </div>
      </Card>

      {/* Week strip */}
      <Card>
        <Label>Uge {DATA.week} — overblik</Label>
        <div style={{ display:"flex", gap:5 }}>
          {DATA.week_sessions.map((d,i)=>(
            <div key={i} style={{
              flex:1, borderRadius:8, padding:"8px 3px",
              background:d.today?C.wine+"12":d.done?discColor[d.disc]+"12":C.creamD+"60",
              border:`1.5px solid ${d.today?C.wine:d.done?discColor[d.disc]:C.creamD}`,
              display:"flex", flexDirection:"column", alignItems:"center", gap:4,
            }}>

        <p style={{ fontFamily:"'Hanken Grotesk',sans-serif", fontSize:14, color:C.ink, lineHeight:1.6 }}>{DATA.weekFocus}</p>

}

// ══ NAV + ROOT ═════════════════════════════════════════════════
const NAV = [
  { id:"today",    label:"I dag",    icon:"today"    },
  { id:"week",     label:"Uge",      icon:"week"     },
  { id:"overview", label:"Overblik", icon:"overview" },
  { id:"body",     label:"Krop",     icon:"body"     },
  { id:"rules",    label:"Regler",   icon:"rules"    },
];

function App() {
  const [active, setActive] = useState("today");
  const [session, setSession] = useState(DATA.today.session);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    fetchData().then(remote => {
      mergeData(remote);
      setLoaded(true);
      setSession({...DATA.today.session});
    });
  }, []);

  const pages = {
    today:    <PageToday session={session} setSession={setSession}/>,
    week:     <PageWeek/>,
    overview: <PageOverview/>,
    body:     <PageBody/>,
    rules:    <PageRules/>,
  };

  const activeLabel = NAV.find(n=>n.id===active)?.label;

  return (
    <div style={{ background:C.cream, minHeight:"100vh", display:"flex" }}>

      {/* ── Desktop sidebar ── */}
      <aside className="sidebar" style={{
        width:200, flexShrink:0, background:C.wine,
        display:"flex", flexDirection:"column",
        position:"fixed", top:0, left:0, height:"100vh", zIndex:50,
      }}>
        <div style={{ padding:"24px 20px 18px", borderBottom:`1px solid ${C.wineL}` }}>
          <div style={{ fontFamily:"'Newsreader',serif", fontSize:20, color:C.white, lineHeight:1.1 }}>
            Fast as <span style={{ color:C.gold }}>Fifty</span>
          </div>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:C.white+"55", marginTop:4, letterSpacing:"0.08em" }}>KENNET HAMMERBY</div>
        </div>
        <nav style={{ flex:1, padding:"10px 10px" }}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>setActive(item.id)} style={{
              width:"100%", display:"flex", alignItems:"center", gap:10,
              padding:"10px 10px", borderRadius:8, border:"none",
              background:active===item.id?C.gold+"22":"transparent",
              borderLeft:`3px solid ${active===item.id?C.gold:"transparent"}`,
              color:active===item.id?C.gold:C.white+"88",
              fontFamily:"'Hanken Grotesk',sans-serif", fontSize:14, fontWeight:active===item.id?600:400,
              cursor:"pointer", textAlign:"left", transition:"all 0.15s", marginBottom:2,
            }}>
              <Icon name={item.icon} size={18} color={active===item.id?C.gold:C.white+"66"}/>
              {item.label}
            </button>
          ))}
        </nav>
        <div style={{ padding:"14px 20px", borderTop:`1px solid ${C.wineL}` }}>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:C.gold, letterSpacing:"0.07em", marginBottom:2 }}>AKTUEL UGE {DATA.week}/{DATA.totalWeeks}</div>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:C.white+"44" }}>{DATA.blockType} BLOCK</div>
        </div>
      </aside>

      {/* ── Main content ── */}
      <main className="main-content" style={{
        marginLeft:200, flex:1, padding:"28px 28px 80px",
        maxWidth:860,
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22, flexWrap:"wrap", gap:8 }}>
          <div>
            <h1 style={{ fontFamily:"'Newsreader',serif", fontSize:28, color:C.ink, lineHeight:1, marginBottom:2 }}>{activeLabel}</h1>
            {active==="today" && <div style={{ fontFamily:"'Space Mono',monospace", fontSize:11, color:C.muted }}>{DATA.today.dayName}, {DATA.today.date}</div>}
          </div>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:C.muted, textAlign:"right" }}>
            <div style={{ color:C.wine, fontWeight:700 }}>UGE {DATA.week}/{DATA.totalWeeks}</div>
            <div>{DATA.blockType}</div>
          </div>
        </div>
        {pages[active]}
      </main>

      {/* ── Mobile bottom nav ── */}
      <nav className="bottom-nav" style={{
        display:"none", position:"fixed", bottom:0, left:0, right:0,
        background:C.wine, borderTop:`1px solid ${C.wineL}`,
        padding:"6px 0 14px", zIndex:100,
        justifyContent:"space-around", alignItems:"center",
      }}>
        {NAV.map(item=>(
          <button key={item.id} onClick={()=>setActive(item.id)} style={{
            display:"flex", flexDirection:"column", alignItems:"center", gap:3,
            background:"none", border:"none", cursor:"pointer", padding:"4px 8px",
            color:active===item.id?C.gold:C.white+"55",
          }}>
            <Icon name={item.icon} size={22} color={active===item.id?C.gold:C.white+"55"}/>
            <span style={{ fontFamily:"'Hanken Grotesk',sans-serif", fontSize:10, fontWeight:active===item.id?700:400 }}>{item.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
