<script>
// Selv-justerende fallback: hvis ikon-fonten ikke loader (mobilnetværk/CDN-blok), prøv alternativ CDN
(function(){
  function iconsLoaded(){
    try { return [...document.fonts].some(f => /tabler/i.test(f.family)); } catch(e){ return false; }
  }
  window.addEventListener('load', function(){
    setTimeout(function(){
      if (!iconsLoaded()) {
        var fallback = document.createElement('link');
        fallback.rel = 'stylesheet';
        fallback.href = 'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css';
        document.head.appendChild(fallback);
      }
    }, 1500);
  });
})();

<style>

  --gold: #BE863A; --gold-l: #D4A55A;
  --cream: #ECE4D7; --cream-d: #DDD3C3;
  --ink: #1A1008; --muted: #7A6A58; --white: #FDFAF6;
  --run: #C0392B; --bike: #2874A6; --swim: #1A7A5E; --strength: #7D3C98; --free: #7A6A58; --walk: #2E8B57; --hike: #8B6914; --commute: #1A6B8A; --openwater: #0B5394;
  --r: 12px;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--cream); font-family:'Hanken Grotesk',sans-serif; color:var(--ink); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--cream-d); border-radius:2px; }

/* Layout */
.app { display:flex; min-height:100vh; }
.sidebar { width:200px; flex-shrink:0; background:var(--wine); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:50; }
.main { margin-left:200px; flex:1; padding:28px 28px 80px; max-width:860px; }
.bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--wine); border-top:1px solid var(--wine-l); padding:6px 0 14px; z-index:100; justify-content:space-around; align-items:center; }

  .bottom-nav { display:flex !important; }
  .mobile-refresh-btn { display:flex !important; }
  .desktop-only { display:none !important; }
}
@media(min-width:769px) {

}

}

/* Sidebar */
.sidebar-logo { padding:22px 20px 18px; border-bottom:1px solid var(--wine-l); }
.sidebar-logo-text { font-family:'Newsreader',serif; font-size:20px; color:var(--white); line-height:1.1; }

.sidebar-nav { flex:1; padding:10px; }
.nav-btn { width:100%; display:flex; align-items:center; gap:10px; padding:10px; border-radius:8px; border:none; background:transparent; border-left:3px solid transparent; color:rgba(255,255,255,.55); font-family:'Hanken Grotesk',sans-serif; font-size:14px; cursor:pointer; text-align:left; transition:all .15s; margin-bottom:2px; }
.nav-btn:hover { color:rgba(255,255,255,.85); background:rgba(255,255,255,.05); }
.nav-btn.active { color:var(--gold); background:rgba(190,134,58,.15); border-left-color:var(--gold); font-weight:600; }

.sidebar-footer { padding:14px 20px; border-top:1px solid var(--wine-l); }

/* Bottom nav */

.bottom-btn span { font-family:'Hanken Grotesk',sans-serif; font-size:10px; font-weight:400; }
.bottom-btn.active span { font-weight:700; }

/* Page header */
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:8px; }
.page-title { font-family:'Newsreader',serif; font-size:28px; color:var(--ink); line-height:1; }
.page-sub { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-top:2px; }
.page-meta { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); text-align:right; }
.page-meta-week { color:var(--wine); font-weight:700; }

/* Cards */
.card { background:var(--white); border-radius:var(--r); padding:18px 16px; border:1px solid var(--cream-d); margin-bottom:14px; }
.card-wine { background:var(--wine); border-color:transparent; position:relative; overflow:hidden; }
.card-wine::before { content:''; position:absolute; top:-20px; right:-20px; width:120px; height:120px; border-radius:50%; background:var(--wine-l); opacity:.4; }
.label { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:12px; }
.label-gold { color:var(--gold); }

/* Coach speech */
.coach-text { font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#FDFAF6; line-height:1.65; position:relative; }
.coach-hl { color:var(--gold); font-weight:700; }

/* KPI grid */
.kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; } @media(max-width:400px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi-card { background:var(--white); border-radius:10px; padding:14px 10px 16px; border:1px solid var(--cream-d); position:relative; overflow:hidden; }
.kpi-bar { position:absolute; bottom:0; left:0; right:0; height:3px; border-radius:0 0 10px 10px; }

.kpi-unit { font-size:12px; color:var(--muted); font-family:'Space Mono',monospace; }
.kpi-sub { font-family:'Hanken Grotesk',sans-serif; font-size:11px; color:var(--muted); }

.session-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:14px; position:relative; }
.session-title { font-family:'Newsreader',serif; font-size:26px; color:var(--white); margin:8px 0 6px; }
.session-meta { display:flex; gap:12px; }

.complete-btn { background:transparent; border:1.5px solid var(--gold); border-radius:8px; padding:10px 16px; color:var(--gold); font-family:'Hanken Grotesk',sans-serif; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .2s; white-space:nowrap; }

/* Week strip */
.week-strip { display:flex; gap:5px; }
.wday { flex:1; border-radius:8px; padding:8px 3px; display:flex; flex-direction:column; align-items:center; gap:4px; border:1.5px solid var(--cream-d); background:rgba(221,211,195,.4); }
.wday.is-today { border-color:var(--wine); background:rgba(89,24,42,.08); }
.wday.done-run { border-color:var(--run); background:rgba(192,57,43,.1); }
.wday.done-bike { border-color:var(--bike); background:rgba(40,116,166,.1); }
.wday.done-swim { border-color:var(--swim); background:rgba(26,122,94,.1); }
.wday.done-strength { border-color:var(--strength); background:rgba(125,60,152,.1); }
.wday.done-free { border-color:var(--free); background:rgba(122,106,88,.1); }
.wday.done-walk { border-color:var(--walk); background:rgba(46,139,87,.1); }
.wday.done-hike { border-color:var(--hike); background:rgba(139,105,20,.1); }
.wday.done-commute { border-color:var(--commute); background:rgba(26,107,138,.1); }
.wday.done-openwater { border-color:var(--openwater); background:rgba(11,83,148,.1); }
.wday-name { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); font-weight:400; }
.wday.is-today .wday-name { color:var(--wine); font-weight:700; }

/* Status row */
.status-row { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; margin-bottom:14px; }
.stat-card { background:var(--white); border-radius:10px; padding:14px 10px; border:1px solid var(--cream-d); text-align:center; }
.stat-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:.08em; margin-bottom:4px; }
.stat-value { font-family:'Newsreader',serif; font-size:26px; color:var(--wine); line-height:1; }
.stat-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); margin-top:2px; }

/* AF Ring */
.af-ring { display:flex; flex-direction:column; align-items:center; gap:3px; }
.af-ring-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:.07em; }

/* Discipline tag */
.disc-tag { display:inline-flex; align-items:center; gap:4px; border-radius:4px; padding:3px 8px; font-family:'Space Mono',monospace; font-weight:700; letter-spacing:.08em; font-size:11px; }

/* Progress bars */
.prog-row { margin-bottom:18px; }
.prog-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.prog-lbl { font-family:'Hanken Grotesk',sans-serif; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
.prog-vals { font-family:'Space Mono',monospace; font-size:12px; }
.prog-now { color:var(--gold); font-weight:700; }
.prog-muted { color:var(--muted); font-size:10px; }
.prog-track { position:relative; height:8px; background:var(--cream-d); border-radius:4px; }
.prog-fill { position:absolute; left:0; top:0; height:100%; border-radius:4px; transition:width .6s; }
.prog-dot { position:absolute; top:-2px; width:12px; height:12px; border-radius:50%; border:2px solid white; transform:translateX(-50%); }
.prog-pct { text-align:right; margin-top:3px; font-family:'Space Mono',monospace; font-size:9px; }

/* Zone bars */
.zone-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.zone-lbl { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; width:20px; }
.zone-bar { flex:1; height:26px; border-radius:4px; display:flex; align-items:center; padding-left:10px; }
.zone-name { font-family:'Hanken Grotesk',sans-serif; font-size:12px; font-weight:600; }
.zone-range { font-family:'Space Mono',monospace; font-size:11px; color:var(--ink); width:90px; text-align:right; }

/* Period timeline */
.period-scroll { overflow-x:auto; padding-bottom:4px; }
.period-row { display:flex; gap:3px; min-width:560px; }
.period-cell { flex:1; min-width:34px; height:44px; border-radius:5px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1.5px solid; transition:all .2s; }
.period-cell .pc-lbl { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; }
.period-cell .pc-num { font-family:'Space Mono',monospace; font-size:8px; }
.period-legend { display:flex; gap:14px; margin-top:10px; }
.legend-dot { width:10px; height:10px; border-radius:2px; }

/* CTL Graph */
.ctl-svg { width:100%; height:auto; }

.wsession { display:flex; align-items:center; gap:12px; padding:14px; border-radius:10px; margin-bottom:8px; border:1.5px solid var(--cream-d); background:var(--white); }

.wsession.is-extra .wsession-icon { width:30px; height:30px; }
.wsession.is-extra .wsession-title { font-size:13px; font-weight:500; color:var(--muted); }
.extra-badge { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.04em; background:rgba(122,106,88,.14); color:var(--free); padding:2px 6px; border-radius:3px; margin-left:6px; font-weight:700; }

.event-card { display:flex; align-items:center; gap:12px; padding:12px; background:var(--cream); border-radius:8px; margin-bottom:10px; }
.event-days { font-family:'Newsreader',serif; font-size:28px; color:var(--wine); line-height:1; }
.event-days-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }

.rule-row { display:flex; gap:12px; align-items:flex-start; padding:14px; background:var(--white); border:1px solid var(--cream-d); border-radius:10px; margin-bottom:8px; }
.rule-num { font-family:'Space Mono',monospace; font-size:10px; color:var(--gold); font-weight:700; flex-shrink:0; margin-top:2px; }
.rule-title { font-family:'Newsreader',serif; font-size:15px; font-weight:600; color:var(--wine); margin-bottom:4px; }
.rule-body { font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:var(--muted); line-height:1.5; }

/* Strength */
.strength-tag { font-family:'Hanken Grotesk',sans-serif; font-size:12px; background:var(--cream); border:1px solid var(--cream-d); border-radius:6px; padding:5px 10px; color:var(--ink); display:inline-block; margin:0 4px 6px 0; }
.eq-note { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); margin-top:10px; }

/* Weekday page header card */
.hero-card { background:var(--wine); border-radius:var(--r); padding:20px 18px; margin-bottom:16px; }
.hero-eyebrow { font-family:'Space Mono',monospace; font-size:10px; color:var(--gold); letter-spacing:.1em; margin-bottom:4px; }
.hero-title { font-family:'Newsreader',serif; font-size:24px; color:var(--white); margin:0 0 2px; }
.hero-sub { font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:rgba(255,255,255,.6); }

/* Page sections */
.page { display:none; }
.page.active { display:block; }

/* Spinner */
.spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--cream-d); border-top-color:var(--wine); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading { display:flex; align-items:center; justify-content:center; height:200px; }
</style>

function afRing(done, target) {

  const color = done >= GREEN_AT ? "#27AE60" : "var(--wine)";
  return `<div class="af-ring">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="${r}" fill="none" stroke="var(--cream-d)" stroke-width="5"/>
      <circle cx="30" cy="30" r="${r}" fill="none" stroke="${color}" stroke-width="5"

  });
  return `<div class="week-strip">${DAGE.map(dag => {
    const sessions = byDay[dag] || [];
    const isToday = sessions.some(s => s.today);
    const done = sessions.length > 0 && sessions.every(s => s.done);
    const anyDone = sessions.some(s => s.done);
    // Saml unikke discipliner for dagen (planlagt + ekstra)
    const discs = [];
    sessions.forEach(s => {
      if (s.disc && !discs.includes(s.disc)) discs.push(s.disc);
      if (s.disc2 && !discs.includes(s.disc2)) discs.push(s.disc2);
    });
    const doneClass = anyDone && discs.length ? `done-${discs[0]}` : "";
    const todayClass = isToday ? "is-today" : "";

    if (discs.length === 0) {
      ico = `<span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--cream-d)">·</span>`;

function ctlGraph() {
  const actual=D.ctlCurve, plan=CTL_PLAN, W=500, H=140, pad={t:18,r:24,b:30,l:30};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b, mn=30, mx=65;

  const y=v=>pad.t+iH-((v-mn)/(mx-mn))*iH;
  const wk=D.week;
  const cur=actual[actual.length-1];

  const smoothPath=(arr)=>{
    let p=`M${x(0)},${y(arr[0])}`;
    for(let i=0;i<arr.length-1;i++){
      const mx0=(x(i)+x(i+1))/2, my0=(y(arr[i])+y(arr[i+1]))/2;
      p += ` Q${x(i)},${y(arr[i])} ${mx0},${my0}`;
    }
    p += ` T${x(arr.length-1)},${y(arr[arr.length-1])}`;
    return p;
  };

  const planPath=smoothPath(plan);
  const actualPath=smoothPath(actual);
  const actualArea=`${actualPath} L${x(actual.length-1)},${H-pad.b} L${x(0)},${H-pad.b} Z`;

  const labels=plan.map((_,i)=>String(i+1));
  return `<svg class="ctl-svg" viewBox="0 0 ${W} ${H}" style="overflow:visible">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--gold)" stop-opacity=".35"/>
      <stop offset="100%" stop-color="var(--gold)" stop-opacity=".03"/>
    </linearGradient></defs>
    ${[35,45,55].map(v=>`<line x1="${pad.l}" x2="${W-pad.r}" y1="${y(v)}" y2="${y(v)}" stroke="var(--cream-d)" stroke-width="1"/>

    <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(60)}" y2="${y(60)}" stroke="var(--wine)" stroke-width="1.2" stroke-dasharray="4,4" opacity=".6"/>
    <text x="${W-pad.r}" y="${y(60)-5}" text-anchor="end" fill="var(--wine)" font-size="9" font-weight="700" font-family="'Space Mono',monospace">MÅL 60</text>
    <path d="${planPath}" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3,4" opacity=".5"/>
    <path d="${actualArea}" fill="url(#g)"/>
    <path d="${actualPath}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(actual.length-1)}" cy="${y(cur)}" r="5" fill="var(--gold)" stroke="var(--wine)" stroke-width="2"/>
    <text x="${x(actual.length-1)}" y="${y(cur)-12}" text-anchor="middle" fill="var(--wine)" font-size="11" font-weight="700" font-family="'Space Mono',monospace">${cur.toFixed(1)}</text>
    ${labels.map((l,i)=>`<text x="${x(i)}" y="${H-4}" text-anchor="middle"
      fill="${i===wk-1?"var(--wine)":"var(--muted)"}" font-size="8" font-family="'Space Mono',monospace"
      font-weight="${i===wk-1?700:400}">${l||(i+1)}</text>`).join("")}
  </svg>`;
}

let viewWeek = 0; // 0=denne uge, -1=forrige, +1=næste

function weekSessions(offset) {
  const w = D.week + offset;
  if (w < 1 || w > D.totalWeeks) return [];
  // Aktuel uge: brug altid week_sessions (har done-status fra Intervals aktiviteter)
  if (offset === 0) return D.week_sessions || [];
  // Forrige/næste uge: brug all_weeks
  if (D.all_weeks && D.all_weeks[w]) return D.all_weeks[w].sessions || [];
  return [];
}

function capFirst(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}

function renderFocus(text) {
  text = (text == null) ? '' : String(text);
  if (!text) return '<p style="font-family:\'Hanken Grotesk\',sans-serif;font-size:14px;line-height:1.6;color:var(--ink)">—</p>';
  const pStyle = "font-family:'Hanken Grotesk',sans-serif;font-size:14px;line-height:1.6;color:var(--ink)";
  const dashIdx = text.search(/[-—]\s/);
  if (dashIdx === -1) return `<p style="${pStyle}">${capFirst(text)}</p>`;
  const head = capFirst(text.slice(0, dashIdx).trim());
  const rest = text.slice(dashIdx + 1).trim();
  const sentenceEnd = rest.indexOf('. ');
  const itemsPart = sentenceEnd === -1 ? rest : rest.slice(0, sentenceEnd);
  const trailing = sentenceEnd === -1 ? '' : rest.slice(sentenceEnd + 2).trim();
  const items = itemsPart.split('·').map(s=>capFirst(s.trim())).filter(Boolean);
  let html = `<p style="${pStyle};margin:0 0 8px">${head}</p>`;
  html += `<ul style="${pStyle};margin:0 0 8px;padding-left:18px">`;
  items.forEach(i => html += `<li style="margin-bottom:2px">${i}</li>`);
  html += `</ul>`;
  if (trailing) html += `<p style="${pStyle};margin:0">${capFirst(trailing)}</p>`;
  return html;
}

function weekFocusText(offset) {
  const w = D.week + offset;
  if (D.all_weeks && D.all_weeks[w]) return D.all_weeks[w].focus || "";
  if (offset === 0) return D.weekFocus;
  return "Ugeplan ikke tilgængelig endnu.";
}

function weekBlockType(offset) {
  if (D.all_weeks && D.all_weeks[D.week + offset]) return D.all_weeks[D.week + offset].blockType || "";
  return offset === 0 ? D.blockType : "";
}

  const w = D.week + viewWeek;

function kpiGrid() {

  return html;

function trainMinutesBar() {
  const tm = D.train_mins || {};
  // Planlagt træning — indgår i faktisk-total mod planlagt
  const trainTypes = [
    {key:'run',       label:'Løb',     color:'var(--run)'},
    {key:'bike',      label:'Cykel',   color:'var(--bike)'},
    {key:'swim',      label:'Svøm',    color:'var(--swim)'},
    {key:'strength',  label:'Styrke',  color:'var(--gold)'},
    {key:'openwater', label:'OW',      color:'var(--openwater)'},
  ];
  // Ekstra aktivitet — vises separat, tæller ikke mod træningsmål
  const extraTypes = [
    {key:'commute',   label:'Pendl',   color:'var(--commute)'},
    {key:'walk',      label:'Gå',      color:'var(--walk)'},
    {key:'hike',      label:'Hike',    color:'var(--hike)'},
  ];
  const planned = tm.planned || 0;
  // Faktisk total = kun planlagt træning (ikke gå/pendl/hike)
  const actual = trainTypes.reduce((s,t)=>s+(tm[t.key]||0),0);
  const extraTotal = extraTypes.reduce((s,t)=>s+(tm[t.key]||0),0);
  const fmt = m => m >= 60 ? Math.floor(m/60)+'t'+(m%60>0?' '+Math.round(m%60)+'m':'') : Math.round(m)+'m';

  const header = planned > 0
    ? `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">FAKTISK</span>
        <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ink)">${fmt(actual)} <span style="color:var(--muted)">/ ${fmt(planned)} planlagt</span></span>
      </div>`
    : '';

  if (actual === 0 && extraTotal === 0) return header + '<div style="font-family:Space Mono,monospace;font-size:10px;color:var(--muted);padding:4px 0">Ingen aktiviteter denne uge endnu</div>';

  const barRow = (t) => {
    const pct = planned > 0 ? Math.min(Math.round((tm[t.key]/planned)*100),100) : Math.round((tm[t.key]/Math.max(actual,1))*100);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">${t.label.toUpperCase()}</span>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--ink);font-weight:700">${fmt(tm[t.key])}</span>
      </div>
      <div style="background:var(--cream-d);border-radius:4px;height:8px">
        <div style="background:${t.color};border-radius:4px;height:8px;width:${pct}%"></div>
      </div>
    </div>`;
  };

  const trainBars = trainTypes.filter(t=>tm[t.key]>0).map(barRow).join('');

  // Ekstra-bjælker: bredde måles mod ekstra-total (ikke træningsmål)
  const extraBarRow = (t) => {
    const pct = extraTotal > 0 ? Math.round((tm[t.key]/extraTotal)*100) : 0;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">${t.label.toUpperCase()}</span>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--ink);font-weight:700">${fmt(tm[t.key])}</span>
      </div>
      <div style="background:var(--cream-d);border-radius:4px;height:8px">
        <div style="background:${t.color};border-radius:4px;height:8px;width:${pct}%"></div>
      </div>
    </div>`;
  };
  const extraBars = extraTypes.filter(t=>tm[t.key]>0).map(extraBarRow).join('');
  const extraSection = extraTotal > 0
    ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--cream-d)">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
          <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.06em">EKSTRA AKTIVITET</span>
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${fmt(extraTotal)} · egen skala</span>
        </div>
        ${extraBars}
      </div>`
    : '';

  return header + trainBars + extraSection;
}

function sparkline(data, color, label, unit, minV, maxV) {
  if (!data || data.length < 2) return '<div style="height:60px;display:flex;align-items:center;justify-content:center;font-family:Space Mono,monospace;font-size:10px;color:var(--muted)">Ingen data endnu</div>';
  const W=280, H=92, pad={l:8,r:8,t:22,b:20};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const vals  = data.map(d=>typeof d==='object'?d.v:d);
  const reals = data.map(d=>typeof d==='object' && 'real' in d ? !!d.real : true);
  const dates = data.map(d=>typeof d==='object' && d.date ? d.date : null);
  const n = vals.length;
  const dataMin = Math.min(...vals), dataMax = Math.max(...vals);
  const mn = minV ?? dataMin - (dataMax-dataMin||1)*0.15;
  const mx = maxV ?? dataMax + (dataMax-dataMin||1)*0.15;
  const x = i => pad.l + (n===1?0:(i/(n-1))*iW);
  const y = v => pad.t + iH - ((v-mn)/(mx-mn||1))*iH;
  const last = vals[n-1];
  const prev = vals[n-2];
  const trend = last > prev ? '↑' : last < prev ? '↓' : '→';
  const tcolor = last > prev ? 'var(--swim)' : last < prev ? 'var(--run)' : 'var(--muted)';

  // Område til fyld (bruger samme punkter, lige linjer)
  const baseline = (mn < 0 && mx > 0) ? y(0) : (H-pad.b);
  let areaPath = `M${x(0)},${y(vals[0])}`;
  for (let i=1;i<n;i++) areaPath += ` L${x(i)},${y(vals[i])}`;
  areaPath += ` L${x(n-1)},${baseline} L${x(0)},${baseline} Z`;

  // Linjestykker: solid hvis begge punkter er reelle, stiplet/fladt hvis fremført
  let lineSegments = '';
  for (let i=0;i<n-1;i++){
    const isDashed = !reals[i+1];
    lineSegments += `<line x1="${x(i)}" y1="${y(vals[i])}" x2="${x(i+1)}" y2="${y(vals[i+1])}" stroke="${color}" stroke-width="2" stroke-linecap="round" ${isDashed ? 'stroke-dasharray="3,3" opacity="0.55"' : ''}/>`;
  }

  // x-labels: ugedags-bogstav baseret på faktisk dato hvis tilgængelig
  const today=new Date();
  let xLabels;
  if (n<=10) {
    const dayNames=['S','M','T','O','T','F','L'];
    xLabels = vals.map((_,i)=>{
      let d;
      if (dates[i]) { d = new Date(dates[i]+'T00:00:00'); }
      else { d = new Date(today); d.setDate(today.getDate()-(n-1-i)); }
      return dayNames[d.getDay()];
    });
  } else {
    const step = Math.ceil(n/5);
    xLabels = vals.map((_,i)=>{
      if (i!==0 && i!==n-1 && i%step!==0) return '';
      let d;
      if (dates[i]) { d = new Date(dates[i]+'T00:00:00'); }
      else { d = new Date(today); d.setDate(today.getDate()-(n-1-i)); }
      return `${d.getDate()}/${d.getMonth()+1}`;
    });
  }

  const gid = `sg_${label.replace(/[^a-zA-Z0-9]/g,'')}`;
  return `<div style="position:relative">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em">${label}</span>
      <span style="font-family:'Space Mono',monospace;font-size:13px;color:${color};font-weight:700">${last.toFixed(1)} <span style="font-size:9px">${unit}</span> <span style="color:${tcolor};font-size:11px">${trend}</span></span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".32"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(mx)}" y2="${y(mx)}" stroke="var(--cream-d)" stroke-width="1" stroke-dasharray="2,3"/>
      <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(mn)}" y2="${y(mn)}" stroke="var(--cream-d)" stroke-width="1" stroke-dasharray="2,3"/>
      ${Math.abs(y(mx)-y(0)) > 8 || !(mn<0 && mx>0) ? `<text x="${W-pad.r}" y="${y(mx)-3}" text-anchor="end" fill="var(--muted)" font-size="8" font-family="'Space Mono',monospace">${mx.toFixed(1)}</text>` : ''}
      ${Math.abs(y(mn)-y(0)) > 8 || !(mn<0 && mx>0) ? `<text x="${W-pad.r}" y="${y(mn)+10}" text-anchor="end" fill="var(--muted)" font-size="8" font-family="'Space Mono',monospace">${mn.toFixed(1)}</text>` : ''}
      ${(mn < 0 && mx > 0) ? `<line x1="${pad.l}" x2="${W-pad.r}" y1="${y(0)}" y2="${y(0)}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="1,2" opacity="0.5"/>
      <text x="${W-pad.r}" y="${y(0)-3}" text-anchor="end" fill="var(--ink)" font-size="8" font-weight="700" font-family="'Space Mono',monospace">0</text>` : ''}
      <path d="${areaPath}" fill="url(#${gid})"/>
      ${lineSegments}
      ${(()=>{const i=n-1; return reals[i]
        ? `<circle cx="${x(i)}" cy="${y(vals[i])}" r="3.5" fill="${color}" stroke="var(--white)" stroke-width="1.5"/>`
        : `<circle cx="${x(i)}" cy="${y(vals[i])}" r="3.5" fill="var(--cream)" stroke="${color}" stroke-width="1.5" stroke-dasharray="2,2"/>`})()}
      ${xLabels.map((l,i)=>`<text x="${x(i)}" y="${H-4}" text-anchor="middle" fill="${i===n-1?color:'var(--muted)'}" font-weight="${i===n-1?700:400}" font-size="8" font-family="'Space Mono',monospace">${l}</text>`).join("")}
    </svg>
  </div>`;
}


function afHistoryViz(history) {
  if (!history || history.length === 0) return '<div style="font-family:Space Mono,monospace;font-size:10px;color:var(--muted);text-align:center;padding:8px">Ingen historik endnu</div>';
  
  const DAY_LABELS = ['M','T','O','T','F','L','S'];
  const DAY_FULL   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];

  const rows = history.map(w => {
    const dots = Array.from({length: 7}, (_, i) => {
      const label = DAY_LABELS[i];
      if (i >= w.total) {
        // Fremtidig dag
        return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">' +
          '<div style="width:28px;height:28px;border-radius:50%;background:var(--cream-d);opacity:0.2"></div>' +
          '<span style="font-family:Space Mono,monospace;font-size:8px;color:var(--cream-d)">' + label + '</span>' +
          '</div>';
      }
      const filled = i < w.done;
      return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:' + (filled ? 'var(--wine)' : 'var(--cream-d)') + ';display:flex;align-items:center;justify-content:center">' +
        '<span style="font-size:9px;font-weight:700;color:' + (filled ? 'var(--gold)' : 'var(--muted)') + '">' + (filled ? '✓' : '·') + '</span>' +
        '</div>' +
        '<span style="font-family:Space Mono,monospace;font-size:8px;color:' + (filled ? 'var(--wine)' : 'var(--muted)') + '">' + label + '</span>' +
        '</div>';
    }).join('');

    const color = w.done >= 5 ? 'var(--swim)' : w.done >= 3 ? 'var(--gold)' : 'var(--run)';

    return '<div style="margin-bottom:12px">' +
      '<div style="font-family:Space Mono,monospace;font-size:9px;color:var(--muted);margin-bottom:6px">' + w.label.toUpperCase() + '</div>' +
      '<div style="display:flex;gap:4px;align-items:flex-start">' + dots +
      '<div style="margin-left:6px;font-family:Space Mono,monospace;font-size:11px;color:' + color + ';font-weight:700;padding-top:6px">' + w.done + '/7</div>' +
      '</div>' +
      '</div>';
  }).join('');

  return rows;
}
function afStreakViz(done, target, streak) {
  const days = ['M','T','O','T','F','L','S'];
  let dots = '';
  for (let i = 0; i < 7; i++) {
    const filled = i < done;
    dots += '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">' +
      '<div style="width:28px;height:28px;border-radius:50%;background:' + (filled?'var(--wine)':'var(--cream-d)') + ';display:flex;align-items:center;justify-content:center">' +
      '<span style="font-size:9px;color:' + (filled?'var(--gold)':'var(--muted)') + ';font-weight:700">' + (filled?'✓':days[i]) + '</span>' +
      '</div></div>';
  }
  const s = streak || 0;
  const streakHtml = s > 0
    ? '<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px">' +
      '<span style="font-family:Newsreader,serif;font-size:28px;color:var(--wine);font-weight:600;line-height:1">' + s + '</span>' +
      '<span style="font-family:Space Mono,monospace;font-size:9px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase">DAGE I TRÆK</span>' +
      '</div>'
    : '';
  return '<div style="display:flex;gap:6px;justify-content:center;margin:8px 0">' + dots + '</div>' +
    '<div style="text-align:center;font-family:Space Mono,monospace;font-size:10px;color:var(--muted)">' + done + '/' + target + ' AF-DAGE DENNE UGE</div>' +
    streakHtml;
}

function trainingDonut() {
  // Kun strukturerede træningsdiscipliner — gå/pendl/hike hører til "Ekstra aktivitet"
  const acts = D.week_sessions.filter(s=>s.done);
  const counts = {run:0,bike:0,swim:0,strength:0,openwater:0};
  acts.forEach(s=>{
    if(s.disc in counts) counts[s.disc]++;
    if(s.disc2 && s.disc2 in counts) counts[s.disc2]++;
  });
  const rawTotal = Object.values(counts).reduce((a,b)=>a+b,0);
  const total = rawTotal || 1;
  // Samlet træningstid (kun rigtig træning — samme afgrænsning som donut)
  const tm = D.train_mins || {};
  const trainMin = ['run','bike','swim','strength','openwater'].reduce((s,k)=>s+(tm[k]||0),0);
  const fmtDur = m => m >= 60 ? Math.floor(m/60)+'t'+(m%60>0?' '+Math.round(m%60)+'m':'') : Math.round(m)+'m';
  const colors = {run:'var(--run)',bike:'var(--bike)',swim:'var(--swim)',strength:'var(--gold)',openwater:'var(--openwater)'};
  const labels = {run:'Løb',bike:'Cykel',swim:'Svøm',strength:'Styrke',openwater:'OW'};
  if (rawTotal === 0) {
    return '<div style="font-family:Space Mono,monospace;font-size:10px;color:var(--muted);padding:4px 0">Ingen træningssessioner denne uge endnu</div>';
  }
  let offset=0, cx=60, cy=60, r=45, stroke=18;
  const segments = Object.entries(counts).filter(([k,v])=>v>0).map(([k,v])=>{
    const pct = v/total;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[k]}" stroke-width="${stroke}"
      stroke-dasharray="${pct*2*Math.PI*r} ${2*Math.PI*r}"
      stroke-dashoffset="${-offset*2*Math.PI*r}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct;
    return {seg, k, v, pct};
  });
  return `<div style="display:flex;align-items:center;gap:16px">
    <svg viewBox="0 0 120 120" style="width:96px;height:96px;flex-shrink:0">
      ${total===1?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--cream-d)" stroke-width="${stroke}"/>`:''}
      ${segments.map(s=>s.seg).join('')}
      <text x="${cx}" y="${cy+2}" text-anchor="middle" font-family="'Newsreader',serif" font-size="${trainMin>=60?'20':'26'}" fill="var(--wine)" font-weight="700">${trainMin>=60?Math.floor(trainMin/60)+'t'+(trainMin%60>0?' '+Math.round(trainMin%60)+'m':''):trainMin+'m'}</text>
      <text x="${cx}" y="${cy+18}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="7" letter-spacing="0.5" fill="var(--muted)">TRÆNINGSTID</text>
    </svg>
    <div style="flex:1">${segments.map(s=>`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:${colors[s.k]}">${labels[s.k].toUpperCase()}</span>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${s.v}× ${tm[s.k]>0?'· '+fmtDur(tm[s.k]):''}</span>
      </div>`).join('')}
      ${trainMin > 0 ? `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--cream-d)">
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.04em">TRÆNINGSTID</span>
        <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ink);font-weight:700">${fmtDur(trainMin)}</span>
      </div>` : ''}
    </div>
  </div>`;
}

// ── Navigation ────────────────────────────────────────────────
const PAGES = [
  {id:"today",    label:"I dag",    icon:"today"},
  {id:"week",     label:"Uge",      icon:"week"},
  {id:"overview", label:"Træning",  icon:"overview"},
  {id:"body",     label:"Krop",     icon:"body"},
  {id:"rules",    label:"Regler",   icon:"rules"},
];

let activePage = "today";

function renderNav() {
  document.getElementById("sidebar-nav").innerHTML = PAGES.map(p=>`
    <button class="nav-btn ${activePage===p.id?"active":""}" onclick="navigate('${p.id}')">
      ${icon(p.icon, 18, activePage===p.id?"var(--gold)":"rgba(255,255,255,.55)")} ${p.label}
    </button>`).join("");

  document.getElementById("bottom-nav").innerHTML = PAGES.map(p=>`
    <button class="bottom-btn ${activePage===p.id?"active":""}" onclick="navigate('${p.id}')">
      ${icon(p.icon, 22, activePage===p.id?"var(--gold)":"rgba(255,255,255,.4)")}
      <span>${p.label}</span>
    </button>`).join("");
}

function navigate(pageId) {
  activePage = pageId;
  const page = PAGES.find(p=>p.id===pageId);
  document.getElementById("page-title").textContent = page.label;
  const now2 = new Date();
  const dk2 = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
  const dm2 = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  const liveDayName = dk2[now2.getDay()];
  const liveDate = `${now2.getDate()}. ${dm2[now2.getMonth()]}`;
  document.getElementById("page-sub").textContent = pageId==="today" ? `${liveDayName}, ${liveDate}` : "";

  PAGES.forEach(p=>document.getElementById(`page-${p.id}`).classList.remove("active"));
  document.getElementById(`page-${pageId}`).classList.add("active");

  // Render den aktive side
  const renders = {today:renderToday, week:renderWeek, overview:renderOverview, body:renderBody, rules:renderRules};
  try {
    document.getElementById(`page-${pageId}`).innerHTML = renders[pageId]();
  } catch(e) {
    console.error('RENDER FEJL i ' + pageId + ':', e.message);
    document.getElementById(`page-${pageId}`).innerHTML = '<div style="padding:20px;color:red;font-family:monospace;font-size:11px">RENDER FEJL: ' + e.message + '</div>';
  }

  renderNav();
}

function toggleDone(btn) {
  sessionDone = !sessionDone;
  const todayStr2 = new Date().toISOString().split("T")[0];
  localStorage.setItem("session_done_" + todayStr2, sessionDone ? "1" : "0");
  localStorage.setItem("session_done_date", todayStr2);
  btn.className = `complete-btn ${sessionDone?"done":""}`;
  btn.innerHTML = `${icon("check",15,sessionDone?"var(--wine)":"var(--gold)")} ${sessionDone?"Gennemført":"Markér gennemført"}`;
}

function updateMeta() {
  document.getElementById("sf-week").textContent = `UGE ${D.week}/${D.totalWeeks}`;
  document.getElementById("sf-block").textContent = `${D.blockType} BLOCK`;
  document.getElementById("pm-week").textContent = `UGE ${D.week}/${D.totalWeeks}`;
  document.getElementById("pm-block").textContent = D.blockType;
  document.getElementById("page-sub").textContent = activePage==="today" ? `${D.dayName}, ${D.date}` : "";
}

// ── Fetch data.json og render ─────────────────────────────────
async function init() {
  // Beregn dato lokalt — altid korrekt uanset cache
  const now = new Date();
  const dk_days = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
  const dk_months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  D.dayName = dk_days[now.getDay()];
  D.date = `${now.getDate()}. ${dk_months[now.getMonth()]}`;

  // Render med defaults først — ingen loading screen
  // Gendan completed-state fra localStorage
  const todayStr = new Date().toISOString().split("T")[0];
  const lastDoneInit = localStorage.getItem("session_done_date");
  if (lastDoneInit === todayStr && localStorage.getItem("session_done_" + todayStr) === "1") {
    sessionDone = true;
  }
  renderNav();
  updateMeta();
  navigate("today");

  // Hent friske data i baggrunden
  try {
    const r = await fetch("data.json?t=" + Date.now());
    if (r.ok) {
      const remote = await r.json();
      const m = remote.meta || {};
      if (m.updated)                    D.lastUpdated            = m.updated;
      const luEl = document.getElementById('last-updated');
      if (luEl) luEl.textContent = m.updated || D.lastUpdated || '—';
      if (m.week)                       D.week                   = m.week;
      if (m.totalWeeks)                 D.totalWeeks             = m.totalWeeks;
      if (m.blockType)                  D.blockType              = m.blockType;
      if (m.daysToMedoc != null)        D.daysToMedoc            = m.daysToMedoc;
      if (m.daysToChristiansborg!=null) D.daysToChristiansborg   = m.daysToChristiansborg;
      if (m.dayName)                    D.dayName                = m.dayName;
      if (m.date)                       D.date                   = m.date;
      if (remote.af) {
        D.afDays.weekDone = parseInt(remote.af.weekDone) || 0;
        D.afDays.streak   = parseInt(remote.af.streak)   || 0;
      }
      if (remote.af_history)             { D.afHistory = remote.af_history; }
      if (remote.kpis) {
        const km = remote.kpis;
        D.kpis = [
          // Træning
          {cat:"Træning", label:"CTL",       value:km.ctl?.value    ||"—", unit:"",    sub:km.ctl?.sub    ||"Mål 60 (uge 11)",   color:"#C0392B"},
          {cat:"Træning", label:"FORM",       value:km.tsb?.value    ||"—", unit:"",    sub:km.tsb?.sub    ||"Bygger",             color:km.tsb?.color||"#F39C12"},
          {cat:"Træning", label:"LØB KM",     value:km.runKm?.value  ||"—", unit:"km",  sub:km.runKm?.sub  ||"Mål 40+ km",         color:"#C0392B"},
          {cat:"Træning", label:"CYKEL KM",   value:km.bikeKm?.value ||"—", unit:"km",  sub:km.bikeKm?.sub ||"Cykel denne uge",    color:"var(--bike)"},
          {cat:"Træning", label:"TSS UGE",    value:km.tssComp?.value||"0", unit:km.tssComp?.unit||"TSS", sub:km.tssComp?.sub||"Mål denne uge", color:km.tssComp?.color||"#7A6A58"},
          // Krop
          {cat:"Krop",    label:"VÆGT",       value:km.weight?.value ||"—", unit:"kg",  sub:km.weight?.sub ||"Mål <72 kg",         color:"#27AE60"},
          {cat:"Krop",    label:"FEDT%",      value:km.fat?.value    ||"—", unit:"%",   sub:km.fat?.sub    ||"Mål <20%",           color:"#F39C12"},
          {cat:"Krop",    label:"AF STREAK",  value:km.afStreak?.value||"—", unit:"",   sub:km.afStreak?.sub||"Dage i træk",        color:"#59182A"},
          {cat:"Krop",    label:"SØVN",       value:km.sleep?.value  ||"—", unit:"t",   sub:km.sleep?.sub  ||"Mål 7t",             color:"#2874A6"},
          {cat:"Krop",    label:"HRV",        value:km.hrv?.value    ||"—", unit:"ms",  sub:km.hrv?.sub    ||"Stabil",             color:"#7A6A58"},
        ];
      }
      if (remote.ctlCurve)       D.ctlCurve       = remote.ctlCurve;
      if (remote.weightHistory)  D.weightHistory  = remote.weightHistory;
      if (remote.hrvHistory)     D.hrvHistory     = remote.hrvHistory;
      if (remote.sleepHistory)   D.sleepHistory   = remote.sleepHistory;
      if (remote.tsbHistory)     D.tsbHistory     = remote.tsbHistory;
      if (remote.coachSpeech)    D.coachSpeech    = remote.coachSpeech;
      if (remote.coachHighlight) D.coachHighlight = remote.coachHighlight;
      if (remote.weekFocus)      D.weekFocus      = remote.weekFocus;
      if (remote.week_sessions)  D.week_sessions  = remote.week_sessions;
      if (remote.all_weeks)      D.all_weeks      = remote.all_weeks;
      if (remote.train_mins)     D.train_mins     = remote.train_mins;
      if (remote.today) {
        // Håndter både flat og nested format
        if (remote.today.title) D.today = remote.today;
        else if (remote.today.session) D.today = remote.today.session;
      }

      // Re-render med friske data — ryd cache så alle sider genrenderes
      updateMeta();
      pageCache = {};
      navigate(activePage);
    }
  } catch(e) {
    console.log("data.json ikke tilgængelig, bruger defaults");
  }
}

init();

// ── Auto-poll: opdatér AF-streak + data hvert 30 sek ──────────
(function() {
  let lastDataJson = null;
  async function pollData() {
    try {
      const r = await fetch('data.json?t=' + Date.now());
      if (!r.ok) return;
      const txt = await r.text();
      if (txt === lastDataJson) return; // ingen ændring
      lastDataJson = txt;
      const remote = JSON.parse(txt);
      // Opdatér kun AF-relaterede felter for hurtig visning
      if (remote.af) {
        D.afDays.weekDone = parseInt(remote.af.weekDone) || 0;
        D.afDays.streak   = parseInt(remote.af.streak)   || 0;
      }
      if (remote.kpis?.afStreak) {
        // Opdatér i D.kpis array
        const afKpi = D.kpis.find(k => k.label === 'AF STREAK');
        if (afKpi) afKpi.value = remote.kpis.afStreak.value;
      }
      if (remote.coachHighlight) D.coachHighlight = remote.coachHighlight;
      if (remote.af_history) D.afHistory = remote.af_history;
      // Re-render aktiv side
      pageCache = {};
      navigate(activePage);
    } catch(e) {}
  }
  setInterval(pollData, 10000);
})();

// ── Refresh-knap: hent ny data.json fra server ─────────────────
async function triggerRefresh() {
  const btn = document.getElementById('refresh-btn');
  const mBtn = document.getElementById('mobile-refresh-btn');
  const status = document.getElementById('refresh-status');
  [btn, mBtn].forEach(b => { if(b) { b.disabled = true; b.textContent = '↻ HENTER...'; }});
  status.textContent = '';
  try {
    await init();
    const time = new Date().toLocaleTimeString('da-DK', {hour:'2-digit',minute:'2-digit'});
    if(btn)  { btn.textContent = '✓ OPDATERET'; }
    if(mBtn) { mBtn.textContent = '✓ ' + time; }
    status.textContent = time;
    setTimeout(() => {
      if(btn)  { btn.textContent = '↻ OPDATÉR DATA'; btn.disabled = false; }
      if(mBtn) { mBtn.textContent = '↻ OPDATÉR'; mBtn.disabled = false; }
    }, 2000);
  } catch(e) {
    if(btn)  { btn.textContent = '↻ OPDATÉR DATA'; btn.disabled = false; }
    if(mBtn) { mBtn.textContent = '↻ OPDATÉR'; mBtn.disabled = false; }
    status.textContent = 'Fejl — prøv igen';
  }
}

// Pull-to-refresh
(function() {
  let startY = 0, pulling = false;
  const threshold = 80;

  // Indikator element
  const ptr = document.createElement('div');
  ptr.id = 'ptr-indicator';
  ptr.style.cssText = `
    position:fixed; top:0; left:0; right:0; height:0;
    background:var(--wine); color:var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-size:12px;
    letter-spacing:.08em; overflow:hidden; z-index:999;
    transition:height .15s ease; pointer-events:none;
  `;
  ptr.textContent = '↓ TRÆK FOR AT OPDATERE';
  document.body.appendChild(ptr);

  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      const h = Math.min(dy * 0.5, 56);
      ptr.style.height = h + 'px';
      ptr.textContent = dy > threshold ? '↑ SLIP FOR AT OPDATERE' : '↓ TRÆK FOR AT OPDATERE';
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    ptr.style.height = '0';
    if (dy > threshold) {
      ptr.textContent = '↻ OPDATERER...';
      ptr.style.height = '44px';
      setTimeout(() => {
        window.location.reload(true);
      }, 400);
    }
  }, { passive: true });
})();

// Swipe navigation mellem sider
(function() {
  let startX = 0, startY = 0, swiping = false;
  const threshold = 50;
  const PAGE_IDS = ['today','week','overview','body','rules'];

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!swiping) return;
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Kun horisontalt swipe (dx > dy)
    if (Math.abs(dx) < threshold || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const idx = PAGE_IDS.indexOf(activePage);
    if (dx < 0 && idx < PAGE_IDS.length - 1) navigate(PAGE_IDS[idx + 1]);
    if (dx > 0 && idx > 0) navigate(PAGE_IDS[idx - 1]);
  }, { passive: true });
})();
