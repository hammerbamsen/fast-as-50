<script>
// Selv-justerende fallback: hvis ikon-fonten ikke loader (mobilnetværk/CDN-blok), prøv alternativ CDN
(function(){
  function iconsLoaded(){
    try { return [...document.fonts].some(f => /tabler/i.test(f.family)); } catch(e){ return false; }
  }
  window.addEventListener('load', function(){
    setTimeout(function(){
      if (!iconsLoaded()) {
        var fallback = document.createElement('link');
        fallback.rel = 'stylesheet';
        fallback.href = 'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css';
        document.head.appendChild(fallback);
      }
    }, 1500);
  });

<style>
:root {
  --wine: #59182A; --wine-d: #3E0F1D; --wine-l: #7A2038;
  --gold: #BE863A; --gold-l: #D4A55A;
  --cream: #ECE4D7; --cream-d: #DDD3C3;
  --ink: #1A1008; --muted: #7A6A58; --white: #FDFAF6;
  --run: #C0392B; --bike: #2874A6; --swim: #1A7A5E; --strength: #7D3C98; --free: #7A6A58; --walk: #2E8B57; --hike: #8B6914; --commute: #1A6B8A; --openwater: #0B5394;
  --r: 12px;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--cream); font-family:'Hanken Grotesk',sans-serif; color:var(--ink); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--cream-d); border-radius:2px; }

/* Layout */
.app { display:flex; min-height:100vh; }
.sidebar { width:200px; flex-shrink:0; background:var(--wine); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:50; }
.main { margin-left:200px; flex:1; padding:28px 28px 80px; max-width:860px; }
.bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--wine); border-top:1px solid var(--wine-l); padding:6px 0 14px; z-index:100; justify-content:space-around; align-items:center; }

@media(max-width:768px) {
  .sidebar { display:none !important; }

  .bottom-nav { display:flex !important; }
  .mobile-refresh-btn { display:flex !important; }
  .desktop-only { display:none !important; }
}
@media(min-width:769px) {
  .mobile-refresh-btn { display:none !important; }
}

  display:none; align-items:center; gap:6px;

}

/* Sidebar */
.sidebar-logo { padding:22px 20px 18px; border-bottom:1px solid var(--wine-l); }

.page-title { font-family:'Newsreader',serif; font-size:28px; color:var(--ink); line-height:1; }
.page-sub { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-top:2px; }

.extra-badge { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.04em; background:rgba(122,106,88,.14); color:var(--free); padding:2px 6px; border-radius:3px; margin-left:6px; font-weight:700; }

/* Event cards */
.event-card { display:flex; align-items:center; gap:12px; padding:12px; background:var(--cream); border-radius:8px; margin-bottom:10px; }
.event-days { font-family:'Newsreader',serif; font-size:28px; color:var(--wine); line-height:1; }

/* Rules */
.rule-row { display:flex; gap:12px; align-items:flex-start; padding:14px; background:var(--white); border:1px solid var(--cream-d); border-radius:10px; margin-bottom:8px; }
.rule-num { font-family:'Space Mono',monospace; font-size:10px; color:var(--gold); font-weight:700; flex-shrink:0; margin-top:2px; }
.rule-title { font-family:'Newsreader',serif; font-size:15px; font-weight:600; color:var(--wine); margin-bottom:4px; }
.rule-body { font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:var(--muted); line-height:1.5; }

/* Strength */
.strength-tag { font-family:'Hanken Grotesk',sans-serif; font-size:12px; background:var(--cream); border:1px solid var(--cream-d); border-radius:6px; padding:5px 10px; color:var(--ink); display:inline-block; margin:0 4px 6px 0; }

/* Page sections */

/* Spinner */

.loading { display:flex; align-items:center; justify-content:center; height:200px; }

<script>
// ── Static config ─────────────────────────────────────────────
const C = {
  run:"#C0392B", bike:"#2874A6", swim:"#1A7A5E", strength:"#7D3C98", free:"#7A6A58", walk:"#2E8B57", hike:"#8B6914", commute:"#1A6B8A", openwater:"#0B5394"
};

// ── Zoneberegner (9/7-2026): dynamiske zoner fra tærskel + FTP ────────────
// Faktorer kalibreret så defaults (4:20 min/km, 270 W) reproducerer de
// oprindelige zoner eksakt. localStorage: fast50_thr_sec / fast50_ftp.
const ZONE_CALC = {
  thrSec(){ return parseInt(localStorage.getItem('fast50_thr_sec')) || 260; },
  ftp(){ return parseInt(localStorage.getItem('fast50_ftp')) || 270; },
  fmtPace(s){ return Math.floor(s/60) + ':' + String(Math.round(s%60)).padStart(2,'0'); },
  runZones(){
    const t = this.thrSec();
    const F = [ // [labelmin-faktor, labelmax-faktor] af tærskel-sekunder
      {label:'Z2', name:'Aerob base', lo:296/260, hi:334/260, color:'#2874A6'},
      {label:'Z3', name:'Tempo',      lo:266/260, hi:295/260, color:'#27AE60'},
      {label:'Z4', name:'Threshold',  lo:253/260, hi:265/260, color:'#F39C12'},
      {label:'Z5', name:'VO2max',     lo:233/260, hi:252/260, color:'#E67E22'},
    ];
    const rows = F.map(z=>({label:z.label,name:z.name,color:z.color,
      range:this.fmtPace(t*z.lo)+'\u2013'+this.fmtPace(t*z.hi)}));
    rows.unshift({label:'Z1',name:'Restitution',color:'#7F8C8D',range:'> '+this.fmtPace(t*334/260+1)});
    rows.push({label:'Z6',name:'Anaerob',color:'#C0392B',range:'< '+this.fmtPace(t*233/260-1)});
    return rows;
  },
  bikeZones(){

function weekStrip() {

  D.week_sessions.forEach(s => {
    (byDay[s.day] = byDay[s.day] || []).push(s);
  });
  return `<div class="week-strip">${DAGE.map(dag => {
    const sessions = byDay[dag] || [];
    const isToday = sessions.some(s => s.today);
    const done = sessions.length > 0 && sessions.every(s => s.done);
    const anyDone = sessions.some(s => s.done);
    // Saml unikke discipliner for dagen (planlagt + ekstra)
    const discs = [];
    sessions.forEach(s => {
      if (s.disc && !discs.includes(s.disc)) discs.push(s.disc);
      if (s.disc2 && !discs.includes(s.disc2)) discs.push(s.disc2);
    });
    const doneClass = anyDone && discs.length ? `done-${discs[0]}` : "";
    const todayClass = isToday ? "is-today" : "";
    let ico;
    if (discs.length === 0) {
      ico = `<span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--cream-d)">·</span>`;
    } else {
      const col = d => anyDone ? C[d] : (isToday ? "var(--wine)" : "var(--muted)");

    return `<div class="wday ${doneClass} ${todayClass}">

  }).join("")}</div>`;
}

function ctlGraph() {
  // Filtrer nulls — brug CTL_PLAN som fallback hvis ingen live data
  const rawActual=D.ctlCurve||[];
  const actual=rawActual.filter(v=>v!==null&&v!==undefined).length>0
    ? rawActual.map((v,i)=>v!==null&&v!==undefined?v:CTL_PLAN[i])
    : CTL_PLAN.slice(0,D.week);
  const plan=CTL_PLAN, W=500, H=140, pad={t:18,r:24,b:30,l:30};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b, mn=30, mx=65;
  const x=i=>pad.l+(i/(plan.length-1))*iW;
  const y=v=>pad.t+iH-((v-mn)/(mx-mn))*iH;
  const wk=D.week;
  const cur=actual[actual.length-1]||CTL_PLAN[D.week-1]||34;

  const smoothPath=(arr)=>{
    let p=`M${x(0)},${y(arr[0])}`;
    for(let i=0;i<arr.length-1;i++){
      const mx0=(x(i)+x(i+1))/2, my0=(y(arr[i])+y(arr[i+1]))/2;
      p += ` Q${x(i)},${y(arr[i])} ${mx0},${my0}`;
    }
    p += ` T${x(arr.length-1)},${y(arr[arr.length-1])}`;
    return p;
  };

  const planPath=smoothPath(plan);
  const actualPath=smoothPath(actual);
  const actualArea=`${actualPath} L${x(actual.length-1)},${H-pad.b} L${x(0)},${H-pad.b} Z`;

  const labels=plan.map((_,i)=>String(i+1));
  return `<svg class="ctl-svg" viewBox="0 0 ${W} ${H}" style="overflow:visible">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--gold)" stop-opacity=".35"/>
      <stop offset="100%" stop-color="var(--gold)" stop-opacity=".03"/>
    </linearGradient></defs>
    ${[35,45,55].map(v=>`<line x1="${pad.l}" x2="${W-pad.r}" y1="${y(v)}" y2="${y(v)}" stroke="var(--cream-d)" stroke-width="1"/>
      <text x="${pad.l-4}" y="${y(v)+4}" text-anchor="end" fill="var(--muted)" font-size="9" font-family="'Space Mono',monospace">${v}</text>`).join("")}
    <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(60)}" y2="${y(60)}" stroke="var(--wine)" stroke-width="1.2" stroke-dasharray="4,4" opacity=".6"/>
    <text x="${W-pad.r}" y="${y(60)-5}" text-anchor="end" fill="var(--wine)" font-size="9" font-weight="700" font-family="'Space Mono',monospace">MÅL 60</text>
    <path d="${planPath}" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3,4" opacity=".5"/>
    <path d="${actualArea}" fill="url(#g)"/>
    <path d="${actualPath}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(actual.length-1)}" cy="${y(cur)}" r="5" fill="var(--gold)" stroke="var(--wine)" stroke-width="2"/>
    <text x="${x(actual.length-1)}" y="${y(cur)-12}" text-anchor="middle" fill="var(--wine)" font-size="11" font-weight="700" font-family="'Space Mono',monospace">${cur.toFixed(1)}</text>
    ${labels.map((l,i)=>`<text x="${x(i)}" y="${H-4}" text-anchor="middle"
      fill="${i===wk-1?"var(--wine)":"var(--muted)"}" font-size="8" font-family="'Space Mono',monospace"
      font-weight="${i===wk-1?700:400}">${l||(i+1)}</text>`).join("")}
  </svg>`;
}

// blev tabt. Fejl skal findes af dashboardet, ikke af Kennet.
// Læser GitHub Actions' eget API klientside. Public repo => ingen token.
// Fejler blødt: kan vi ikke hente status, viser vi intet.
const HEALTH_IGNORE = ['pages build and deployment'];

async function checkSystemHealth() {
  const box = document.getElementById('system-health');
  if (!box) return;
  try {
    const r = await fetch('https://api.github.com/repos/hammerbamsen/fast-as-50/actions/runs?per_page=100');
    if (!r.ok) return;
    const runs = (await r.json()).workflow_runs || [];
    const latest = new Map();
    for (const run of runs) {
      if (run.status !== 'completed') continue;
      if (HEALTH_IGNORE.includes((run.name || '').toLowerCase())) continue;
      if (!latest.has(run.name)) latest.set(run.name, run);
    }
    const broken = [...latest.values()].filter(x => x.conclusion !== 'success');
    if (!broken.length) { box.innerHTML = ''; return; }
    const esc = t => String(t).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    const items = broken.map(b => {
      const d = new Date(b.created_at);
      // Kalenderdøgn, ikke 24-timers-vinduer: en fejl kl. 13:33 i går er "i går"
      // kl. 09:12 i dag — ikke "i dag". Den gamle beregning gav falsk hastesag.
      const dayStart = x => { const y = new Date(x); y.setHours(0,0,0,0); return y.getTime(); };
      const days = Math.round((dayStart(new Date()) - dayStart(d)) / 86400000);
      const when = days === 0 ? 'i dag' : (days === 1 ? 'i går' : days + ' dage siden');
      return '<div style="font-family:\'Hanken Grotesk\',sans-serif;font-size:12px;color:var(--ink);margin-top:3px">'
        + '· <strong>' + esc(b.name) + '</strong> — fejlede ' + when + '</div>';
    }).join('');
    box.innerHTML = '<div class="card" style="background:rgba(192,57,43,.10);border-left:3px solid #C0392B;margin-bottom:8px">'
      + '<div style="font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:.06em;color:#C0392B;font-weight:700">'
      + '⚠ SYSTEM: ' + broken.length + ' ' + (broken.length === 1 ? 'WORKFLOW FEJLER' : 'WORKFLOWS FEJLER') + '</div>'
      + items
      + '<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);margin-top:6px">'
      + 'Data kan mangle. Se Actions-fanen på GitHub.</div></div>';
  } catch (e) {
    /* offline eller rate-limited — vis hellere intet end en falsk alarm */
  }
}

let viewWeek = 0; // 0=denne uge, -1=forrige, +1=næste

function weekSessions(offset) {
  const w = D.week + offset;
  if (w < 1 || w > D.totalWeeks) return [];
  // Aktuel uge: brug altid week_sessions (har done-status fra Intervals aktiviteter)
  if (offset === 0) return D.week_sessions || [];
  // Forrige/næste uge: brug all_weeks
  if (D.all_weeks && D.all_weeks[w]) return D.all_weeks[w].sessions || [];
  return [];
}

function capFirst(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}

function renderFocus(text) {
  text = (text == null) ? '' : String(text);
  if (!text) return '<p style="font-family:\'Hanken Grotesk\',sans-serif;font-size:14px;line-height:1.6;color:var(--ink)">—</p>';
  const pStyle = "font-family:'Hanken Grotesk',sans-serif;font-size:14px;line-height:1.6;color:var(--ink)";
  const dashIdx = text.search(/[-—]\s/);
  if (dashIdx === -1) return `<p style="${pStyle}">${capFirst(text)}</p>`;
  const head = capFirst(text.slice(0, dashIdx).trim());
  const rest = text.slice(dashIdx + 1).trim();
  const sentenceEnd = rest.indexOf('. ');
  const itemsPart = sentenceEnd === -1 ? rest : rest.slice(0, sentenceEnd);
  const trailing = sentenceEnd === -1 ? '' : rest.slice(sentenceEnd + 2).trim();
  const items = itemsPart.split('·').map(s=>capFirst(s.trim())).filter(Boolean);
  let html = `<p style="${pStyle};margin:0 0 8px">${head}</p>`;
  html += `<ul style="${pStyle};margin:0 0 8px;padding-left:18px">`;
  items.forEach(i => html += `<li style="margin-bottom:2px">${i}</li>`);
  html += `</ul>`;
  if (trailing) html += `<p style="${pStyle};margin:0">${capFirst(trailing)}</p>`;
  return html;
}

function weekFocusText(offset) {
  const w = D.week + offset;
  if (D.all_weeks && D.all_weeks[w]) return D.all_weeks[w].focus || "";
  if (offset === 0) return D.weekFocus;
  return "Ugeplan ikke tilgængelig endnu.";
}

function weekBlockType(offset) {
  if (D.all_weeks && D.all_weeks[D.week + offset]) return D.all_weeks[D.week + offset].blockType || "";
  return offset === 0 ? D.blockType : "";
}

  const w = D.week + viewWeek;

  const block = weekBlockType(viewWeek);

  </div>
  ${isCurrentWeek ? `
  <div id="coach-assessment-box" class="card" style="border-left:3px solid var(--wine);padding:16px 18px;margin-bottom:14px;">
    <div class="label" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span>COACH-VURDERING</span>
      <button onclick="refreshCoachAssessment()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:0 4px;" title="Opdatér">↻</button>
    </div>
    <div id="coach-assessment-content">
      <div style="display:flex;align-items:center;gap:10px;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;">
        <div class="spinner" style="width:14px;height:14px;border-width:2px"></div>
        Analyserer ugedata...
      </div>
    </div>
    <div id="coach-assessment-ts" style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:10px;"></div>
  </div>` : ''}
  ${sessions.length === 0 ? `<div class="card" style="text-align:center;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;padding:32px">DATA IKKE TILGÆNGELIG</div>` : (() => {
    const ALL_DAYS = ["Man","Tir","Ons","Tor","Fre","Lør","Søn"];
    const byDay = {};
    ALL_DAYS.forEach(d => byDay[d] = []);
    sessions.forEach(s => { if (byDay[s.day] !== undefined) byDay[s.day].push(s); });
    return ALL_DAYS.map(day => {
      const ds = byDay[day];
      const hasPlanned = ds.some(s => !s.extra);
      const restBlock = `
  <div class="wsession" style="opacity:0.45">
    <div class="wsession-icon" style="background:#7A6A5812">${icon("rest",18,"#7A6A58")}</div>
    <div class="wsession-body">
      <div class="wsession-title" style="color:var(--muted)">Hviledag</div>
      <div class="wsession-day">${day}</div>
    </div>
  </div>`;
      if (ds.length === 0) return restBlock;
      return (!hasPlanned ? restBlock : '') + ds.map(s=>`
  <div class="wsession ${(s.today && isCurrentWeek)?"is-today":""} ${s.extra?"is-extra":""}">
    <div class="wsession-icon" style="background:${C[s.disc]||'#7A6A58'}18">
      ${s.disc2
        ? `<span style="display:flex;gap:2px;align-items:center">${icon(s.disc,14,C[s.disc]||'#7A6A58')}${icon(s.disc2,14,C[s.disc2]||'#7A6A58')}</span>`
        : icon(s.disc,18,C[s.disc]||'#7A6A58')}
    </div>
    <div class="wsession-body">
      <div class="wsession-title">${s.label.replace('Mallorca','<span style="font-size:10px;color:var(--muted)">📍 Mallorca</span>')}${(s.today&&isCurrentWeek&&!s.extra)?`<span class="today-badge">I DAG</span>`:""}${s.extra?`<span class="extra-badge">EKSTRA</span>`:""}</div>
      <div class="wsession-day">${s.day}</div>
    </div>
    ${s.disc2
      ? `<span style="display:flex;gap:6px;align-items:center">
           <span style="display:flex;gap:3px;align-items:center">${discTag(s.disc,true)}${s.done ? icon("check",15,C[s.disc]||'#7A6A58') : ''}</span>
           <span style="display:flex;gap:3px;align-items:center">${discTag(s.disc2,true)}${s.done ? icon("check",15,C[s.disc2]||'#7A6A58') : ''}</span>
         </span>`
      : `<span style="display:flex;gap:3px;align-items:center">${discTag(s.disc,true)}${s.done ? icon("check",18,C[s.disc]||'#7A6A58') : ''}</span>`}
  </div>`).join("");
    }).join("");
  })()}
  <div class="card" style="margin-top:8px"><div class="label">Ugefokus</div>${renderFocus(focus)}</div>
  `;
}

// Vurderingen kan være gammel uden at noget andet røber det (AI-kaldet fejler
// tavst og forrige tekst bliver stående). Råb op i stedet for at se rigtig ud.
// Nøgler dør tavst. Vis det FØR noget står stille i et døgn.
function credBanner() {
  const c = D.credentials;
  if (!c) return '';
  const bad = Object.keys(c).filter(k => c[k] && !c[k].ok);
  if (!bad.length) return '';
  const esc = t => String(t).replace(/[<>&]/g, x => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[x]));
  const rows = bad.map(k =>
    '<div style="font-family:\'Hanken Grotesk\',sans-serif;font-size:12px;color:var(--ink);margin-top:3px">'
    + '<strong>' + esc(k) + '</strong> — ' + esc(c[k].note) + '</div>').join('');
  return '<div style="background:rgba(192,57,43,.12);border-left:3px solid #C0392B;'
    + 'border-radius:4px;padding:8px 10px;margin:0 0 10px">'
    + '<div style="font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:.06em;'
    + 'color:#C0392B;font-weight:700">⛔ NØGLE-PROBLEM</div>' + rows + '</div>';
}

function staleBanner() {
  if (!D.coachAssessmentStale && !D.coachAssessmentError) return '';
  const msg = D.coachAssessmentStale
    ? 'Vurderingen er ikke fra i dag — den er genereret tidligere og kan være forældet.'
    : 'Vurderingen kunne ikke opdateres ved seneste forsøg.';
  const detail = D.coachAssessmentError
    ? '<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:#8A6A2A;margin-top:4px;word-break:break-word">'
      + String(D.coachAssessmentError).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '</div>'
    : '';
  return '<div style="background:rgba(230,126,34,.12);border-left:3px solid #E67E22;'
    + 'border-radius:4px;padding:8px 10px;margin:0 0 10px">'
    + '<div style="font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:.06em;'
    + 'color:#B4661A;font-weight:700">⚠ FORÆLDET VURDERING</div>'
    + '<div style="font-family:\'Hanken Grotesk\',sans-serif;font-size:12px;color:var(--ink);'
    + 'margin-top:3px">' + msg + '</div>' + detail + '</div>';
}

async function loadCoachAssessment(force) {
  const box = document.getElementById('coach-assessment-content');
  const tsEl = document.getElementById('coach-assessment-ts');
  if (!box) return;

  // Læs fra data.json (genereret server-side af update_kpi.py — ingen proxy nødvendig)
  if (D.coachAssessmentHtml) {
    box.innerHTML = credBanner() + staleBanner() + D.coachAssessmentHtml;
    if (tsEl && D.coachAssessmentTs) tsEl.textContent = 'Opdateret: ' + D.coachAssessmentTs;
    return;
  }

  box.innerHTML = '<p style="font-family:\'Space Mono\',monospace;font-size:11px;color:var(--muted)">Vurdering opdateres næste gang update-kpi kører (dagligt kl. 03 UTC).</p>';
  return;

}

function refreshCoachAssessment() {
  D.coachAssessment = null;
  loadCoachAssessment(true);
}

function changeWeekView(delta) {
  const newW = D.week + viewWeek + delta;
  if (newW < 1 || newW > D.totalWeeks) return;
  viewWeek += delta;
  navigate('week');
}

function trainMinutesBar() {
  const tm = D.train_mins || {};
  // Planlagt træning — indgår i faktisk-total mod planlagt
  const trainTypes = [
    {key:'run',       label:'Løb',     color:'var(--run)'},
    {key:'bike',      label:'Cykel',   color:'var(--bike)'},
    {key:'swim',      label:'Svøm',    color:'var(--swim)'},
    {key:'strength',  label:'Styrke',  color:'var(--gold)'},
    {key:'openwater', label:'OW',      color:'var(--openwater)'},
  ];
  // Ekstra aktivitet — vises separat, tæller ikke mod træningsmål
  const extraTypes = [
    {key:'commute',   label:'Pendl',   color:'var(--commute)'},
    {key:'walk',      label:'Gå',      color:'var(--walk)'},
    {key:'hike',      label:'Hike',    color:'var(--hike)'},
  ];
  const planned = tm.planned || 0;
  // Faktisk total = kun planlagt træning (ikke gå/pendl/hike)
  const actual = trainTypes.reduce((s,t)=>s+(tm[t.key]||0),0);
  const extraTotal = extraTypes.reduce((s,t)=>s+(tm[t.key]||0),0);
  const fmt = m => m >= 60 ? Math.floor(m/60)+'t'+(m%60>0?' '+Math.round(m%60)+'m':'') : Math.round(m)+'m';

  const header = planned > 0
    ? `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">FAKTISK</span>
        <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ink)">${fmt(actual)} <span style="color:var(--muted)">/ ${fmt(planned)} planlagt</span></span>
      </div>`
    : '';

  if (actual === 0 && extraTotal === 0) return header + '<div style="font-family:Space Mono,monospace;font-size:10px;color:var(--muted);padding:4px 0">Ingen aktiviteter denne uge endnu</div>';

  const barRow = (t) => {
    const pct = planned > 0 ? Math.min(Math.round((tm[t.key]/planned)*100),100) : Math.round((tm[t.key]/Math.max(actual,1))*100);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">${t.label.toUpperCase()}</span>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--ink);font-weight:700">${fmt(tm[t.key])}</span>
      </div>
      <div style="background:var(--cream-d);border-radius:4px;height:8px">
        <div style="background:${t.color};border-radius:4px;height:8px;width:${pct}%"></div>
      </div>
    </div>`;
  };

  const trainBars = trainTypes.filter(t=>tm[t.key]>0).map(barRow).join('');

  // Ekstra-bjælker: bredde måles mod ekstra-total (ikke træningsmål)
  const extraBarRow = (t) => {
    const pct = extraTotal > 0 ? Math.round((tm[t.key]/extraTotal)*100) : 0;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">${t.label.toUpperCase()}</span>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--ink);font-weight:700">${fmt(tm[t.key])}</span>
      </div>
      <div style="background:var(--cream-d);border-radius:4px;height:8px">
        <div style="background:${t.color};border-radius:4px;height:8px;width:${pct}%"></div>
      </div>
    </div>`;
  };
  const extraBars = extraTypes.filter(t=>tm[t.key]>0).map(extraBarRow).join('');
  const extraSection = extraTotal > 0
    ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--cream-d)">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
          <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.06em">EKSTRA AKTIVITET</span>
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${fmt(extraTotal)} · Ekstra aktivitet</span>
        </div>
        ${extraBars}
      </div>`
    : '';

  return header + trainBars + extraSection;
}

// Tegner selve <svg>'et ved en EKSAKT pixelbredde (W == den faktiske renderede bredde).
// Fordi viewBox-bredden altid matcher den rigtige CSS-bredde 1:1, er der intet behov for at
// skalere ujævnt (preserveAspectRatio="none") — det var det, der gjorde tal/tekst forvrænget.
// Før den rigtige bredde er målt i DOM'en bruges et fallback-tal (280px), som redrawSparklines()
// straks erstatter med det korrekte mål via et requestAnimationFrame-kald.
function buildSparklineSVG(chartId, W) {
  const cfg = SPARKLINE_DATA[chartId];
  if (!cfg) return '';
  const { data, color, minV, maxV } = cfg;
  const H=92, pad={l:8,r:8,t:22,b:20};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const safeData = (data||[]).filter(d => d !== null && d !== undefined);
  const vals  = safeData.map(d=>typeof d==='object'?d.v:d).filter(v=>v!==null&&v!==undefined&&!isNaN(v));
  const reals = safeData.map(d=>typeof d==='object' && 'real' in d ? !!d.real : true);
  const dates = safeData.map(d=>typeof d==='object' && d.date ? d.date : null);
  const n = vals.length;
  const dataMin = Math.min(...vals), dataMax = Math.max(...vals);
  const mn = minV ?? dataMin - (dataMax-dataMin||1)*0.15;
  const mx = maxV ?? dataMax + (dataMax-dataMin||1)*0.15;
  const x = i => pad.l + (n===1?0:(i/(n-1))*iW);
  const y = v => pad.t + iH - ((v-mn)/(mx-mn||1))*iH;

  // Område til fyld (bruger samme punkter, lige linjer)
  const baseline = (mn < 0 && mx > 0) ? y(0) : (H-pad.b);
  let areaPath = `M${x(0)},${y(vals[0])}`;
  for (let i=1;i<n;i++) areaPath += ` L${x(i)},${y(vals[i])}`;
  areaPath += ` L${x(n-1)},${baseline} L${x(0)},${baseline} Z`;

  // Linjestykker: solid hvis begge punkter er reelle, stiplet/fladt hvis fremført
  let lineSegments = '';
  for (let i=0;i<n-1;i++){
    const isDashed = !reals[i+1];
    lineSegments += `<line x1="${x(i)}" y1="${y(vals[i])}" x2="${x(i+1)}" y2="${y(vals[i+1])}" stroke="${color}" stroke-width="2" stroke-linecap="round" ${isDashed ? 'stroke-dasharray="3,3" opacity="0.55"' : ''}/>`;
  }

  // x-labels: ugedags-bogstav baseret på faktisk dato hvis tilgængelig
  const today=new Date();
  let xLabels;
  if (n<=10) {
    const dayNames=['S','M','T','O','T','F','L'];
    xLabels = vals.map((_,i)=>{
      let d;
      if (dates[i]) { d = new Date(dates[i]+'T00:00:00'); }
      else { d = new Date(today); d.setDate(today.getDate()-(n-1-i)); }
      return dayNames[d.getDay()];
    });
  } else {
    const step = Math.ceil(n/5);
    xLabels = vals.map((_,i)=>{
      if (i!==0 && i!==n-1 && i%step!==0) return '';
      let d;
      if (dates[i]) { d = new Date(dates[i]+'T00:00:00'); }
      else { d = new Date(today); d.setDate(today.getDate()-(n-1-i)); }
      return `${d.getDate()}/${d.getMonth()+1}`;
    });
  }

  const gid = `sg_${chartId}`;
  return `<svg data-spk="${chartId}" viewBox="0 0 ${W} ${H}" style="width:${W}px;height:${H}px;overflow:visible;display:block">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".32"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(mx)}" y2="${y(mx)}" stroke="var(--cream-d)" stroke-width="1" stroke-dasharray="2,3"/>
      <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(mn)}" y2="${y(mn)}" stroke="var(--cream-d)" stroke-width="1" stroke-dasharray="2,3"/>
      ${Math.abs(y(mx)-y(0)) > 8 || !(mn<0 && mx>0) ? `<text x="${W-pad.r}" y="${y(mx)-3}" text-anchor="end" fill="var(--muted)" font-size="8" font-family="'Space Mono',monospace">${mx.toFixed(1)}</text>` : ''}
      ${Math.abs(y(mn)-y(0)) > 8 || !(mn<0 && mx>0) ? `<text x="${W-pad.r}" y="${y(mn)+10}" text-anchor="end" fill="var(--muted)" font-size="8" font-family="'Space Mono',monospace">${mn.toFixed(1)}</text>` : ''}
      ${(mn < 0 && mx > 0) ? `<line x1="${pad.l}" x2="${W-pad.r}" y1="${y(0)}" y2="${y(0)}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="1,2" opacity="0.5"/>
      <text x="${W-pad.r}" y="${y(0)-3}" text-anchor="end" fill="var(--ink)" font-size="8" font-weight="700" font-family="'Space Mono',monospace">0</text>` : ''}
      <path d="${areaPath}" fill="url(#${gid})"/>
      ${lineSegments}
      ${(()=>{const i=n-1; return reals[i]
        ? `<circle cx="${x(i)}" cy="${y(vals[i])}" r="3.5" fill="${color}" stroke="var(--white)" stroke-width="1.5"/>`
        : `<circle cx="${x(i)}" cy="${y(vals[i])}" r="3.5" fill="var(--cream)" stroke="${color}" stroke-width="1.5" stroke-dasharray="2,2"/>`})()}
      ${xLabels.map((l,i)=>`<text x="${x(i)}" y="${H-4}" text-anchor="middle" fill="${i===n-1?color:'var(--muted)'}" font-weight="${i===n-1?700:400}" font-size="8" font-family="'Space Mono',monospace">${l}</text>`).join("")}
    </svg>`;
}

function sparkline(data, color, label, unit, minV, maxV) {
  // Filtrer nulls/undefined ud — vis fallback hvis ingen reelle data
  const cleaned=(data||[]).filter(d=>d!==null&&d!==undefined).filter(d=>{const v=typeof d==='object'?d.v:d;return v!==null&&v!==undefined&&!isNaN(v);});
  if (!cleaned || cleaned.length < 2) return '<div style="height:60px;display:flex;align-items:center;justify-content:center;font-family:Space Mono,monospace;font-size:10px;color:var(--muted)">Ingen data endnu</div>';
  const chartId = `spk${++sparklineSeq}`;
  SPARKLINE_DATA[chartId] = { data: cleaned, color, label, unit, minV, maxV };
  const vals = cleaned.map(d=>typeof d==='object'?d.v:d);
  const last = vals[vals.length-1];
  const prev = vals[vals.length-2];
  const trend = last > prev ? '↑' : last < prev ? '↓' : '→';
  const tcolor = last > prev ? 'var(--swim)' : last < prev ? 'var(--run)' : 'var(--muted)';
  return `<div style="position:relative">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em">${label}</span>
      <span style="font-family:'Space Mono',monospace;font-size:13px;color:${color};font-weight:700">${last.toFixed(1)} <span style="font-size:9px">${unit}</span> <span style="color:${tcolor};font-size:11px">${trend}</span></span>
    </div>
    ${buildSparklineSVG(chartId, 280)}
  </div>`;
}

// Måler den faktiske renderede bredde for hver sparkline og gentegner SVG'et 1:1 i den bredde —
// kaldes lige efter hver side-render samt ved resize (orientering/sidebar-skift på mobil).
function redrawSparklines() {
  document.querySelectorAll('svg[data-spk]').forEach(svg => {
    const chartId = svg.getAttribute('data-spk');
    const parent = svg.parentElement;
    if (!parent || !SPARKLINE_DATA[chartId]) return;
    const w = Math.round(parent.clientWidth);
    if (!w) return;
    const currentVB = parseFloat((svg.getAttribute('viewBox')||'').split(' ')[2]) || 0;
    if (Math.abs(currentVB - w) < 1) return; // allerede korrekt bredde
    const tmp = document.createElement('div');
    tmp.innerHTML = buildSparklineSVG(chartId, w);
    if (tmp.firstElementChild) svg.replaceWith(tmp.firstElementChild);
  });
}

let _sparklineResizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_sparklineResizeTimer);
  _sparklineResizeTimer = setTimeout(redrawSparklines, 150);
});


// ── AF per-dag opslag: 0 = AF (✓), 1 = ikke-AF (rød ✕), undefined = uregistreret ──
function _afMondayOf(d) {
  const m = new Date(d); const diff = m.getDay() === 0 ? -6 : 1 - m.getDay();
  m.setDate(m.getDate() + diff); m.setHours(0, 0, 0, 0); return m;
}
function _afKey(dt) {
  return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
}
function _afWeek1Monday() {
  const keys = Object.keys(D.af_log || {}).sort();
  if (!keys.length) return null;
  return _afMondayOf(new Date(keys[0] + 'T12:00:00'));
}
function _afValFor(weekNum, dayIdx) {
  const m = _afWeek1Monday();
  if (!m || !D.af_log) return undefined;
  const dt = new Date(m); dt.setDate(m.getDate() + (weekNum - 1) * 7 + dayIdx);
  return D.af_log[_afKey(dt)];
}
function _afDotHtml(val, label, labelGap) {
  let bg, fg, sym, lbl;
  if (val === 0)      { bg = 'var(--wine)';    fg = 'var(--gold)';  sym = '✓'; lbl = 'var(--wine)'; }
  else if (val === 1) { bg = 'var(--run)';     fg = 'var(--cream)'; sym = '✕'; lbl = 'var(--run)'; }
  else                { bg = 'var(--cream-d)'; fg = 'var(--muted)'; sym = '·'; lbl = 'var(--muted)'; }
  return '<div style="display:flex;flex-direction:column;align-items:center;gap:' + labelGap + 'px">' +
    '<div style="width:28px;height:28px;border-radius:50%;background:' + bg + ';display:flex;align-items:center;justify-content:center">' +
    '<span style="font-size:9px;font-weight:700;color:' + fg + '">' + sym + '</span>' +
    '</div>' +
    '<span style="font-family:Space Mono,monospace;font-size:8px;color:' + lbl + '">' + label + '</span>' +
    '</div>';
}

function afHistoryViz(history) {
  if (!history || history.length === 0) return '<div style="font-family:Space Mono,monospace;font-size:10px;color:var(--muted);text-align:center;padding:8px">Ingen historik endnu</div>';
  
  const DAY_LABELS = ['M','T','O','T','F','L','S'];
  const DAY_FULL   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];

  const rows = history.map(w => {
    const dots = Array.from({length: 7}, (_, i) => {
      const label = DAY_LABELS[i];
      if (i >= w.total) {
        // Fremtidig dag
        return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">' +
          '<div style="width:28px;height:28px;border-radius:50%;background:var(--cream-d);opacity:0.2"></div>' +
          '<span style="font-family:Space Mono,monospace;font-size:8px;color:var(--cream-d)">' + label + '</span>' +
          '</div>';
      }
      // Per-dag opslag i af_log; fallback til gammel tælle-logik hvis log mangler
      let val = _afValFor(w.week, i);
      if (val === undefined && !D.af_log) val = (i < w.done) ? 0 : undefined;
      return _afDotHtml(val, label, 2);
    }).join('');

    const color = w.done >= 5 ? 'var(--swim)' : w.done >= 3 ? 'var(--gold)' : 'var(--run)';

    return '<div style="margin-bottom:12px">' +
      '<div style="font-family:Space Mono,monospace;font-size:9px;color:var(--muted);margin-bottom:6px">' + w.label.toUpperCase() + '</div>' +
      '<div style="display:flex;gap:4px;align-items:flex-start">' + dots +
      '<div style="margin-left:6px;font-family:Space Mono,monospace;font-size:11px;color:' + color + ';font-weight:700;padding-top:6px">' + w.done + '/7</div>' +
      '</div>' +
      '</div>';
  }).join('');

  return rows;
}
function afStreakViz(done, target, streak) {
  const days = ['M','T','O','T','F','L','S'];
  const nowMon = _afMondayOf(new Date());
  const todayKey = _afKey(new Date());
  let dots = '';
  for (let i = 0; i < 7; i++) {
    const dt = new Date(nowMon); dt.setDate(nowMon.getDate() + i);
    const k = _afKey(dt);
    let val = (D.af_log || {})[k];
    if (val === undefined && !D.af_log) val = (i < done) ? 0 : undefined;
    if (val === undefined || k > todayKey) {
      // Uregistreret eller fremtidig dag: vis dagbogstav som hidtil
      dots += '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--cream-d);display:flex;align-items:center;justify-content:center">' +
        '<span style="font-size:9px;color:var(--muted);font-weight:700">' + days[i] + '</span>' +
        '</div></div>';
      continue;
    }
    const bg  = val === 0 ? 'var(--wine)' : 'var(--run)';
    const fg  = val === 0 ? 'var(--gold)' : 'var(--cream)';
    const sym = val === 0 ? '✓' : '✕';
    dots += '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">' +
      '<div style="width:28px;height:28px;border-radius:50%;background:' + bg + ';display:flex;align-items:center;justify-content:center">' +
      '<span style="font-size:9px;color:' + fg + ';font-weight:700">' + sym + '</span>' +
      '</div></div>';
  }
  const s = streak || 0;
  const streakHtml = s > 0
    ? '<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px">' +
      '<span style="font-family:Newsreader,serif;font-size:28px;color:var(--wine);font-weight:600;line-height:1">' + s + '</span>' +
      '<span style="font-family:Space Mono,monospace;font-size:9px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase">DAGE I TRÆK</span>' +
      '</div>'
    : '';
  return '<div style="display:flex;gap:6px;justify-content:center;margin:8px 0">' + dots + '</div>' +
    '<div style="text-align:center;font-family:Space Mono,monospace;font-size:10px;color:var(--muted)">' + done + '/' + target + ' AF-DAGE DENNE UGE</div>' +
    streakHtml;
}

function trainingDonut() {
  // Kun strukturerede træningsdiscipliner — gå/pendl/hike hører til "Ekstra aktivitet"
  const acts = D.week_sessions.filter(s=>s.done);
  const counts = {run:0,bike:0,swim:0,strength:0,openwater:0};
  acts.forEach(s=>{
    if(s.disc in counts) counts[s.disc]++;
    if(s.disc2 && s.disc2 in counts) counts[s.disc2]++;
  });
  const rawTotal = Object.values(counts).reduce((a,b)=>a+b,0);
  const total = rawTotal || 1;
  // Samlet træningstid (kun rigtig træning — samme afgrænsning som donut)
  const tm = D.train_mins || {};
  const trainMin = ['run','bike','swim','strength','openwater'].reduce((s,k)=>s+(tm[k]||0),0);
  const fmtDur = m => m >= 60 ? Math.floor(m/60)+'t'+(m%60>0?' '+Math.round(m%60)+'m':'') : Math.round(m)+'m';
  const colors = {run:'var(--run)',bike:'var(--bike)',swim:'var(--swim)',strength:'var(--gold)',openwater:'var(--openwater)'};
  const labels = {run:'Løb',bike:'Cykel',swim:'Svøm',strength:'Styrke',openwater:'OW'};
  if (rawTotal === 0) {
    return '<div style="font-family:Space Mono,monospace;font-size:10px;color:var(--muted);padding:4px 0">Ingen træningssessioner denne uge endnu</div>';
  }
  let offset=0, cx=60, cy=60, r=45, stroke=18;
  const segments = Object.entries(counts).filter(([k,v])=>v>0).map(([k,v])=>{
    const pct = v/total;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[k]}" stroke-width="${stroke}"
      stroke-dasharray="${pct*2*Math.PI*r} ${2*Math.PI*r}"
      stroke-dashoffset="${-offset*2*Math.PI*r}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct;
    return {seg, k, v, pct};
  });
  return `<div style="display:flex;align-items:center;gap:16px">
    <svg viewBox="0 0 120 120" style="width:96px;height:96px;flex-shrink:0">
      ${total===1?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--cream-d)" stroke-width="${stroke}"/>`:''}
      ${segments.map(s=>s.seg).join('')}
      <text x="${cx}" y="${cy+2}" text-anchor="middle" font-family="'Newsreader',serif" font-size="${trainMin>=60?'17':'22'}" fill="var(--wine)" font-weight="700">${trainMin>=60?Math.floor(trainMin/60)+'t'+(trainMin%60>0?' '+Math.round(trainMin%60)+'m':''):trainMin+'m'}</text>
      <text x="${cx}" y="${cy+18}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="7" letter-spacing="0.5" fill="var(--muted)">TRÆNINGSTID</text>
    </svg>
    <div style="flex:1">${segments.map(s=>`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:${colors[s.k]}">${labels[s.k].toUpperCase()}</span>
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--ink)">${s.v}× ${tm[s.k]>0?fmtDur(tm[s.k]):''}</span>
      </div>`).join('')}
      ${trainMin > 0 ? `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--cream-d)">
        <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.04em">TRÆNINGSTID</span>
        <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ink);font-weight:700">${fmtDur(trainMin)}</span>
      </div>` : ''}
    </div>
  </div>`;
}

// ── Staleness-banner: rolig info >6t, advarsel >12t (kilde-neutral) ──
function checkStaleness(updatedStr) {
  const existing = document.getElementById('stale-banner');
  if (!updatedStr) return;
  const ts = new Date(updatedStr.replace(' ', 'T'));
  if (isNaN(ts.getTime())) return;
  const ageMin = Math.round((Date.now() - ts.getTime()) / 60000);
  const hrs = Math.round(ageMin / 60);

  if (ageMin <= 360) {
    if (existing) existing.remove();
    return;
  }

  const warn = ageMin > 720;
  const html = warn
    ? '⚠️ Data er ' + hrs + ' timer gamle. Automatisk opdatering ser ud til at hænge.'
    : 'Data er ' + hrs + ' timer gamle — opdateres automatisk.';
  const bg = warn ? '#E67E22' : '#EDE6D8';
  const fg = warn ? '#fff' : '#7A6A58';
  const css = 'position:relative;z-index:9999;background:' + bg + ';color:' + fg +
              ';font-family:\u0027Space Mono\u0027,monospace;font-size:11px;padding:8px 14px;text-align:center;line-height:1.4';

  if (existing) { existing.innerHTML = html; existing.style.cssText = css; return; }
  const b = document.createElement('div');
  b.id = 'stale-banner';
  b.style.cssText = css;
  b.innerHTML = html;
  document.body.prepend(b);
}

      if (remote.train_mins)     D.train_mins     = remote.train_mins;
      if (remote.today) {
        // Håndter array (nyt format, flere sessioner pr. dag), flat, og nested format
        if (Array.isArray(remote.today)) D.today = remote.today;
        else if (remote.today.title) D.today = remote.today;
        else if (remote.today.session) D.today = remote.today.session;
      }

      // Re-render med friske data — ryd cache så alle sider genrenderes
      updateMeta();
      pageCache = {};
      navigate(activePage);
    }
  } catch(e) {
    console.log("data.json ikke tilgængelig, bruger defaults");
  }
}

init();

// ── Auto-poll: opdatér AF-streak + data hvert 30 sek ──────────
(function() {
  let lastDataJson = null;
  async function pollData() {
    try {
      const r = await fetch('https://raw.githubusercontent.com/hammerbamsen/fast-as-50/main/data.json?t=' + Date.now());
      if (!r.ok) return;
      const txt = await r.text();
      if (txt === lastDataJson) return; // ingen ændring
      lastDataJson = txt;
      const remote = JSON.parse(txt);
      // Opdatér kun AF-relaterede felter for hurtig visning
      if (remote.af) {
        D.afDays.weekDone = parseInt(remote.af.weekDone) || 0;
        D.afDays.streak   = parseInt(remote.af.streak)   || 0;
      }
      if (remote.kpis?.afStreak) {
        // Opdatér i D.kpis array
        const afKpi = D.kpis.find(k => k.label === 'AF STREAK');
        if (afKpi) afKpi.value = remote.kpis.afStreak.value;
      }
      if (remote.coachHighlight) D.coachHighlight = remote.coachHighlight;
      if (remote.coachAssessmentHtml) D.coachAssessmentHtml = remote.coachAssessmentHtml;
      if (remote.coachAssessmentTs) D.coachAssessmentTs = remote.coachAssessmentTs;
      if ('coachAssessmentStale' in remote) D.coachAssessmentStale = remote.coachAssessmentStale;
      if ('coachAssessmentError' in remote) D.coachAssessmentError = remote.coachAssessmentError;
      if ('credentials' in remote) D.credentials = remote.credentials;
      if ('credentialsCheckedTs' in remote) D.credentialsCheckedTs = remote.credentialsCheckedTs;
      if (remote.af_history) D.afHistory = remote.af_history;
      if (remote.af_log) D.af_log = remote.af_log;
      // Re-render aktiv side
      pageCache = {};
      navigate(activePage);
    } catch(e) {}
  }
  setInterval(pollData, 10000);
})();

// ── Refresh-knap: bed om en FRISK kørsel, vent, hent så data ──
// Baggrund (16/7-26): knappen kaldte kun init(), som blot genhenter
// data.json. Den kunne derfor aldrig vise nyere data end sidste cron-tick
// — en tur kørt 13:54 var usynlig til næste */30. Nu dispatches samme
// event som Intervals-webhooken (intervals-activity) via Worker'en, og vi
// poller til data.json faktisk har flyttet sig. Fejler dispatchen, falder
// vi ærligt tilbage til ren genhentning i stedet for at lyve "OPDATERET".
async function triggerRefresh() {
  const btn = document.getElementById('refresh-btn');
  const mBtn = document.getElementById('mobile-refresh-btn');
  const status = document.getElementById('refresh-status');
  const setTxt = t => [btn, mBtn].forEach(b => { if (b) b.textContent = t; });
  const setStatus = t => { if (status) status.textContent = t; };
  const reset = () => {
    if (btn)  { btn.textContent  = '↻ OPDATÉR DATA'; btn.disabled  = false; }
    if (mBtn) { mBtn.textContent = '↻ OPDATÉR';      mBtn.disabled = false; }
  };
  [btn, mBtn].forEach(b => { if (b) b.disabled = true; });
  setStatus(''); setTxt('↻ HENTER...');

  const before = await _dataStamp();
  let dispatched = false;
  try {
    await dispatchViaWorker('/refresh', {});
    dispatched = true;
  } catch (e) {
    // Vær præcis om HVILKEN kode der fejler. 401 her betyder app-koden
    // (PLAN_EDIT_SECRET) i localStorage — ikke webhook-koden, ikke en PAT.
    // Appene bruger ikke PAT længere (af_gh_token findes ikke i koden).
    // Første udgave sagde bare "forkert kode" og sendte fejlsøgningen 16/7
    // efter et Cloudflare-deploy der var helt i orden.
    setStatus(e.status === 401 ? 'App-kode afvist — åbn af.html?reset'
            : e.status        ? 'Worker svarede ' + e.status
                              : 'Ingen forbindelse til Worker');
  }

  let changed = false;
  if (dispatched) {
    setTxt('↻ KØRER...');
    if (!before) {
      // Kunne ikke læse tidsstempel før kørslen (typisk GitHub-ratelimit på
      // 60 anonyme kald/t). Så kan vi ikke sammenligne — vent blindt i 45s.
      await new Promise(r => setTimeout(r, 45000));
    } else {
      for (let i = 0; i < 18; i++) {
        await new Promise(r => setTimeout(r, 5000));
        const now = await _dataStamp();
        if (now && now !== before) { changed = true; break; }
        setTxt('↻ KØRER ' + ((i + 1) * 5) + 's');
      }
    }
  }

  try {
    await init();
    const time = new Date().toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' });
    // Sig kun "OPDATERET" hvis data faktisk flyttede sig. Kørte vi en runde
    // uden at data.json ændrede sig, er der intet nyt — det er ikke en fejl,
    // men det er heller ikke en opdatering.
    const ok = !dispatched || changed;
    if (btn)  btn.textContent  = ok ? '✓ OPDATERET' : '✓ INGEN NY DATA';
    if (mBtn) mBtn.textContent = (ok ? '✓ ' : '– ') + time;
    if (status && !status.textContent) setStatus(ok ? time : 'Kørt ' + time + ' — intet nyt');
    setTimeout(reset, 2000);
  } catch (e) {
    reset();
    setStatus('Fejl — prøv igen');
  }
}

// Læser data.json's tidsstempel UDEN OM raw.githubusercontent's CDN-cache,
// som ?t=-parameteren ikke pålideligt slår igennem (læring 14/7). Contents
// API'et er ucachet. Kaldes kun ved manuelt tryk — langt under de 60
// anonyme kald/time.
async function _dataStamp() {
  try {
    const r = await fetch(
      'https://api.github.com/repos/hammerbamsen/fast-as-50/contents/data.json?ref=main',
      { headers: { Accept: 'application/vnd.github.raw' }, cache: 'no-store' });
    if (!r.ok) return null;
    const d = await r.json();
    return d.coachAssessmentTsFull || (d.meta && d.meta.updated) || null;
  } catch (e) { return null; }
}

// Pull-to-refresh
(function() {
  let startY = 0, pulling = false;
  const threshold = 80;

  // Indikator element
  const ptr = document.createElement('div');
  ptr.id = 'ptr-indicator';
  ptr.style.cssText = `
    position:fixed; top:0; left:0; right:0; height:0;
    background:var(--wine); color:var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-size:12px;
    letter-spacing:.08em; overflow:hidden; z-index:999;
    transition:height .15s ease; pointer-events:none;
  `;
  ptr.textContent = '↓ TRÆK FOR AT OPDATERE';
  document.body.appendChild(ptr);

  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      const h = Math.min(dy * 0.5, 56);
      ptr.style.height = h + 'px';
      ptr.textContent = dy > threshold ? '↑ SLIP FOR AT OPDATERE' : '↓ TRÆK FOR AT OPDATERE';
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    ptr.style.height = '0';
    if (dy > threshold) {
      ptr.textContent = '↻ OPDATERER...';
      ptr.style.height = '44px';
      setTimeout(() => {
        window.location.reload(true);
      }, 400);
    }
  }, { passive: true });
})();

// Swipe navigation mellem sider
(function() {
  let startX = 0, startY = 0, swiping = false;
  const threshold = 50;
  const PAGE_IDS = ['today','week','overview','body','rules'];

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!swiping) return;
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Kun horisontalt swipe (dx > dy)
    if (Math.abs(dx) < threshold || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const idx = PAGE_IDS.indexOf(activePage);
    if (dx < 0 && idx < PAGE_IDS.length - 1) navigate(PAGE_IDS[idx + 1]);
    if (dx > 0 && idx > 0) navigate(PAGE_IDS[idx - 1]);
  }, { passive: true });
})();

</script>
<script>
// Service Worker: network-first — henter altid ny version
const PUSH_ATHLETE_ID = "kennet";
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/fast-as-50/sw.js').then(reg => {
    reg.update(); // Tjek for opdatering ved hver sidevisning
  });
}
// -- U2: Web Push opt-in (fælles for index.html + eva.html) --------
// VAPID public key (offentlig per design — privat nøgle ligger server-side).
const VAPID_PUBLIC = "BHyYLHHV0bt4MNTG3wI0syiiUJUpaPFtIKfgn1i-SK1Ng64KMR3aGc3I76ZDml50jv5bnQ_kRRNcvuDenVsU49M";
const PUSH_SUBSCRIBE_KEY = "fast50_push_sub";   // localStorage: sidst kendte subscription
const PUSH_ATHLETE = (typeof PUSH_ATHLETE_ID !== "undefined") ? PUSH_ATHLETE_ID : "kennet";

// ═══ Cloudflare Worker + delt hemmelighed (samme mønster som plan.html/eva.html) ═══
// Deler localStorage-nøgle (samme origin) — hemmeligheden gemt via plan.html
// eller eva.html virker automatisk her også.
const SECRET_KEY = "af_plan_secret";
const getSecret = () => localStorage.getItem(SECRET_KEY);
const setSecret = s => localStorage.setItem(SECRET_KEY, s);

let WORKER_CONFIG = null;
async function loadWorkerConfig(){
  if (WORKER_CONFIG) return WORKER_CONFIG;
  try {
    const r = await fetch(`data/auth_config.json?t=${Date.now()}`, {cache:"no-store"});
    WORKER_CONFIG = r.ok ? await r.json() : { workerUrl: "" };
  } catch(e) {
    WORKER_CONFIG = { workerUrl: "" };
  }
  return WORKER_CONFIG;
}

async function dispatchViaWorker(path, clientPayload){
  const cfg = await loadWorkerConfig();
  const secret = getSecret();
  if (!secret) throw new Error("Ingen hemmelighed gemt.");
  if (!cfg.workerUrl) throw new Error("Worker-URL ikke sat i data/auth_config.json.");
  const r = await fetch(`${cfg.workerUrl.replace(/\/$/, "")}${path}`, {
    method: "POST",
    headers: { "X-Plan-Secret": secret, "Content-Type": "application/json" },
    body: JSON.stringify(clientPayload)
  });
  if (!r.ok) {
    const errText = await r.text().catch(()=>"");
    const err = new Error(`HTTP ${r.status}. ${errText.slice(0,200)}`);
    err.status = r.status;
    throw err;
  }
  return r;
}

function _urlB64ToUint8(base64){
  const pad = "=".repeat((4 - base64.length % 4) % 4);
  const b64 = (base64 + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(b64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

// iOS Safari kræver at PWA'en er installeret til hjemmeskærm (display-mode:
// standalone) FØR Push virker. Vi detekterer det, så vi kan vise den rigtige
// besked til Eva i stedet for en knap der fejler tavst.
function _isStandalone(){
  return window.matchMedia("(display-mode: standalone)").matches
      || window.navigator.standalone === true;
}
function _isIOS(){
  return /iP(hone|ad|od)/.test(navigator.userAgent)
      || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}
function pushSupported(){
  return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;
}

// Returnerer: 'unsupported' | 'needs-install' | 'granted' | 'denied' | 'default'
function pushState(){
  if (!pushSupported()) return "unsupported";
  if (_isIOS() && !_isStandalone()) return "needs-install";
  return Notification.permission;   // 'granted' | 'denied' | 'default'
}

async function pushSubscribe(){
  if (!pushSupported()) return { ok:false, reason:"unsupported" };
  const perm = await Notification.requestPermission();
  if (perm !== "granted") return { ok:false, reason:perm };
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub){
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: _urlB64ToUint8(VAPID_PUBLIC),
    });
  }
  const subJson = sub.toJSON();
  subJson.athlete = PUSH_ATHLETE;
  localStorage.setItem(PUSH_SUBSCRIBE_KEY, JSON.stringify(subJson));
  // Send til backend. Rapportér ÆRLIGT om det nåede serveren — ellers tror
  // brugeren push virker, men subscription ligger kun lokalt (fx uden token).
  let backend = { ok: true };
  if (typeof sendSubscriptionToBackend === "function"){
    try { backend = await sendSubscriptionToBackend(subJson); }
    catch(e){ backend = { ok:false, reason:"dispatch-error" }; }
  }
  return { ok: !!backend.ok, subscription:subJson,
           reason: backend.ok ? undefined : (backend.reason || "backend"),
           backendStatus: backend.status };
}

async function pushUnsubscribe(){
  if (!pushSupported()) return;
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  if (sub) await sub.unsubscribe();
  localStorage.removeItem(PUSH_SUBSCRIBE_KEY);
}

// Renderer opt-in-knap/-status i et givet container-element.
async function renderPushToggle(containerId){
  const el = document.getElementById(containerId);
  if (!el) return;
  const st = pushState();
  const wrap = (inner) => `<div style="font-size:13px;line-height:1.5">${inner}</div>`;
  if (st === "unsupported"){
    el.innerHTML = wrap("Påmindelser understøttes ikke i denne browser.");
    return;
  }
  if (st === "needs-install"){
    el.innerHTML = wrap('For at få påmindelser på iPhone: tryk <b>Del</b>-ikonet og vælg <b>Føj til hjemmeskærm</b>. Åbn derefter appen fra hjemmeskærmen.');
    return;
  }
  if (st === "granted"){
    if (!getSecret()){
      el.innerHTML = wrap(
        'Påmindelser er tilladt, men mangler adgang til at nå serveren.'
        + '<div style="margin-top:8px">Indsæt den delte hemmelighed (samme som i Plan-fanen):</div>'
        + '<input class="pt-token" type="password" placeholder="delt hemmelighed" '
        + 'style="width:100%;margin-top:6px;padding:7px 9px;border-radius:7px;border:1px solid var(--wine-l,#ccc);font-family:monospace;font-size:11px;box-sizing:border-box">'
        + '<button class="pt-token-save" style="margin-top:6px;padding:7px 12px;border-radius:7px;border:none;background:var(--wine,#59182A);color:#fff;cursor:pointer;font:inherit;font-size:12px">Gem og aktivér</button>'
        + '<div class="pt-token-msg" style="font-size:12px;color:var(--muted,#888);margin-top:6px"></div>');
      el.querySelector(".pt-token-save").onclick = async () => {
        const val = el.querySelector(".pt-token").value.trim();
        const m = el.querySelector(".pt-token-msg");
        if (!val){ if(m) m.textContent = "Indsæt en hemmelighed først."; return; }
        setSecret(val);
        if (m) m.textContent = "Aktiverer…";
        const sub = JSON.parse(localStorage.getItem("fast50_push_sub") || "null");
        const r = sub ? await sendSubscriptionToBackend(sub) : await pushSubscribe();
        if (r && r.ok) { renderPushToggle("push-toggle"); renderPushToggle("push-toggle-main"); }
        else if (m) m.textContent = "Kunne ikke aktivere (" + (r && (r.status||r.reason)) + "). Tjek hemmeligheden.";
      };
      return;
    }
    el.innerHTML = wrap('Påmindelser er slået <b>til</b> · <button class="pt-off" style="background:none;border:none;color:var(--muted,#888);text-decoration:underline;cursor:pointer;font:inherit">slå fra</button>');
    const off = el.querySelector(".pt-off");
    if (off) off.onclick = async () => { await pushUnsubscribe(); renderPushToggle("push-toggle"); renderPushToggle("push-toggle-main"); };
    return;
  }
  if (st === "denied"){
    el.innerHTML = wrap("Påmindelser er blokeret. Slå dem til i browserens indstillinger for denne side.");
    return;
  }
  // default — tilbyd opt-in
  el.innerHTML = `<button class="pt-on" style="padding:8px 14px;border-radius:8px;border:none;background:var(--teal,var(--wine,#59182A));color:#fff;cursor:pointer;font:inherit;font-size:13px">Slå daglige påmindelser til</button><div class="pt-msg" style="font-size:12px;color:var(--muted,#888);margin-top:6px"></div>`;
  el.querySelector(".pt-on").onclick = async () => {
    const msg = el.querySelector(".pt-msg");
    if (msg) msg.textContent = "Aktiverer…";
    const r = await pushSubscribe();
    if (r.ok) { renderPushToggle("push-toggle"); renderPushToggle("push-toggle-main"); return; }
    if (r.reason === "no-token") { renderPushToggle("push-toggle"); renderPushToggle("push-toggle-main"); return; }
    if (msg) msg.textContent = r.reason === "denied"
      ? "Du afviste påmindelser. Slå dem til i browserindstillinger."
      : "Kunne ikke aktivere påmindelser (" + r.reason + ").";
  };
}

// -- U2: send subscription til backend via Worker'ens /push-subscribe -----
// Genbruger den delte hemmelighed (samme som plan-edit-flowet).
// Fejler stille hvis ingen hemmelighed — subscription er allerede gemt lokalt.
async function sendSubscriptionToBackend(subJson){
  if (!getSecret()){
    console.warn("push: ingen delt hemmelighed — subscription gemt lokalt, ikke sendt til server");
    return { ok:false, reason:"no-token" };
  }
  try {
    await dispatchViaWorker("/push-subscribe", { subscription: subJson });
    return { ok:true, status:200 };
  } catch(e) {
    return { ok:false, status: e.status, reason: e.message };
  }
}
renderPushToggle("push-toggle");
renderPushToggle("push-toggle-main");
</script>
